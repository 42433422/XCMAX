# T53 — Android assembleDebug 门禁（仓根 workflow，路径 FHD/mobile-android）
name: android-build

on:
  push:
    branches: [main, master]
    paths:
      - "FHD/mobile-android/**"
      - ".github/workflows/android-build.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "FHD/mobile-android/**"
  workflow_dispatch:

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  assemble-debug:
    name: assembleDebug (personal + enterprise)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: FHD/mobile-android

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Assemble Debug
        run: ./gradlew assemblePersonalDebug assembleEnterpriseDebug --no-daemon

      - name: Lint (personal debug)
        run: ./gradlew lintPersonalDebug --no-daemon
