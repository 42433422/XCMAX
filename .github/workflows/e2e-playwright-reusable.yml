# CI SSOT: Playwright P0 reusable workflow (called from .github/workflows/e2e.yml)
name: e2e-playwright-reusable

on:
  workflow_call:
    inputs:
      run_skeleton:
        description: Run plan2026-skeleton specs when E2E_FULL_STACK=1
        required: false
        type: boolean
        default: false

jobs:
  playwright:
    name: Playwright P0
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: FHD/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: FHD/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run P0 e2e (mock API)
        env:
          E2E_VITE_MOCK_API: "1"
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:5001
        run: |
          npm run dev -- --host 127.0.0.1 --port 5001 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:5001/ >/dev/null && break
            sleep 2
          done
          npx playwright test e2e/smoke.spec.ts e2e/critical-paths.spec.ts --reporter=line

      - name: Run skeleton specs (optional full stack)
        if: inputs.run_skeleton
        env:
          E2E_FULL_STACK: "1"
          E2E_USER: admin
          E2E_PASSWORD: admin123
        run: bash ../scripts/dev/e2e-full.sh
