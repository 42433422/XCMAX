name: FHD Alembic SSOT

"on":
  workflow_dispatch:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  single-head:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Alembic single-head / no-dangling check
        run: python3 scripts/guard_alembic_single_head.py

  ssot-parity-sqlite:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FHD
    env:
      DATABASE_URL: sqlite:////tmp/fhd_alembic_ssot_parity.db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install FHD runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[server-api]"
      - name: alembic upgrade head
        run: alembic -c alembic.ini upgrade head
      - name: alembic check
        run: alembic -c alembic.ini check
