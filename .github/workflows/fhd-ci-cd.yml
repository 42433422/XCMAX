# CI SSOT: generated from FHD/.github/workflows/ci-cd.yml — DO NOT edit here.
# Edit that source, then run: python scripts/dev/publish_ci_workflows_to_root.py
name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, master ]
    tags:
      - "FHD/v*"
  pull_request:
    branches: [ main, develop, master ]
  workflow_dispatch:
    inputs:
      release_channel:
        description: "Release channel (stable=prod, staging)"
        required: false
        default: stable
        type: choice
        options:
          - stable
          - staging
      push_to_cvm:
        description: "Push release artifacts to CVM update server"
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_NAME_FHD_API: ${{ github.repository }}/xcagi-fhd-api


defaults:
  run:
    working-directory: FHD

jobs:
  # Guard against temporary scripts in business directories
  guard-temp-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Block new temporary scripts
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.base_ref }}"
            git fetch origin "${BASE_REF}" --depth=1
            ADDED_FILES="$(git diff --name-only --diff-filter=A "origin/${BASE_REF}"...HEAD || true)"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual rerun: scan only files newly added in the tip commit (not entire tree).
            ADDED_FILES="$(git diff --name-only --diff-filter=A HEAD~1 HEAD 2>/dev/null || true)"
          else
            BEFORE_SHA="${{ github.event.before }}"
            if [ -z "${BEFORE_SHA}" ] || [ "${BEFORE_SHA}" = "0000000000000000000000000000000000000000" ]; then
              ADDED_FILES="$(git diff --name-only --diff-filter=A HEAD~1 HEAD 2>/dev/null || true)"
            else
              ADDED_FILES="$(git diff --name-only --diff-filter=A "${BEFORE_SHA}" "${{ github.sha }}" || true)"
            fi
          fi

          echo "Added files:"
          echo "${ADDED_FILES}"

          python3 scripts/ci/guard_temp_scripts.py --all-tracked
          printf '%s\n' "${ADDED_FILES}" | python3 scripts/ci/guard_temp_scripts.py --added-from-stdin
          echo "✅ Temporary script location guard passed."

  # Backend Tests & Quality
  backend-test:
    needs: guard-temp-scripts
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r deploy/requirements-server-api.txt
          pip install -r deploy/requirements-dev.txt

      - name: Verify requirements lock is in sync
        run: |
          python scripts/dev/check_requirements_lock.py

      - name: Validate coverage SSOT metadata
        run: python scripts/ci/check_coverage_ssot.py

      - name: Run Ruff lint
        run: ruff check app/ tests/

      - name: Run Ruff format check
        run: ruff format --check app/ tests/

      - name: Helm chart lint
        run: |
          if command -v helm >/dev/null 2>&1; then
            bash scripts/observability/helm_lint.sh
          else
            echo "helm not on runner; skip chart lint"
          fi

      - name: Run mypy type checking
        run: |
          set +e
          mypy app/ --no-error-summary
          if [ "$?" -ne 0 ]; then
            echo "::warning::mypy reported errors (advisory; see docs/MYPY_BATCH_STATUS.md)"
          fi

      - name: Type/SQL debt ratchet
        run: |
          python scripts/dev/count_type_debt.py --max-type-ignore 69 --max-ts-nocheck 0 --max-any 99999
          python scripts/dev/count_raw_sql.py

      - name: Route integrity tests
        env:
          XCAGI_SKIP_LEGACY_COMPAT_ROUTES: "1"
        run: python -m pytest tests/test_routes/test_route_registry.py tests/test_routes/test_registry_unit.py tests/test_routes/test_route_golden.py -x -q

      - name: Run tests with coverage
        env:
          XCAGI_SKIP_LEGACY_COMPAT_ROUTES: "1"
          INTENT_BENCHMARK_RUN: "1"
        run: |
          mkdir -p coverage
          # 行 floor SSOT = pyproject.toml [tool.coverage.report] fail_under（铁律1 全量 source=[app]）。
          # 开启 branch=true 后 coverage 自带门禁按"行+分支合并"指标拦截，故 --cov-fail-under=0，
          # 把行/分支门禁交给 coverage_ratchet.py --check（分支/前端 floor 见
          # metrics/coverage_ratchet_baseline.json）。禁止再硬编码窄包阈值。
          python -m pytest tests/ -v \
            --cov --cov-branch --cov-fail-under=0 \
            --cov-report=xml --cov-report=json:coverage.json \
            --cov-report=html --cov-report=term-missing

      - name: Coverage ratchet check (行/分支只升不降)
        env:
          XCAGI_SKIP_LEGACY_COMPAT_ROUTES: "1"
        run: python scripts/dev/coverage_ratchet.py --check --require-backend

      # Codecov policy: optional until CODECOV_TOKEN is in repo secrets
      # (Settings → Secrets and variables → Actions). Without token this step is
      # best-effort (continue-on-error); coverage.xml + htmlcov/ remain local SSOT.
      - name: Upload coverage report
        continue-on-error: true
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: backend
          name: xcagi-backend
          fail_ci_if_error: false

  frontend-test:
    needs: guard-temp-scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: FHD/frontend/package-lock.json

      - name: Install dependencies
        working-directory: FHD/frontend
        run: npm ci

      - name: Run ESLint
        working-directory: FHD/frontend
        run: npm run lint

      - name: Run unit tests
        working-directory: FHD/frontend
        run: npm run test

      - name: Run unit tests with coverage
        working-directory: FHD/frontend
        run: npm run test:coverage

      - name: Run vue-tsc
        working-directory: FHD/frontend
        run: |
          set +e
          npm run type-check
          if [ "$?" -ne 0 ]; then
            echo "::warning::vue-tsc reported errors (advisory; strict build uses tsconfig.build.json)"
          fi

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  # PR/push E2E: mock API (E2E_VITE_MOCK_API=1) — npm run test:e2e:p0 → 8 pass / 6 skip
  # (smoke 3 pass + 1 skip, critical-paths 5 pass, plan2026-skeleton 5 skip w/o E2E_FULL_STACK).
  # Full-stack 14/14: root e2e.yml on schedule or workflow_dispatch (see e2e-playwright-reusable.yml).
  frontend-e2e:
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: FHD/frontend/package-lock.json

      - name: Install Playwright and start dev server
        working-directory: FHD/frontend
        run: |
          npm ci
          npx playwright install chromium --with-deps
          npm run dev -- --host 127.0.0.1 --port 5001 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:5001/ >/dev/null && break
            sleep 2
          done
          curl -sf http://127.0.0.1:5001/ >/dev/null

      - name: Run P0 E2E (mock API)
        working-directory: FHD/frontend
        env:
          E2E_VITE_MOCK_API: "1"
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:5001
        run: npm run test:e2e:p0 -- --reporter=line

  # Architecture Fitness Check
  arch-fitness:
    needs: guard-temp-scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run architecture fitness checks
        run: python scripts/arch_fitness.py

      - name: docs-ssot-lint
        run: python scripts/dev/docs_ssot_lint.py --strict

  # Security & Dependency Scanning
  security-scan:
    needs: guard-temp-scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run security checks
        run: |
          # Security gate policy (see docs/CI_SSOT.md → Security scanning):
          #  - HARD gate for CRITICAL/HIGH = container-scan job (Trivy, exit-code 1).
          #  - safety (dependency CVE advisories) is ADVISORY here (needs triage), non-blocking.
          #  - bandit broad scan (--exit-zero) is ADVISORY; the focused B608 (SQL injection)
          #    pass below is BLOCKING.
          pip install safety bandit
          safety check -r deploy/requirements-server-api.txt --full-report || {
            echo "::warning::safety reported advisories (non-blocking); see full-report above"
          }
          bandit -r app/ -lll --skip B101,B601,B110 --exit-zero
          # B608=SQLi (blocking scan below skips it); B324/B413=cache-key hash & legacy wechat crypto (non-exploit)
          bandit -r app/ -lll -s B608,B324,B413

  # Container image vulnerability scan (built image from CI Dockerfile)
  container-scan:
    needs: [backend-test, frontend-test, frontend-e2e, security-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build --target production -f Dockerfile -t xcagi-ci-scan:local .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: xcagi-ci-scan:local
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # FHD 服务器 API 发布包（tarball + manifest；不含生产 SSH 部署）
  pack-verify:
    needs: [backend-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Verify v10 version anchors
        run: python scripts/dev/verify_version_anchors.py

      - name: Pack FHD server release tarball
        run: bash scripts/deploy/fhd-pack-release.sh

      - name: Upload server release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fhd-server-release
          path: |
            FHD/dist/deploy/fhd-full-*.tar.gz
            FHD/dist/deploy/fhd-manifest.json
          if-no-files-found: error
          retention-days: 14

  # FHD API 生产镜像（xcagi-fhd-api → GHCR；manifest v2 含 image_digest）
  docker-build-fhd-api:
    needs: [backend-test, pack-verify, arch-fitness]
    runs-on: ubuntu-latest
    # image_tag = the exact tag metadata-action produced (rely on outputs.version, not a
    # hand-rolled short sha — see docker/metadata-action#479). Consumed by gitops-image-bump.
    outputs:
      image_tag: ${{ steps.meta_fhd.outputs.version }}
    permissions:
      contents: read
      packages: write
      id-token: write      # cosign keyless (Sigstore OIDC) + provenance
      attestations: write  # actions/attest-build-provenance (SLSA)

    steps:
      - uses: actions/checkout@v4

      # GHCR repo paths must be lowercase; github.repository here is 42433422/XCMAX (mixed case).
      # metadata-action lowercases its own tags, but the manual cosign/SBOM/provenance refs below
      # need an explicit lowercase name to avoid "repository name must be lowercase" failures.
      - name: Compute lowercase FHD API image name
        id: imgref
        run: |
          name="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FHD_API }}"
          echo "name=$(printf '%s' "$name" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Download server release manifest
        uses: actions/download-artifact@v4
        with:
          name: fhd-server-release
          path: FHD/dist/deploy

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract FHD API image metadata
        id: meta_fhd
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.imgref.outputs.name }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=tag,enable=${{ startsWith(github.ref, 'refs/tags/FHD/v') }}

      - name: Build and push xcagi-fhd-api
        id: build_fhd
        uses: docker/build-push-action@v5
        with:
          context: FHD
          file: FHD/docker/Dockerfile.fhd-api
          push: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/FHD/v') }}
          tags: ${{ steps.meta_fhd.outputs.tags }}
          labels: ${{ steps.meta_fhd.outputs.labels }}
          cache-from: type=gha,scope=xcagi-fhd-api
          cache-to: type=gha,mode=max,scope=xcagi-fhd-api

      # ── Supply-chain trust (only when image was pushed → digest present) ──
      - name: Install Cosign
        if: steps.build_fhd.outputs.digest != ''
        uses: sigstore/cosign-installer@v3.7.0

      - name: Sign xcagi-fhd-api image (keyless / Sigstore OIDC)
        if: steps.build_fhd.outputs.digest != ''
        env:
          IMAGE_DIGEST_REF: ${{ steps.imgref.outputs.name }}@${{ steps.build_fhd.outputs.digest }}
        run: cosign sign --yes "${IMAGE_DIGEST_REF}"

      - name: Generate SBOM (SPDX-JSON) for xcagi-fhd-api
        if: steps.build_fhd.outputs.digest != ''
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.imgref.outputs.name }}@${{ steps.build_fhd.outputs.digest }}
          format: spdx-json
          output-file: ${{ runner.temp }}/fhd-api-sbom.spdx.json
          upload-artifact: false

      - name: Attest SBOM to image (cosign)
        if: steps.build_fhd.outputs.digest != ''
        env:
          IMAGE_DIGEST_REF: ${{ steps.imgref.outputs.name }}@${{ steps.build_fhd.outputs.digest }}
          SBOM_FILE: ${{ runner.temp }}/fhd-api-sbom.spdx.json
        run: cosign attest --yes --predicate "${SBOM_FILE}" --type spdxjson "${IMAGE_DIGEST_REF}"

      - name: Generate SLSA build provenance attestation
        if: steps.build_fhd.outputs.digest != ''
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.imgref.outputs.name }}
          subject-digest: ${{ steps.build_fhd.outputs.digest }}
          push-to-registry: true

      - name: Upload SBOM artifact
        if: steps.build_fhd.outputs.digest != ''
        uses: actions/upload-artifact@v4
        with:
          name: fhd-api-sbom
          path: ${{ runner.temp }}/fhd-api-sbom.spdx.json
          if-no-files-found: warn
          retention-days: 14

      - name: Merge image digest into manifest
        if: steps.build_fhd.outputs.digest != ''
        env:
          FHD_IMAGE_REF: ${{ steps.imgref.outputs.name }}
          FHD_IMAGE_DIGEST: ${{ steps.build_fhd.outputs.digest }}
        run: bash scripts/deploy/fhd-merge-manifest-image.sh

      - name: Export image tarball for server bootstrap
        if: steps.build_fhd.outputs.digest != '' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/FHD/v'))
        env:
          FHD_IMAGE_DIGEST: ${{ steps.build_fhd.outputs.digest }}
        run: |
          set -euo pipefail
          mkdir -p dist/deploy
          ref="${{ steps.imgref.outputs.name }}"
          # build-push-action 只推送到 GHCR，本地 daemon 无镜像；先 pull 再 save
          docker pull "${ref}@${FHD_IMAGE_DIGEST}"
          docker save "${ref}@${FHD_IMAGE_DIGEST}" -o dist/deploy/fhd-api-image.tar
          gzip -f dist/deploy/fhd-api-image.tar

      - name: Upload manifest with image digest
        if: steps.build_fhd.outputs.digest != ''
        uses: actions/upload-artifact@v4
        with:
          name: fhd-server-release-with-image
          path: |
            FHD/dist/deploy/fhd-manifest.json
            FHD/dist/deploy/fhd-full-*.tar.gz
            FHD/dist/deploy/fhd-api-image.tar.gz
          if-no-files-found: error
          retention-days: 14

  # GitOps 声明式回写：main 构建成功 → 把 staging overlay 镜像 tag 设为 sha-<gitsha> 并提交回 main，
  # ArgoCD 自动 sync（FHD/gitops/apps/fhd-api-staging.yaml）。opt-in：仅当仓库变量
  # GITOPS_BUMP_ENABLE=1 时启用——main 受保护或集群未接 ArgoCD 时保持关闭，避免直推被拒。
  # 生产 overlay 走 fhd-release-orchestrator / 人工 `bump_image.sh production <tag> --commit` 晋级。
  gitops-image-bump:
    needs: [docker-build-fhd-api]
    if: >-
      vars.GITOPS_BUMP_ENABLE == '1' &&
      needs.docker-build-fhd-api.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: gitops-bump-main
      cancel-in-progress: false
    steps:
      # checkout is NOT rewritten by publish → clones the XCMAX root repo at main HEAD.
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Bump staging overlay image tag (declarative)
        env:
          # Exact tag metadata-action pushed (no short-sha guessing) — see docker-build-fhd-api outputs.
          IMAGE_TAG: ${{ needs.docker-build-fhd-api.outputs.image_tag }}
        run: |
          set -euo pipefail
          [ -n "${IMAGE_TAG}" ] || { echo "::error::empty image_tag from docker-build-fhd-api"; exit 1; }
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # run steps default to working-directory: FHD (injected by publish) → FHD-relative path.
          bash scripts/gitops/bump_image.sh staging "${IMAGE_TAG}" --commit
      - name: Push gitops commit to main
        run: |
          set -euo pipefail
          # GITHUB_TOKEN pushes do NOT retrigger workflows (built-in loop guard); commit also [skip ci].
          git pull --rebase --autostash origin main || true
          if ! git push origin HEAD:main; then
            echo "::warning::gitops push to main rejected (branch protection?). Enable ArgoCD Image Updater or promote via orchestrator instead."
          fi
      - name: Emit GitOps deploy event (DORA)
        if: success()
        run: |
          python3 scripts/observability/emit_deploy_event.py \
            --status success \
            --source-workflow fhd-ci-cd-gitops-image-bump \
            --environment staging \
            --git-sha "${{ github.sha }}"
      - name: Commit GitOps deploy event (DORA)
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metrics/deploy_events.jsonl || true
          git diff --staged --quiet || git commit -m "chore(metrics): gitops staging bump [skip ci]"
          git push || true

  # CVM 拉取式自动 CD（main 成功 + secrets 就绪时 scp manifest/tarball；无 secrets 则跳过）
  cvm-push-release:
    needs: [docker-build-fhd-api]
    if: |
      needs.docker-build-fhd-api.result == 'success' &&
      (
        (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
        (startsWith(github.ref, 'refs/tags/FHD/v') && github.event_name == 'push') ||
        (github.event_name == 'workflow_dispatch' && inputs.push_to_cvm == true)
      )
    runs-on: ubuntu-latest
    environment: ${{ ((github.event_name == 'workflow_dispatch' && inputs.release_channel == 'staging') || (github.event_name == 'push' && contains(github.ref, '-rc'))) && 'staging' || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: fhd-server-release-with-image
          path: FHD/dist/deploy

      - name: Push to CVM update server
        env:
          FHD_PUSH_HOST: ${{ secrets.FHD_PUSH_HOST }}
          FHD_PUSH_USER: ${{ secrets.FHD_PUSH_USER }}
          FHD_PUSH_SSH_KEY_RAW: ${{ secrets.FHD_PUSH_SSH_KEY }}
          FHD_RELEASE_CHANNEL: ${{ github.event_name == 'workflow_dispatch' && inputs.release_channel || (contains(github.ref, '-rc') && 'staging' || 'stable') }}
        run: |
          set -euo pipefail
          if [ -z "${FHD_PUSH_HOST:-}" ] || [ -z "${FHD_PUSH_SSH_KEY_RAW:-}" ]; then
            echo "::notice::Skipping CVM push — configure FHD_PUSH_HOST and FHD_PUSH_SSH_KEY in repo secrets."
            exit 0
          fi
          mkdir -p ~/.ssh
          KEY_FILE="${RUNNER_TEMP}/fhd_push_key"
          printf '%s\n' "$FHD_PUSH_SSH_KEY_RAW" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          FHD_SKIP_PACK=1 \
          FHD_PUSH_SSH_KEY="$KEY_FILE" \
          FHD_PUSH_HOST="$FHD_PUSH_HOST" \
          FHD_PUSH_USER="${FHD_PUSH_USER:-root}" \
          FHD_RELEASE_CHANNEL="${FHD_RELEASE_CHANNEL:-stable}" \
          bash scripts/deploy/fhd-push-release.sh

  # Docker Build & Push
  docker-build:
    needs: [backend-test, frontend-test, frontend-e2e, security-scan, container-scan, pack-verify, arch-fitness]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: FHD
          file: FHD/Dockerfile
          target: production
          push: ${{ github.ref == format('refs/heads/{0}', 'main') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}

  # SSOT drift gate (blocking): drift in any registered SSOT domain fails the pipeline.
  ssot-drift-gate:
    name: SSOT Drift Gate
    needs: guard-temp-scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
