# CI SSOT: generated from FHD/.github/workflows/deploy.yml — edit root copy only.
name: Deploy

on:
  push:
    tags:
      - "FHD/v10.*"
      - "FHD/v*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      strategy:
        description: "Deploy strategy"
        required: true
        default: "rolling"
        type: choice
        options:
          - rolling
          - blue-green
          - canary
      image_digest:
        description: "Optional xcagi-fhd-api digest (sha256:...); default = resolve from git SHA"
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_FHD_API: ${{ github.repository }}/xcagi-fhd-api


defaults:
  run:
    working-directory: FHD

jobs:
  resolve-fhd-api-image:
    runs-on: ubuntu-latest
    outputs:
      fhd_api_image: ${{ steps.resolve.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve xcagi-fhd-api image ref
        id: resolve
        env:
          INPUT_DIGEST: ${{ github.event.inputs.image_digest }}
        run: |
          set -euo pipefail
          REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FHD_API }}"
          if [ -n "${INPUT_DIGEST:-}" ]; then
            IMAGE="${REF}@${INPUT_DIGEST}"
          else
            SHA="$(git rev-parse --short=12 HEAD)"
            IMAGE="${REF}:sha-${SHA}"
          fi
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Resolved FHD API image: ${IMAGE}"

  deploy-staging:
    runs-on: ubuntu-latest
    needs: resolve-fhd-api-image
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/FHD/v') && contains(github.ref, '-rc'))
    environment:
      name: staging
      url: https://staging.xcagi.example.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Configure kubeconfig
        id: kube
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p ~/.kube
          if [ -n "${KUBE_CONFIG_B64}" ]; then
            echo "${KUBE_CONFIG_B64}" | base64 -d > ~/.kube/config
            echo "configured=1" >> "$GITHUB_OUTPUT"
          elif [ -n "${KUBE_CONFIG}" ]; then
            printf '%s\n' "${KUBE_CONFIG}" > ~/.kube/config
            echo "configured=1" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No KUBE_CONFIG / KUBE_CONFIG_B64 — skipping cluster apply (staging)."
            echo "configured=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy FHD API (Kubernetes manifests)
        if: steps.kube.outputs.configured == '1'
        env:
          FHD_API_IMAGE: ${{ needs.resolve-fhd-api-image.outputs.fhd_api_image }}
          K8S_NAMESPACE_INPUT: ${{ vars.K8S_NAMESPACE }}
        run: |
          set -euo pipefail
          NS="${K8S_NAMESPACE_INPUT:-xcagi-staging}"
          TMP="${RUNNER_TEMP}/k8s-staging-${GITHUB_RUN_ID}"
          mkdir -p "${TMP}"
          STRATEGY="${{ github.event.inputs.strategy || 'rolling' }}"
          sed "s|__DEPLOY_BACKEND_IMAGE__|${FHD_API_IMAGE}|g" \
            k8s/deployment.yaml > "${TMP}/deployment.yaml"
          for f in service configmap ingress hpa pdb networkpolicy; do
            cp "k8s/${f}.yaml" "${TMP}/${f}.yaml"
          done
          if [ "$STRATEGY" = "blue-green" ]; then
            sed "s|__DEPLOY_BACKEND_IMAGE__|${FHD_API_IMAGE}|g" \
              k8s/blue-green-deployment.yaml > "${TMP}/blue-green.yaml"
            kubectl apply -f "${TMP}/blue-green.yaml" -n "${NS}" --validate=true
          elif [ "$STRATEGY" = "canary" ]; then
            sed "s|__DEPLOY_BACKEND_IMAGE__|${FHD_API_IMAGE}|g" \
              k8s/canary.yaml > "${TMP}/canary.yaml"
            kubectl apply -f "${TMP}/canary.yaml" -n "${NS}" --validate=true
          else
            kubectl apply -f "${TMP}/configmap.yaml" -n "${NS}" --validate=true
            kubectl apply -f "${TMP}/service.yaml" -n "${NS}" --validate=true
            kubectl apply -f "${TMP}/deployment.yaml" -n "${NS}" --validate=true
            kubectl apply -f "${TMP}/pdb.yaml" -n "${NS}" --validate=true
            kubectl apply -f "${TMP}/networkpolicy.yaml" -n "${NS}" --validate=true
          fi
          kubectl -n "${NS}" set env deployment/xcagi \
            FHD_ENV=staging \
            XCAGI_NEURO_BUS_DEDUP=1 \
            XCAGI_NEURO_BUS_CIRCUIT=1 \
            XCAGI_NEURO_BUS_RATE_LIMIT=1 \
            XCAGI_NEURO_BUS_TRACE=1 \
            XCAGI_NEURO_BUS_TRACE_SAMPLE_RATE=0.1 \
            XCAGI_NEURO_BUS_LIFELINE=1 \
            XCAGI_NEURO_BUS_DLQ_AUTO=1 \
            XCAGI_NEURO_BUS_SLA_LOG=1
          kubectl apply -f "${TMP}/hpa.yaml" -n "${NS}" --validate=true
          kubectl apply -f "${TMP}/ingress.yaml" -n "${NS}" --validate=true
          if [ "$STRATEGY" = "rolling" ]; then
            kubectl -n "${NS}" rollout status deployment/xcagi --timeout=300s
          fi

      - name: Deploy summary (staging)
        if: always()
        run: |
          echo "Staging deploy finished."
          echo "FHD API image: ${{ needs.resolve-fhd-api-image.outputs.fhd_api_image }}"

  deploy-production:
    runs-on: ubuntu-latest
    needs: resolve-fhd-api-image
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'production') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/FHD/v') && !contains(github.ref, '-rc'))
    environment:
      name: production
      url: https://xcagi.example.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Configure kubeconfig
        id: kube
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p ~/.kube
          if [ -n "${KUBE_CONFIG_B64}" ]; then
            echo "${KUBE_CONFIG_B64}" | base64 -d > ~/.kube/config
            echo "configured=1" >> "$GITHUB_OUTPUT"
          elif [ -n "${KUBE_CONFIG}" ]; then
            printf '%s\n' "${KUBE_CONFIG}" > ~/.kube/config
            echo "configured=1" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Production deploy requires KUBE_CONFIG or KUBE_CONFIG_B64 secret."
            echo "configured=0" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Deploy FHD API (Kubernetes manifests)
        if: steps.kube.outputs.configured == '1'
        env:
          FHD_API_IMAGE: ${{ needs.resolve-fhd-api-image.outputs.fhd_api_image }}
          K8S_NAMESPACE_INPUT: ${{ vars.K8S_NAMESPACE }}
        run: |
          set -euo pipefail
          NS="${K8S_NAMESPACE_INPUT:-default}"
          TMP="${RUNNER_TEMP}/k8s-prod-${GITHUB_RUN_ID}"
          mkdir -p "${TMP}"
          STRATEGY="${{ github.event.inputs.strategy || 'rolling' }}"
          sed "s|__DEPLOY_BACKEND_IMAGE__|${FHD_API_IMAGE}|g" \
            k8s/deployment.yaml > "${TMP}/deployment.yaml"
          for f in service configmap ingress hpa pdb networkpolicy; do
            cp "k8s/${f}.yaml" "${TMP}/${f}.yaml"
          done
          if [ "$STRATEGY" = "blue-green" ]; then
            sed "s|__DEPLOY_BACKEND_IMAGE__|${FHD_API_IMAGE}|g" \
              k8s/blue-green-deployment.yaml > "${TMP}/blue-green.yaml"
            kubectl apply -f "${TMP}/blue-green.yaml" -n "${NS}" --validate=true
          elif [ "$STRATEGY" = "canary" ]; then
            sed "s|__DEPLOY_BACKEND_IMAGE__|${FHD_API_IMAGE}|g" \
              k8s/canary.yaml > "${TMP}/canary.yaml"
            kubectl apply -f "${TMP}/canary.yaml" -n "${NS}" --validate=true
          else
            kubectl apply -f "${TMP}/configmap.yaml" -n "${NS}" --validate=true
            kubectl apply -f "${TMP}/service.yaml" -n "${NS}" --validate=true
            kubectl apply -f "${TMP}/deployment.yaml" -n "${NS}" --validate=true
            kubectl apply -f "${TMP}/pdb.yaml" -n "${NS}" --validate=true
            kubectl apply -f "${TMP}/networkpolicy.yaml" -n "${NS}" --validate=true
          fi
          kubectl -n "${NS}" set env deployment/xcagi \
            FHD_ENV=production \
            XCAGI_NEURO_BUS_DEDUP=1 \
            XCAGI_NEURO_BUS_CIRCUIT=1 \
            XCAGI_NEURO_BUS_RATE_LIMIT=1 \
            XCAGI_NEURO_BUS_TRACE=1 \
            XCAGI_NEURO_BUS_TRACE_SAMPLE_RATE=0.1 \
            XCAGI_NEURO_BUS_LIFELINE=1 \
            XCAGI_NEURO_BUS_DLQ_AUTO=1 \
            XCAGI_NEURO_BUS_SLA_LOG=1 \
            XCAGI_AUTH_RATE_LIMIT=1 \
            XCAGI_AUTH_RATE_LIMIT_MAX=10 \
            XCAGI_AUTH_RATE_LIMIT_WINDOW=60
          kubectl apply -f "${TMP}/hpa.yaml" -n "${NS}" --validate=true
          kubectl apply -f "${TMP}/ingress.yaml" -n "${NS}" --validate=true
          if [ "$STRATEGY" = "rolling" ]; then
            kubectl -n "${NS}" rollout status deployment/xcagi --timeout=300s
          fi

      - name: Deploy summary (production)
        if: always()
        run: |
          echo "Production deploy finished."
          echo "FHD API image: ${{ needs.resolve-fhd-api-image.outputs.fhd_api_image }}"