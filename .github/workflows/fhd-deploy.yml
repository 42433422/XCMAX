# CI SSOT: generated from FHD/.github/workflows/deploy.yml — edit root copy only.
name: Deploy

on:
  push:
    tags:
      - "FHD/v*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      strategy:
        description: "Deploy strategy"
        required: true
        default: "rolling"
        type: choice
        options:
          - rolling
          - blue-green
          - canary

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}/backend
  IMAGE_NAME_FRONTEND: ${{ github.repository }}/frontend


defaults:
  run:
    working-directory: FHD
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      backend_image: ${{ steps.deploy-tags.outputs.backend }}
      frontend_image: ${{ steps.deploy-tags.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}
          tags: |
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=ref,event=branch

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          # ⚠️ 已统一主入口至 XCAGI/，Dockerfile 指向 XCAGI/
          context: ./XCAGI
          file: ./Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}
          tags: |
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=ref,event=branch

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resolve primary image refs for deploy
        id: deploy-tags
        env:
          META_BACKEND_JSON: ${{ steps.meta-backend.outputs.json }}
          META_FRONTEND_JSON: ${{ steps.meta-frontend.outputs.json }}
        run: |
          python3 <<'PY'
          import json
          import os

          def pick(raw: str) -> str:
              data = json.loads(raw or "{}")
              tags = data.get("tags") or []
              for t in tags:
                  if "sha-" in t or "@sha256:" in t:
                      return t
              return tags[0] if tags else ""

          backend = pick(os.environ.get("META_BACKEND_JSON", ""))
          frontend = pick(os.environ.get("META_FRONTEND_JSON", ""))
          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a", encoding="utf-8") as fh:
              fh.write(f"backend={backend}\n")
              fh.write(f"frontend={frontend}\n")
          print("backend=", backend)
          print("frontend=", frontend)
          PY

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-rc'))
    environment:
      name: staging
      url: https://staging.xcagi.example.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Configure kubeconfig
        id: kube
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p ~/.kube
          if [ -n "${KUBE_CONFIG_B64}" ]; then
            echo "${KUBE_CONFIG_B64}" | base64 -d > ~/.kube/config
            echo "configured=1" >> "$GITHUB_OUTPUT"
          elif [ -n "${KUBE_CONFIG}" ]; then
            printf '%s\n' "${KUBE_CONFIG}" > ~/.kube/config
            echo "configured=1" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No KUBE_CONFIG / KUBE_CONFIG_B64 — skipping cluster apply."
            echo "configured=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy backend (Kubernetes manifests)
        if: steps.kube.outputs.configured == '1'
        env:
          BACKEND_IMAGE: ${{ needs.build-and-push.outputs.backend_image }}
          K8S_NAMESPACE_INPUT: ${{ vars.K8S_NAMESPACE }}
        run: |
          set -euo pipefail
          NS="${K8S_NAMESPACE_INPUT:-default}"
          TMP="${RUNNER_TEMP}/k8s-staging-${GITHUB_RUN_ID}"
          mkdir -p "${TMP}"
          STRATEGY="${{ github.event.inputs.strategy || 'rolling' }}"
          sed "s|__DEPLOY_BACKEND_IMAGE__|${BACKEND_IMAGE}|g" \
            "${GITHUB_WORKSPACE}/k8s/deployment.yaml" > "${TMP}/deployment.yaml"
          for f in service configmap ingress hpa pdb networkpolicy; do
            cp "${GITHUB_WORKSPACE}/k8s/${f}.yaml" "${TMP}/${f}.yaml"
          done
          if [ "$STRATEGY" = "blue-green" ]; then
            sed "s|__DEPLOY_BACKEND_IMAGE__|${BACKEND_IMAGE}|g" \
              "${GITHUB_WORKSPACE}/k8s/blue-green-deployment.yaml" > "${TMP}/blue-green.yaml"
            kubectl apply -f "${TMP}/blue-green.yaml" -n "${NS}" --validate=true
          elif [ "$STRATEGY" = "canary" ]; then
            sed "s|__DEPLOY_BACKEND_IMAGE__|${BACKEND_IMAGE}|g" \
              "${GITHUB_WORKSPACE}/k8s/canary.yaml" > "${TMP}/canary.yaml"
            kubectl apply -f "${TMP}/canary.yaml" -n "${NS}" --validate=true
          else
            kubectl apply -f "${TMP}/configmap.yaml" -n "${NS}" --validate=true
            kubectl apply -f "${TMP}/service.yaml" -n "${NS}" --validate=true
            kubectl apply -f "${TMP}/deployment.yaml" -n "${NS}" --validate=true
            kubectl apply -f "${TMP}/pdb.yaml" -n "${NS}" --validate=true
            kubectl apply -f "${TMP}/networkpolicy.yaml" -n "${NS}" --validate=true
          fi
          # Staging: FHD_ENV + NeuroBus 去重/熔断（与 app/neuro_bus/bus.py 约定；可用 GET /api/neurobus/health 验证 reliability）
          kubectl -n "${NS}" set env deployment/xcagi \
            FHD_ENV=staging \
            XCAGI_NEURO_BUS_DEDUP=1 \
            XCAGI_NEURO_BUS_CIRCUIT=1 \
            XCAGI_NEURO_BUS_RATE_LIMIT=1 \
            XCAGI_NEURO_BUS_TRACE=1 \
            XCAGI_NEURO_BUS_TRACE_SAMPLE_RATE=0.1 \
            XCAGI_NEURO_BUS_LIFELINE=1 \
            XCAGI_NEURO_BUS_DLQ_AUTO=1 \
            XCAGI_NEURO_BUS_SLA_LOG=1
          kubectl apply -f "${TMP}/hpa.yaml" -n "${NS}" --validate=true
          kubectl apply -f "${TMP}/ingress.yaml" -n "${NS}" --validate=true
          if [ "$STRATEGY" = "rolling" ]; then
            kubectl -n "${NS}" rollout status deployment/xcagi --timeout=300s
          fi

      - name: Deploy summary (staging)
        if: always()
        run: |
          echo "Staging deploy finished."
          echo "Backend image: ${{ needs.build-and-push.outputs.backend_image }}"
          echo "Frontend image: ${{ needs.build-and-push.outputs.frontend_image }}"

  deploy-production:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'production') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-'))
    environment:
      name: production
      url: https://xcagi.example.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Configure kubeconfig
        id: kube
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p ~/.kube
          if [ -n "${KUBE_CONFIG_B64}" ]; then
            echo "${KUBE_CONFIG_B64}" | base64 -d > ~/.kube/config
            echo "configured=1" >> "$GITHUB_OUTPUT"
          elif [ -n "${KUBE_CONFIG}" ]; then
            printf '%s\n' "${KUBE_CONFIG}" > ~/.kube/config
            echo "configured=1" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No KUBE_CONFIG / KUBE_CONFIG_B64 — skipping cluster apply."
            echo "configured=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy backend (Kubernetes manifests)
        if: steps.kube.outputs.configured == '1'
        env:
          BACKEND_IMAGE: ${{ needs.build-and-push.outputs.backend_image }}
          K8S_NAMESPACE_INPUT: ${{ vars.K8S_NAMESPACE }}
        run: |
          set -euo pipefail
          NS="${K8S_NAMESPACE_INPUT:-default}"
          TMP="${RUNNER_TEMP}/k8s-prod-${GITHUB_RUN_ID}"
          mkdir -p "${TMP}"
          STRATEGY="${{ github.event.inputs.strategy || 'rolling' }}"
          sed "s|__DEPLOY_BACKEND_IMAGE__|${BACKEND_IMAGE}|g" \
            "${GITHUB_WORKSPACE}/k8s/deployment.yaml" > "${TMP}/deployment.yaml"
          for f in service configmap ingress hpa pdb networkpolicy; do
            cp "${GITHUB_WORKSPACE}/k8s/${f}.yaml" "${TMP}/${f}.yaml"
          done
          if [ "$STRATEGY" = "blue-green" ]; then
            sed "s|__DEPLOY_BACKEND_IMAGE__|${BACKEND_IMAGE}|g" \
              "${GITHUB_WORKSPACE}/k8s/blue-green-deployment.yaml" > "${TMP}/blue-green.yaml"
            kubectl apply -f "${TMP}/blue-green.yaml" -n "${NS}" --validate=true
          elif [ "$STRATEGY" = "canary" ]; then
            sed "s|__DEPLOY_BACKEND_IMAGE__|${BACKEND_IMAGE}|g" \
              "${GITHUB_WORKSPACE}/k8s/canary.yaml" > "${TMP}/canary.yaml"
            kubectl apply -f "${TMP}/canary.yaml" -n "${NS}" --validate=true
          else
            kubectl apply -f "${TMP}/configmap.yaml" -n "${NS}" --validate=true
            kubectl apply -f "${TMP}/service.yaml" -n "${NS}" --validate=true
            kubectl apply -f "${TMP}/deployment.yaml" -n "${NS}" --validate=true
            kubectl apply -f "${TMP}/pdb.yaml" -n "${NS}" --validate=true
            kubectl apply -f "${TMP}/networkpolicy.yaml" -n "${NS}" --validate=true
          fi
          kubectl -n "${NS}" set env deployment/xcagi \
            FHD_ENV=production \
            XCAGI_NEURO_BUS_DEDUP=1 \
            XCAGI_NEURO_BUS_CIRCUIT=1 \
            XCAGI_NEURO_BUS_RATE_LIMIT=1 \
            XCAGI_NEURO_BUS_TRACE=1 \
            XCAGI_NEURO_BUS_TRACE_SAMPLE_RATE=0.1 \
            XCAGI_NEURO_BUS_LIFELINE=1 \
            XCAGI_NEURO_BUS_DLQ_AUTO=1 \
            XCAGI_NEURO_BUS_SLA_LOG=1 \
            XCAGI_AUTH_RATE_LIMIT=1 \
            XCAGI_AUTH_RATE_LIMIT_MAX=10 \
            XCAGI_AUTH_RATE_LIMIT_WINDOW=60
          kubectl apply -f "${TMP}/hpa.yaml" -n "${NS}" --validate=true
          kubectl apply -f "${TMP}/ingress.yaml" -n "${NS}" --validate=true
          if [ "$STRATEGY" = "rolling" ]; then
            kubectl -n "${NS}" rollout status deployment/xcagi --timeout=300s
          fi

      - name: Deploy summary (production)
        if: always()
        run: |
          echo "Production deploy finished."
          echo "Backend image: ${{ needs.build-and-push.outputs.backend_image }}"
          echo "Frontend image: ${{ needs.build-and-push.outputs.frontend_image }}"

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true