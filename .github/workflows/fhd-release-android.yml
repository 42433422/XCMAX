# CI SSOT: generated from FHD/.github/workflows/release-android.yml — DO NOT edit here.
# Edit that source, then run: python scripts/dev/publish_ci_workflows_to_root.py
name: Release Enterprise Mobile

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (manual dispatch only)
        required: false
        type: string
        default: "10.0.0"
      upload_crashlytics_mapping:
        description: Upload ProGuard mapping to Firebase Crashlytics
        type: boolean
        default: false
      harmony_artifact:
        description: Enterprise HarmonyOS .hap/.hsp path. If empty, scan mobile-harmony/artifacts then mobile-harmony; packaging fails if none is found.
        required: false
        type: string
  # Tag (FHD/v*) entry is centralized in fhd-release-orchestrator.yml (gated on
  # verify-version-anchors, then dispatches this workflow) — avoids the double-run.

permissions:
  contents: write

concurrency:
  group: fhd-release-android-${{ github.ref }}
  cancel-in-progress: true


defaults:
  run:
    working-directory: FHD

jobs:
  assemble-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FHD/mobile-android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Resolve release version
        id: release_version
        run: |
          raw="${{ github.event.inputs.version || github.ref_name }}"
          # For manual runs, default to 10.0.0 to match the project anchor unless the
          # ref itself looks like a version tag.
          if [[ "${raw}" == "main" || "${raw}" == "master" || "${raw}" == "feature"* || -z "${raw}" ]]; then
            raw="10.0.0"
          fi
          raw="${raw#FHD/}"
          raw="${raw#v}"
          raw="${raw#V}"
          if [[ -z "${raw}" ]]; then
            raw="10.0.0"
          fi
          echo "version=${raw}" >> "${GITHUB_OUTPUT}"
      - name: Ensure gradlew executable
        run: chmod +x ./gradlew
      - name: Configure release signing
        id: signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [[ -z "${ANDROID_KEYSTORE_BASE64}" ]]; then
            echo "configured=false" >> "${GITHUB_OUTPUT}"
            echo "::warning::ANDROID_KEYSTORE_BASE64 secret 未配置,release APK 将用 debug key 签名(仅适用于测试,不可用于生产分发)"
          else
            echo "${ANDROID_KEYSTORE_BASE64}" | base64 -d > signing/xcagi-release.jks
            chmod 600 signing/xcagi-release.jks
            echo "configured=true" >> "${GITHUB_OUTPUT}"
            echo "已配置正式签名 keystore"
          fi
      - name: Assemble Release (enterprise only)
        env:
          XCAGI_ANDROID_KEYSTORE: ${{ steps.signing.outputs.configured == 'true' && 'signing/xcagi-release.jks' || '' }}
          XCAGI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          XCAGI_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          XCAGI_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          XCAGI_REQUIRE_RELEASE_SIGNING: ${{ steps.signing.outputs.configured == 'true' && '1' || '0' }}
        run: |
          ./gradlew assembleEnterpriseRelease \
            -PuploadCrashlyticsMapping=${{ github.event.inputs.upload_crashlytics_mapping == true && 'true' || 'false' }} \
            --no-daemon
      - name: Stage mobile package distribution
        run: |
          bash ../mobile-harmony/scripts/stage-release-packages.sh \
            --version "${{ steps.release_version.outputs.version }}" \
            --android-version "${{ steps.release_version.outputs.version }}" \
            --harmony-artifact "${{ github.event.inputs.harmony_artifact || '' }}"
      - name: Upload mobile package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xcagi-enterprise-mobile-release-packages
          path: |
            FHD/mobile-android/app/build/outputs/apk/enterprise/release/*.apk
            release/packages-v${{ steps.release_version.outputs.version }}/enterprise/
            release/packages-v${{ steps.release_version.outputs.version }}/企业版/
            release/XCAGI-Enterprise-Mobile-Packages-v${{ steps.release_version.outputs.version }}.zip
          if-no-files-found: error

  publish-release:
    needs: assemble-release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: xcagi-enterprise-mobile-release-packages
          path: artifacts
      - name: Upload mobile packages to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/**/*
          overwrite_files: true
          append_body: true