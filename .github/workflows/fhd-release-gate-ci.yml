name: Release gate CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  PYTHON_VERSION: "3.11"


defaults:
  run:
    working-directory: FHD

jobs:
  release-gate:
    name: Release gate (hard block)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install test deps
        run: python -m pip install -U pip pytest pytest-mock
      - name: Release contract tests (isolated conftest)
        run: |
          if [ -d tests/release ]; then
            python -m pytest tests/release/ --confcutdir=tests/release -q --tb=short
          else
            echo "tests/release/ 不存在，跳过 isolated contract tests"
          fi
      - name: Release gate manifest
        run: python -m pytest tests/release_gate/ -q --tb=short
