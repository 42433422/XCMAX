# CI SSOT: generated from FHD/.github/workflows/release-orchestrator.yml — DO NOT edit here.
# Edit that source, then run: python scripts/dev/publish_ci_workflows_to_root.py
name: Release Orchestrator

on:
  push:
    tags:
      - "FHD/v10.*"
      - "FHD/v*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment for K8s deploy dispatch"
        required: true
        default: production
        type: choice
        options:
          - staging
          - production

permissions:
  contents: write
  actions: write


defaults:
  run:
    working-directory: FHD

jobs:
  verify-version-anchors:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FHD
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify v10 version anchors
        run: python scripts/dev/verify_version_anchors.py

  github-release:
    needs: verify-version-anchors
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/FHD/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}

  dispatch-k8s-deploy:
    needs: verify-version-anchors
    runs-on: ubuntu-latest
    steps:
      - name: Trigger K8s deploy workflow
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ENV="${{ github.event.inputs.environment || 'production' }}"
          if [[ "${{ github.ref }}" == refs/tags/* ]] && [[ "${{ github.ref }}" == *-rc* ]]; then
            ENV=staging
          fi
          gh workflow run fhd-deploy.yml \
            -f "environment=${ENV}" \
            -f strategy=rolling \
            --ref "${{ github.ref_name }}"

  dispatch-client-releases:
    needs: verify-version-anchors
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Root workflow filenames: `gh workflow run` targets the repo-root
        # .github/workflows/, where these client workflows are published as
        # fhd-release-*.yml. Keep the fhd- prefix or dispatch 404s.
        workflow:
          - fhd-release-desktop.yml
          - fhd-release-web.yml
          - fhd-release-android.yml
    steps:
      - name: Trigger ${{ matrix.workflow }}
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          raw="${{ github.ref_name }}"
          raw="${raw#FHD/}"
          raw="${raw#v}"
          raw="${raw#V}"
          version="${raw:-10.0.0}"
          case "${{ matrix.workflow }}" in
            fhd-release-desktop.yml|fhd-release-web.yml)
              gh workflow run "${{ matrix.workflow }}" --ref "${{ github.ref_name }}" -f "version=${version}"
              ;;
            *)
              gh workflow run "${{ matrix.workflow }}" --ref "${{ github.ref_name }}"
              ;;
          esac
