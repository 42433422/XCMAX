name: Sunbird Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: true
        default: "10.0.0"
      source_ref:
        description: "Git ref with sunbird build scripts"
        required: true
        default: "feat/enterprise-deploy-maturity"

permissions:
  contents: read

defaults:
  run:
    working-directory: FHD

jobs:
  windows:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            FHD/frontend/package-lock.json
            FHD/desktop/package-lock.json
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Install Python deps for seed build
        run: python -m pip install "openpyxl>=3.1"
      - name: Build Sunbird custom installer
        shell: pwsh
        run: |
          $v = "${{ github.event.inputs.version }}".TrimStart('v','V')
          scripts/package/build-sunbird-installer.ps1 -Version $v
      - name: Stage sunbird installer for upload
        shell: pwsh
        run: |
          $v = "${{ github.event.inputs.version }}".TrimStart('v','V')
          $src = "release/xcagi-v$v/sunbird"
          $dst = "build/ci-sunbird-artifact"
          New-Item -ItemType Directory -Force -Path $dst | Out-Null
          Get-ChildItem $src -Filter "*.exe" -File | Where-Object { $_.Name -like "*Setup*" } | Copy-Item -Destination $dst -Force
          if (-not (Get-ChildItem $dst -Filter "*.exe")) { throw "No sunbird Setup exe in $src" }
      - uses: actions/upload-artifact@v4
        with:
          name: sunbird-installer
          path: build/ci-sunbird-artifact/**
