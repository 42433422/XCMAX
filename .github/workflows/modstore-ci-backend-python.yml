# CI SSOT: generated from MODstore_deploy/.github/workflows/ci-backend-python.yml — DO NOT edit here.
# Edit that source, then run: python scripts/dev/publish_ci_workflows_to_root.py
name: CI - Backend Python

on:
  push:
    branches: [main, develop, master]
    paths:
      - "成都修茈科技有限公司/MODstore_deploy/modman/**"
      - "成都修茈科技有限公司/MODstore_deploy/modstore_server/**"
      - "成都修茈科技有限公司/MODstore_deploy/tests/**"
      - "成都修茈科技有限公司/MODstore_deploy/pyproject.toml"
      - "成都修茈科技有限公司/MODstore_deploy/alembic/**"
  pull_request:
    branches: [main, develop, master]
    paths:
      - "成都修茈科技有限公司/MODstore_deploy/modman/**"
      - "成都修茈科技有限公司/MODstore_deploy/modstore_server/**"
      - "成都修茈科技有限公司/MODstore_deploy/tests/**"
      - "成都修茈科技有限公司/MODstore_deploy/pyproject.toml"
      - "成都修茈科技有限公司/MODstore_deploy/alembic/**"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.10"


defaults:
  run:
    working-directory: 成都修茈科技有限公司/MODstore_deploy

jobs:
  release-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[web,dev]"

      - name: Release gate subset (hard)
        run: python -m pytest -m release_gate -q --tb=short

  backend-test:
    runs-on: ubuntu-latest
    needs: [release-gate]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[web,dev]"

      - name: Run Black formatter check
        run: black --check --diff modman/ modstore_server/ tests/

      - name: Run isort check
        run: isort --check-only --diff modman/ modstore_server/ tests/

      - name: Run Flake8 linting
        run: pip install flake8 && flake8 modman/ modstore_server/ tests/

      - name: Run mypy type checking
        run: |
          pip install mypy types-redis types-requests types-pyyaml types-paramiko types-python-dotenv types-passlib types-psutil types-pytz
          pip install -e ../../../packages/xcagi_common
          mypy --no-error-summary

      - name: Run tests with coverage (global floor — ratchet)
        env:
          # 诚实 floor。本地无法实测(xcagi_common 要求 Python>=3.10,沙箱仅 3.9),
          # 取 pyproject 自承的"全量 tree 约 40%+"作保守值。这是棘轮:能挡回归、
          # 不可下调;实测出真实数字后只能上调,不能降。必须与
          # 成都修茈科技有限公司/.github/workflows/modstore-ci-backend-python.yml 的
          # MODSTORE_PY_COVERAGE_FLOOR 保持一致(见 docs/coverage-gates.md)。
          MODSTORE_PY_COVERAGE_FLOOR: '40'
        run: |
          python -m pytest tests/ -v --cov=modman --cov=modstore_server \
            --cov-report=term-missing --cov-report=xml \
            --cov-fail-under=${MODSTORE_PY_COVERAGE_FLOOR}

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: backend
          name: modstore-backend
          fail_ci_if_error: false