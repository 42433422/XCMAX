# CI SSOT: generated from FHD/.github/workflows/mutation-smoke.yml
name: mutation-smoke

on:
  schedule:
    - cron: "0 3 * * 1"  # 每周一 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mutation-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        working-directory: FHD
        run: uv sync --frozen

      - name: Install mutmut
        working-directory: FHD
        run: uv pip install mutmut

      - name: Run mutmut
        working-directory: FHD
        run: mutmut run

      - name: Generate kill report
        working-directory: FHD
        run: python scripts/dev/mutation_kill_report.py --threshold 70

      - name: Upload mutation history
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-history
          path: FHD/metrics/mutation-history.jsonl
          if-no-files-found: warn
