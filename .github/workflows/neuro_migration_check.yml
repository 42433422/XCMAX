name: Neuro-DDD Migration Check

on:
  push:
    branches: [main, develop, feature/neuro-migration]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 2 * * *"

jobs:
  migration-status-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Generate Neuro usage JSON
        working-directory: FHD
        run: |
          python scripts/dev/analyze/analyze_neuro_usage.py \
            --json docs/reports/neuro_usage_latest.json

      - name: Check migration thresholds
        working-directory: FHD
        run: |
          python scripts/ci/check_neuro_migration_thresholds.py \
            --report docs/reports/neuro_usage_latest.json \
            --baseline docs/reports/neuro_usage_baseline.json \
            --min-app-pct 1.0 \
            --min-core-domains 4

      - name: Upload migration report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: neuro-usage-report
          path: FHD/docs/reports/neuro_usage_latest.json

  code-cleanup-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run cleanup analysis
        working-directory: FHD
        run: |
          if [ -f scripts/cleanup_legacy_code.py ]; then
            python scripts/cleanup_legacy_code.py <<< "n" || true
          fi
