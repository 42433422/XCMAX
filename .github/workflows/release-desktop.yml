name: Release Desktop

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: true
        default: "7.0.0"
  push:
    tags:
      - "v7.*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json
      - name: Build Windows installer
        shell: pwsh
        run: scripts/package/build-installer.ps1 -Version "${{ github.event.inputs.version || github.ref_name }}"
      - uses: actions/upload-artifact@v4
        with:
          name: xcagi-desktop-windows
          path: release/desktop-designed-final2/**

  macos:
    runs-on: macos-latest
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json
      - name: Build macOS installer
        shell: bash
        run: scripts/package/build-installer.sh "${{ github.event.inputs.version || github.ref_name }}"
      - uses: actions/upload-artifact@v4
        with:
          name: xcagi-desktop-macos
          path: release/desktop-designed-final2/**

  github-release:
    needs: [windows, macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
