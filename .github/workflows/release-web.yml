name: Release Web Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: true
        default: "7.0.0"
  push:
    tags:
      - "v7.*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./XCAGI
          file: ./XCAGI/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/backend:${{ github.event.inputs.version || github.ref_name }}
            ${{ env.IMAGE_PREFIX }}/backend:latest
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/frontend:${{ github.event.inputs.version || github.ref_name }}
            ${{ env.IMAGE_PREFIX }}/frontend:latest
