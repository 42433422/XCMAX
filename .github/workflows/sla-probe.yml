name: SLA probe (nightly)

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  backend-health-sla:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        working-directory: FHD
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Health endpoint latency probe
        working-directory: FHD
        env:
          XCAGI_SLA_HEALTH_MS: "500"
          SKIP_INTEGRATION: "1"
          DATABASE_URL: sqlite:///:memory:
        run: |
          python -m pytest tests/test_sla_health_probe.py -q

  frontend-sla:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Playwright SLA (relaxed CI budget)
        env:
          XCAGI_SLA_READY_MS: "3000"
          XCAGI_SLA_HEALTH_MS: "500"
        run: |
          npx playwright install chromium --with-deps
          npm run preview -- --port 5001 &
          sleep 3
          PLAYWRIGHT_BASE_URL=http://127.0.0.1:5001 npm run test:e2e -- sla-perf.spec.ts
