# COVERAGE_RAMP：定期提醒补测 + 生成 pytest stub（test-qa-runner）
name: Test QA coverage ramp

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  coverage-ramp-hint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.16"
      - name: Sync dependencies (uv.lock pilot)
        run: uv sync --frozen
      - name: uv lock consistency
        run: uv lock --check
      - name: Full app coverage (observability)
        run: |
          uv run python -m pytest tests/ --cov=app \
            --cov-report=term-missing -q \
            --ignore=tests/neuro/test_routing_policy.py \
            --ignore=tests/test_application/test_app_services.py \
            | tee coverage-ramp.log || true
          uv run python -m pytest tests/ --cov=app --cov-report=xml:coverage-full.xml \
            --cov-report=json:coverage.json \
            --ignore=tests/neuro/test_routing_policy.py \
            --ignore=tests/test_application/test_app_services.py || true
          python scripts/coverage_dual_summary.py \
            --xml coverage-full.xml \
            --json coverage.json \
            --metrics-out metrics/coverage-dual-summary.json \
            --dashboard-out ../xcmax-pytest-coverage.json || true
          python - <<'PY'
          import json
          from pathlib import Path
          try:
              dual = json.loads(Path("metrics/coverage-dual-summary.json").read_text())
              pct = dual["full_app"]["pct"]
              core = dual["measured_core_c1"]["pct"]
          except Exception:
              pct = core = 0.0
          print(f"FULL_APP_COVERAGE_PCT={pct:.1f}")
          print(f"MEASURED_CORE_COVERAGE_PCT={core:.1f}")
          if pct < 40.0:
              print("::warning::Full app coverage below 40% C1 target — see docs/reports/COVERAGE_RAMP.md")
          PY
      - name: Stub generation notice
        run: |
          echo "Use yuangon/quality-and-docs/test-qa-runner skill-generate-pytest-stub for new modules."
          echo "See FHD/docs/reports/COVERAGE_RAMP.md P0 list."
