name: XCAGI CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  guard-temp-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Block new temporary scripts in business dirs
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.base_ref }}"
            git fetch origin "${BASE_REF}" --depth=1
            ADDED_FILES="$(git diff --name-only --diff-filter=A "origin/${BASE_REF}"...HEAD || true)"
          else
            BEFORE_SHA="${{ github.event.before }}"
            if [ -z "${BEFORE_SHA}" ] || [ "${BEFORE_SHA}" = "0000000000000000000000000000000000000000" ]; then
              ADDED_FILES="$(git ls-files)"
            else
              ADDED_FILES="$(git diff --name-only --diff-filter=A "${BEFORE_SHA}" "${{ github.sha }}" || true)"
            fi
          fi

          echo "Added files:"
          echo "${ADDED_FILES}"

          VIOLATIONS=""
          while IFS= read -r file; do
            [ -z "${file}" ] && continue
            if [[ "${file}" == tools/* ]] || [[ "${file}" == archive/* ]]; then
              continue
            fi
            if [[ "${file}" =~ (^|/)_fail.*\.txt$ ]]; then
              VIOLATIONS+="${file}"$'\n'
            fi
            if [[ "${file}" =~ (^|/)产品文件夹/(fix_|check_|final_).+\.py$ ]] || \
               [[ "${file}" =~ ^(fix_|check_|final_).+\.py$ ]]; then
              VIOLATIONS+="${file}"$'\n'
            fi
          done <<< "${ADDED_FILES}"

          if [ -n "${VIOLATIONS}" ]; then
            echo "Found forbidden new artifacts or temporary scripts:"
            echo "${VIOLATIONS}"
            echo "Use tools/, scripts/launchers/, or archive/; do not commit _fail*.txt or fix_*.py at repo root."
            exit 1
          fi

          echo "Temporary script location guard passed."

  backend-erp-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-mock
          pip install -r XCAGI/requirements.lock.txt

      - name: Run ERP facade tests (enterprise SKU surface)
        shell: bash
        run: |
          python -m pytest tests/test_erp_*.py -q --tb=short

  backend-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-mock
          # 可重复构建：优先使用 pip-compile 锁定（见 XCAGI/requirements.lock.txt）
          pip install -r XCAGI/requirements.lock.txt

      - name: Run full test suite with coverage
        run: |
          python -m pytest tests/ \
            --cov=app.neuro_bus --cov=app.middleware --cov=app.fastapi_routes \
            --cov=app.infrastructure.auth --cov=app.utils \
            --cov=app.utils.rate_limiter --cov=app.utils.password_hash --cov=app.config \
            --cov-report=xml --cov-report=html -v \
            --cov-fail-under=70

  backend-test-random-order:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-random-order
          pip install -r XCAGI/requirements.lock.txt

      - name: Stable subset (random order smoke)
        env:
          CI_STABLE_ONLY: "1"
        run: |
          python -m pytest tests/ -q --random-order --random-order-bucket=module

  backend-governance-verify:
    runs-on: ubuntu-latest
    needs: [backend-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Governance deliverable checks
        run: bash scripts/dev/verify_governance_deliverable.sh

      - name: Dual-line SRE gate (phase 6 smoke)
        run: |
          pip install pytest pytest-mock -q
          python scripts/verify_dual_line_sre_gate.py

      - name: Export OpenAPI snapshot
        run: |
          pip install -r XCAGI/requirements.lock.txt
          python - <<'PY'
          from app.fastapi_app import get_fastapi_app
          import json
          app = get_fastapi_app()
          with open('docs/api/openapi.json', 'w', encoding='utf-8') as f:
              json.dump(app.openapi(), f, ensure_ascii=False, indent=2)
          PY

      - name: OpenAPI snapshot drift check (advisory)
        continue-on-error: true
        run: git diff --exit-code docs/api/openapi.json || (echo "OpenAPI snapshot changed"; exit 1)

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: backend
          name: xcagi-backend
          fail_ci_if_error: false

  backend-coverage-report:
    runs-on: ubuntu-latest
    # 全量 app：阶段 1 advisory 45%，阶段 4 全绿后再 fail-under=90 且 continue-on-error: false
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-mock
          pip install -r XCAGI/requirements.lock.txt

      - name: Full app coverage report (COVERAGE_RAMP C1)
        env:
          SKIP_INTEGRATION: "1"
        run: |
          python -m pytest tests/ --cov=app --cov-config=pyproject.toml \
            --cov-report=xml:coverage-full.xml \
            --cov-report=json:coverage.json \
            --cov-report=term-missing -q \
            --ignore=tests/neuro/test_routing_policy.py \
            --continue-on-collection-errors
          python -m coverage report --rcfile=pyproject.toml --fail-under=45
          python - <<'PY'
          import xml.etree.ElementTree as ET
          root = ET.parse("coverage-full.xml").getroot()
          rate = root.attrib.get("line-rate", "0")
          pct = float(rate) * 100
          print(f"FULL_APP_COVERAGE_PCT={pct:.1f}")
          with open("coverage-full-summary.txt", "w", encoding="utf-8") as f:
              f.write(f"full_app_line_coverage_pct={pct:.1f}\n")
          PY

      - name: Read coverage pct for telemetry
        id: coverage_pct
        run: |
          PCT=$(grep -oE '[0-9]+\.[0-9]+' coverage-full-summary.txt | head -1 || echo "100")
          echo "pct=${PCT}" >> "$GITHUB_OUTPUT"

      - name: Upload full-app coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-full-app-coverage
          path: |
            coverage-full.xml
            coverage.json
            coverage-full-summary.txt
          retention-days: 14

      - name: Telemetry coverage_drop (COVERAGE_RAMP C1)
        if: ${{ secrets.XCAGI_MARKET_BASE_URL != '' }}
        env:
          XCAGI_MARKET_BASE_URL: ${{ secrets.XCAGI_MARKET_BASE_URL }}
          XCAGI_TELEMETRY_INGEST_SECRET: ${{ secrets.XCAGI_TELEMETRY_INGEST_SECRET }}
          COVERAGE_PCT: ${{ steps.coverage_pct.outputs.pct }}
        run: |
          set -euo pipefail
          export PYTHONPATH=.
          python3 -c "
          import os
          pct = float(os.environ.get('COVERAGE_PCT', '100'))
          if pct < 40.0:
              from app.services.telemetry_production_bridge import maybe_emit_coverage_drop
              print(maybe_emit_coverage_drop(pct, threshold=40.0))
          "

  backend-integration-test:
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: xcagi
          POSTGRES_PASSWORD: xcagi
          POSTGRES_DB: xcagi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U xcagi"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-mock
          pip install -r XCAGI/requirements.lock.txt

      - name: Run integration tests (no coverage gate)
        env:
          DATABASE_URL: postgresql+psycopg://xcagi:xcagi@127.0.0.1:5432/xcagi
          SKIP_INTEGRATION: "0"
        run: |
          python -m pytest tests/integration -m integration -v --tb=short

  requirements-lock-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pip-tools
        run: pip install pip-tools

      - name: Verify XCAGI/requirements.lock.txt matches requirements.txt
        run: |
          set -euo pipefail
          python -m piptools compile XCAGI/requirements.txt -o XCAGI/requirements.lock.txt --resolver=backtracking
          if ! git diff --exit-code XCAGI/requirements.lock.txt; then
            echo "::error::requirements.lock.txt 与 requirements.txt 不同步。请在仓库根执行:"
            echo "  python -m piptools compile XCAGI/requirements.txt -o XCAGI/requirements.lock.txt --resolver=backtracking"
            exit 1
          fi

  uv-lock-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.16"

      - name: Verify uv.lock matches pyproject.toml
        run: uv lock --check

  requirements-pyproject-ssot:
    name: requirements-*.txt 与 pyproject.toml 同步校验
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Verify requirements-*.txt ↔ pyproject.toml SSOT
        working-directory: FHD
        run: |
          set -euo pipefail
          python scripts/sync_requirements.py --check
          echo "✅ pyproject.toml 是依赖的单一真相源（SSOT）"
          echo "   维护规则：改 pyproject.toml 后运行 python scripts/sync_requirements.py --write"

  domain-registry-integrity:
    name: legacy_/compat_ 域注册表完整性
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install minimal deps
        working-directory: FHD
        run: |
          python -m pip install --quiet fastapi pytest

      - name: Verify domain registry integrity
        working-directory: FHD
        run: |
          set -euo pipefail
          python scripts/dev/verify_no_legacy_shims.py
          python -m app.fastapi_routes.domain_registry
          echo "✅ legacy_/compat_ 路由全部登记入业务域（shim 已删）"

      - name: Run domain registry unit tests
        working-directory: FHD
        run: python -m pytest tests/unit/infrastructure/test_domain_registry.py -v

  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linters
        run: |
          pip install ruff mypy
          pip install -r XCAGI/requirements.lock.txt

      - name: Ruff format check
        run: ruff format --check app/ tests/

      - name: Ruff lint
        run: ruff check app/ tests/

      - name: Run MyPy (P0 modules)
        run: |
          mypy app/infrastructure/auth app/utils/async_compat.py app/utils/redis_cache.py \
            --ignore-missing-imports --no-error-summary

      - name: Run MyPy (full app, advisory)
        continue-on-error: true
        run: mypy app/ --ignore-missing-imports --no-error-summary

      - name: Verify architecture doc consistency
        run: python scripts/verify_arch_doc.py

  backend-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: pip install bandit safety

      - name: Run Bandit
        run: bandit -r app/ -ll --skip B101,B601

      - name: Check dependencies for vulnerabilities
        run: safety check -r XCAGI/requirements.txt --full-report

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run linter
        working-directory: frontend
        run: npm run lint

      - name: Build (generic edition)
        working-directory: frontend
        run: npm run build

      - name: Build (full / enterprise edition)
        working-directory: frontend
        run: npm run build:full

      # vue-tsc 已清零；类型检查失败将阻断 CI
      - name: TypeScript check (vue-tsc)
        continue-on-error: false
        working-directory: frontend
        run: npm run type-check

      - name: TypeScript strict subset (vue-tsc strict + noImplicitAny)
        continue-on-error: false
        working-directory: frontend
        run: npm run type-check:strict

      - name: Run unit tests
        working-directory: frontend
        run: npm run test

      - name: Run unit tests with coverage
        working-directory: frontend
        env:
          CI: "true"
          # 2026-06-03 (Task 6 完成): 前端覆盖率门禁已落地
          # 阶段表（与 docs/reports/COVERAGE_RAMP.md / frontend/vitest.config.js §thresholds 对齐）：
          #   phase 0: 13% lines  ← CI 默认（基线 13.1% 2026-05-31 快照）
          #   phase 1: 25% lines  ← 待补测抬升（v9.0.1 目标）
          #   phase 2: 45% lines  ← v9.1 目标
          #   phase 3: 65% lines  ← v9.2 目标
          #   phase 4: 90% lines  ← v10.0 终态（与后端 90% 对齐）
          # 后端 70% 目标对应 phase 3/4 之间；推进路径见 COVERAGE_RAMP.md
          # 本地预览下一阶段：COVERAGE_PHASE=2 npm run test:coverage
          # 失败行为：未达阈值则 vitest exit 1 → job 失败（无 continue-on-error）
          COVERAGE_PHASE: "0"
        run: npm run test:coverage

      - name: Upload frontend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 14

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  frontend-e2e:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend and start API
        env:
          SECRET_KEY: ci-e2e-secret-key-minimum-32-characters-long
          DATABASE_URL: sqlite:///./e2e_ci.db
          XCAGI_SKIP_INTENT_LLM: "1"
          XCAGI_SQLITE_PER_MOD_COPIES: "0"
        run: |
          pip install -r XCAGI/requirements.lock.txt
          python XCAGI/run.py &
          for i in $(seq 1 40); do
            if curl -sf http://127.0.0.1:5000/api/health >/dev/null; then
              echo "Backend ready"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Backend failed to start on :5000"
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend and Playwright
        working-directory: frontend
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Build and preview frontend
        working-directory: frontend
        run: |
          npm run build
          npm run preview -- --host 127.0.0.1 --port 5001 &
          sleep 8

      - name: Run E2E (P0 critical paths + SLA + desktop shell)
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:5001
          PLAYWRIGHT_API_URL: http://127.0.0.1:5000
          XCAGI_SLA_READY_MS: "3000"
        run: |
          npx playwright test e2e/smoke.spec.ts e2e/login-flow.spec.ts \
            e2e/critical-paths.spec.ts e2e/business-five-flows.spec.ts \
            e2e/sla-perf.spec.ts e2e/desktop-shell.spec.ts \
            e2e/core-business.spec.ts e2e/navigation.spec.ts

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  performance-gate:
    name: k6 smoke gate (PR)
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/performance-smoke.yml
    secrets: inherit

  mod-sandbox-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build mod sandbox image
        run: |
          set -euo pipefail
          chmod +x docker/build-mod-sandbox.sh
          bash docker/build-mod-sandbox.sh
          docker image inspect xcagi-mod-sandbox --format '{{.Id}}' | tee mod-sandbox-image-id.txt

      - name: Upload mod sandbox image id
        uses: actions/upload-artifact@v4
        with:
          name: mod-sandbox-image-id
          path: mod-sandbox-image-id.txt
          retention-days: 7

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, frontend-e2e, requirements-lock-consistency, mod-sandbox-smoke]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: false
          tags: xcagi-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: xcagi-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
