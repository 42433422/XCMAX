name: XCAGI CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  guard-temp-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Block new temporary scripts in business dirs
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.base_ref }}"
            git fetch origin "${BASE_REF}" --depth=1
            ADDED_FILES="$(git diff --name-only --diff-filter=A "origin/${BASE_REF}"...HEAD || true)"
          else
            BEFORE_SHA="${{ github.event.before }}"
            if [ -z "${BEFORE_SHA}" ] || [ "${BEFORE_SHA}" = "0000000000000000000000000000000000000000" ]; then
              ADDED_FILES="$(git ls-files)"
            else
              ADDED_FILES="$(git diff --name-only --diff-filter=A "${BEFORE_SHA}" "${{ github.sha }}" || true)"
            fi
          fi

          echo "Added files:"
          echo "${ADDED_FILES}"

          VIOLATIONS=""
          while IFS= read -r file; do
            [ -z "${file}" ] && continue
            if [[ "${file}" == tools/* ]] || [[ "${file}" == archive/* ]]; then
              continue
            fi
            if [[ "${file}" =~ (^|/)_fail.*\.txt$ ]]; then
              VIOLATIONS+="${file}"$'\n'
            fi
            if [[ "${file}" =~ (^|/)产品文件夹/(fix_|check_|final_).+\.py$ ]] || \
               [[ "${file}" =~ ^(fix_|check_|final_).+\.py$ ]]; then
              VIOLATIONS+="${file}"$'\n'
            fi
          done <<< "${ADDED_FILES}"

          if [ -n "${VIOLATIONS}" ]; then
            echo "Found forbidden new artifacts or temporary scripts:"
            echo "${VIOLATIONS}"
            echo "Use tools/, scripts/launchers/, or archive/; do not commit _fail*.txt or fix_*.py at repo root."
            exit 1
          fi

          echo "Temporary script location guard passed."

  backend-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-mock
          # 可重复构建：优先使用 pip-compile 锁定（见 XCAGI/requirements.lock.txt）
          pip install -r XCAGI/requirements.lock.txt

      - name: Run tests with coverage
        env:
          CI_STABLE_ONLY: "1"
        run: |
          python -m pytest tests/ \
            --cov=app.neuro_bus --cov=app.middleware --cov=app.fastapi_routes \
            --cov=app.utils.rate_limiter --cov=app.utils.password_hash --cov=app.config \
            --cov-report=xml --cov-report=html -v \
            --cov-fail-under=25 \
            --ignore=tests/test_intent.py

      - name: Export OpenAPI snapshot
        run: |
          python - <<'PY'
          from app.fastapi_app import get_fastapi_app
          import json
          app = get_fastapi_app()
          with open('docs/api/openapi.json', 'w', encoding='utf-8') as f:
              json.dump(app.openapi(), f, ensure_ascii=False, indent=2)
          PY

      - name: OpenAPI snapshot drift check (advisory)
        continue-on-error: true
        run: git diff --exit-code docs/api/openapi.json || (echo "OpenAPI snapshot changed"; exit 1)

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: backend
          name: xcagi-backend
          fail_ci_if_error: false

  requirements-lock-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pip-tools
        run: pip install pip-tools

      - name: Verify XCAGI/requirements.lock.txt matches requirements.txt
        run: |
          set -euo pipefail
          python -m piptools compile XCAGI/requirements.txt -o XCAGI/requirements.lock.txt --resolver=backtracking
          if ! git diff --exit-code XCAGI/requirements.lock.txt; then
            echo "::error::requirements.lock.txt 与 requirements.txt 不同步。请在仓库根执行:"
            echo "  python -m piptools compile XCAGI/requirements.txt -o XCAGI/requirements.lock.txt --resolver=backtracking"
            exit 1
          fi

  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linters
        run: |
          pip install flake8 black isort mypy
          pip install -r XCAGI/requirements.lock.txt

      - name: Run Black
        # ⚠️ 已统一主入口至 XCAGI/，代码检查指向 XCAGI/
        run: black --check --diff app/ XCAGI/xcagi_tests/ tests/

      - name: Run isort
        run: isort --check-only --diff app/ XCAGI/xcagi_tests/ tests/

      # 存量 F401/E712 等较多；与 ruff/autoflake 清零后再改为硬失败
      - name: Run Flake8
        continue-on-error: true
        run: flake8 app/ XCAGI/xcagi_tests/ tests/

      # 与包名/存根清理对齐后再改为硬失败
      - name: Run MyPy
        continue-on-error: true
        run: mypy app/ --ignore-missing-imports --no-error-summary
      - name: Verify architecture doc consistency
        continue-on-error: true
        run: python scripts/verify_arch_doc.py

  backend-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: pip install bandit safety

      # 存量告警较多；清零后改为硬失败
      - name: Run Bandit
        continue-on-error: true
        run: bandit -r app/ -ll --skip B101,B601

      - name: Check dependencies for vulnerabilities
        run: safety check -r XCAGI/requirements.txt --full-report || true

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run linter
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

      # 清零 vue-tsc 报错后改为 continue-on-error: false（见 docs/reports/COVERAGE_RAMP.md）
      - name: TypeScript check (vue-tsc)
        continue-on-error: true
        working-directory: frontend
        run: npm run type-check

      - name: Run unit tests
        working-directory: frontend
        run: npm run test

      - name: Run unit tests with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  frontend-e2e:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend and start API
        env:
          SECRET_KEY: ci-e2e-secret-key-minimum-32-characters-long
          DATABASE_URL: sqlite:///./e2e_ci.db
          XCAGI_SKIP_INTENT_LLM: "1"
        run: |
          pip install -r XCAGI/requirements.lock.txt
          python XCAGI/run.py &
          for i in $(seq 1 40); do
            if curl -sf http://127.0.0.1:5000/api/health >/dev/null; then
              echo "Backend ready"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Backend failed to start on :5000"
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend and Playwright
        working-directory: frontend
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Build and preview frontend
        working-directory: frontend
        run: |
          npm run build
          npm run preview -- --host 127.0.0.1 --port 5001 &
          sleep 8

      - name: Run E2E (smoke + core business + navigation)
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:5001
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, frontend-e2e, requirements-lock-consistency]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: false
          tags: xcagi-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: xcagi-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
