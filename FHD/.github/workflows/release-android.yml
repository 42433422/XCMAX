name: Release Android

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (manual dispatch only)
        required: false
        type: string
        default: "10.0.0"
      upload_crashlytics_mapping:
        description: Upload ProGuard mapping to Firebase Crashlytics
        type: boolean
        default: false
      harmony_artifact:
        description: Optional HarmonyOS .hap/.hsp path (enterprise package). If empty, scan mobile-harmony/artifacts then mobile-harmony for latest matching package.
        required: false
        type: string
  # Tag (FHD/v*) entry is centralized in fhd-release-orchestrator.yml (gated on
  # verify-version-anchors, then dispatches this workflow) — avoids the double-run.

permissions:
  contents: write

concurrency:
  group: fhd-release-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  assemble-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Prepare Google Services config
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.XCAGI_ANDROID_GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "${GOOGLE_SERVICES_JSON:-}" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            cat > app/google-services.json <<'JSON'
          {
            "project_info": {
              "project_number": "100000000000",
              "project_id": "xcagi-ci-placeholder",
              "storage_bucket": "xcagi-ci-placeholder.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:100000000000:android:0000000000000000personal",
                  "android_client_info": { "package_name": "com.xiuci.xcagi.mobile.personal" }
                },
                "api_key": [{ "current_key": "ci-placeholder-api-key" }]
              },
              {
                "client_info": {
                  "mobilesdk_app_id": "1:100000000000:android:000000000000000enterprise",
                  "android_client_info": { "package_name": "com.xiuci.xcagi.mobile.enterprise" }
                },
                "api_key": [{ "current_key": "ci-placeholder-api-key" }]
              },
              {
                "client_info": {
                  "mobilesdk_app_id": "1:100000000000:android:0000000000000000",
                  "android_client_info": { "package_name": "com.xiuci.xcagi.mobile" }
                },
                "api_key": [{ "current_key": "ci-placeholder-api-key" }]
              }
            ],
            "configuration_version": "1"
          }
          JSON
          fi
      - name: Resolve release version
        id: release_version
        run: |
          raw="${{ github.event.inputs.version || github.ref_name }}"
          # For manual runs, default to 10.0.0 to match the project anchor unless the
          # ref itself looks like a version tag.
          if [[ "${raw}" == "main" || "${raw}" == "master" || "${raw}" == "feature"* || -z "${raw}" ]]; then
            raw="10.0.0"
          fi
          raw="${raw#FHD/}"
          raw="${raw#v}"
          raw="${raw#V}"
          if [[ -z "${raw}" ]]; then
            raw="10.0.0"
          fi
          echo "version=${raw}" >> "${GITHUB_OUTPUT}"
      - name: Ensure gradlew executable
        run: chmod +x ./gradlew
      - name: Assemble Release (enterprise only)
        run: |
          ./gradlew assembleEnterpriseRelease \
            -PuploadCrashlyticsMapping=${{ github.event.inputs.upload_crashlytics_mapping == true && 'true' || 'false' }} \
            --no-daemon
      - name: Stage mobile package distribution
        run: |
          bash ../mobile-harmony/scripts/stage-release-packages.sh \
            --version "${{ steps.release_version.outputs.version }}" \
            --android-version "${{ steps.release_version.outputs.version }}" \
            --harmony-artifact "${{ github.event.inputs.harmony_artifact || '' }}"
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xcagi-android-release-packages
          path: |
            FHD/mobile-android/app/build/outputs/apk/enterprise/release/*.apk
            release/packages-v${{ steps.release_version.outputs.version }}/enterprise/
            release/XCAGI-Enterprise-Mobile-Packages-v${{ steps.release_version.outputs.version }}.zip
          if-no-files-found: error

  publish-release:
    needs: assemble-release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: xcagi-android-release-packages
          path: artifacts
      - name: Upload mobile packages to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/**/*
          overwrite_files: true
          append_body: true
