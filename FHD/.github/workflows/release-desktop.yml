name: Release Desktop

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: true
        default: "10.0.0"
  # Tag (FHD/v*) entry is centralized in fhd-release-orchestrator.yml, which gates on
  # verify-version-anchors and then dispatches this workflow. Removing the direct tag
  # trigger here eliminates the double-run on tag push.

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            FHD/frontend/package-lock.json
            desktop/package-lock.json
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Build Windows enterprise installer
        shell: pwsh
        run: |
          $raw = "${{ github.event.inputs.version || github.ref_name }}"
          $raw = $raw -replace '^FHD/', ''
          $v = $raw.TrimStart('v','V')
          scripts/package/build-installer.ps1 -Version $v -ProductSku enterprise
      - uses: actions/upload-artifact@v4
        with:
          name: xcagi-desktop-windows
          path: |
            FHD/release/xcagi-v*/enterprise/**

  deploy-windows:
    needs: [windows]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: xcagi-desktop-windows
          path: artifacts
      - name: Upload installers to update server
        env:
          # Unified desktop-upload key: SERVER_SSH_KEY (preferred) with FHD_PUSH_SSH_KEY
          # fallback so a single SSH secret covers both desktop + CVM tarball pushes.
          DESKTOP_SSH_KEY: ${{ secrets.SERVER_SSH_KEY || secrets.FHD_PUSH_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${DESKTOP_SSH_KEY:-}" ]; then
            echo "::notice::No SERVER_SSH_KEY / FHD_PUSH_SSH_KEY secret — skipping desktop upload."
            exit 0
          fi
          HOST="${{ vars.FHD_PUSH_HOST || '119.27.178.147' }}"
          mkdir -p ~/.ssh
          printf '%s\n' "${DESKTOP_SSH_KEY}" > ~/.ssh/id_ci
          chmod 600 ~/.ssh/id_ci
          ssh-keyscan -H "${HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true
          BASE="${GITHUB_WORKSPACE}/artifacts"
          raw="${{ github.event.inputs.version || github.ref_name }}"
          raw="${raw#FHD/}"
          raw="${raw#v}"
          raw="${raw#V}"
          version="${raw:-10.0.0}"
          for sku in enterprise; do
            dir="$(find "$BASE" -type d -path "*/xcagi-v${version}/$sku" -print -quit)"
            if [ ! -d "$dir" ]; then dir="${BASE}/$sku"; fi
            if [ ! -d "$dir" ]; then echo "[skip] no $sku dir"; continue; fi
            dest="/var/www/update/releases/stable/$sku"
            rsync -avz -e "ssh -i ~/.ssh/id_ci -o StrictHostKeyChecking=no" "$dir/" "root@${HOST}:$dest/"
          done

  macos:
    runs-on: macos-latest
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            FHD/frontend/package-lock.json
            desktop/package-lock.json
      - name: Build macOS enterprise installer
        shell: bash
        run: |
          v="${{ github.event.inputs.version || github.ref_name }}"
          v="${v#FHD/}"
          v="${v#v}"
          v="${v#V}"
          scripts/package/build-installer.sh "$v" enterprise
      - uses: actions/upload-artifact@v4
        with:
          name: xcagi-desktop-macos
          path: |
            FHD/release/xcagi-v*/enterprise/**

  deploy-macos:
    needs: [macos]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: xcagi-desktop-macos
          path: artifacts
      - name: Upload macOS installers to update server
        env:
          DESKTOP_SSH_KEY: ${{ secrets.SERVER_SSH_KEY || secrets.FHD_PUSH_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${DESKTOP_SSH_KEY:-}" ]; then
            echo "::notice::No SERVER_SSH_KEY / FHD_PUSH_SSH_KEY secret — skipping macOS upload."
            exit 0
          fi
          HOST="${{ vars.FHD_PUSH_HOST || '119.27.178.147' }}"
          mkdir -p ~/.ssh
          printf '%s\n' "${DESKTOP_SSH_KEY}" > ~/.ssh/id_ci
          chmod 600 ~/.ssh/id_ci
          ssh-keyscan -H "${HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true
          BASE="${GITHUB_WORKSPACE}/artifacts"
          raw="${{ github.event.inputs.version || github.ref_name }}"
          raw="${raw#FHD/}"
          raw="${raw#v}"
          raw="${raw#V}"
          version="${raw:-10.0.0}"
          for sku in enterprise; do
            dir="$(find "$BASE" -type d -path "*/xcagi-v${version}/$sku" -print -quit)"
            if [ ! -d "$dir" ]; then dir="${BASE}/$sku"; fi
            if [ ! -d "$dir" ]; then echo "[skip] no $sku dir"; continue; fi
            dest="/var/www/update/releases/stable/$sku"
            rsync -avz -e "ssh -i ~/.ssh/id_ci -o StrictHostKeyChecking=no" "$dir/" "root@${HOST}:$dest/"
          done

  github-release:
    needs: [windows, macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
