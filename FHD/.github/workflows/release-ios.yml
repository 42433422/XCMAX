name: Release iOS Enterprise

# iOS 签名 + 导出 .ipa 的发版流水线(企业版 scheme)。
# 手动触发(workflow_dispatch)。所需 GitHub secrets(未配置时降级为"未签名归档,仅验证"):
#   IOS_DIST_CERT_P12_BASE64    分发证书 .p12 的 base64(`base64 -i dist.p12 | pbcopy`)
#   IOS_DIST_CERT_PASSWORD      .p12 导出密码
#   IOS_PROVISION_PROFILE_BASE64  描述文件 .mobileprovision 的 base64
#   IOS_TEAM_ID                 Apple Team ID(10 位)
#   IOS_KEYCHAIN_PASSWORD       (可选)临时 keychain 口令,留空则随机
# TestFlight 上传(upload_testflight=true 时另需):
#   APP_STORE_CONNECT_API_KEY_ID / _ISSUER_ID / _KEY_BASE64(.p8 的 base64)
# 详见 mobile-ios/README.md「发版与签名(CI)」。

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (manual dispatch only)
        required: false
        type: string
        default: "10.0.0"
      export_method:
        description: IPA export method
        required: false
        type: choice
        default: app-store
        options:
          - app-store
          - ad-hoc
          - development
      upload_testflight:
        description: Upload IPA to TestFlight (needs App Store Connect API key secrets)
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: fhd-release-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  archive-export:
    runs-on: macos-14
    defaults:
      run:
        working-directory: mobile-ios
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Resolve release version
        id: release_version
        run: |
          set -euo pipefail
          raw="${{ github.event.inputs.version || github.ref_name }}"
          if [[ "${raw}" == "main" || "${raw}" == "master" || "${raw}" == "feature"* || -z "${raw}" ]]; then
            raw="10.0.0"
          fi
          raw="${raw#FHD/}"; raw="${raw#v}"; raw="${raw#V}"
          [[ -z "${raw}" ]] && raw="10.0.0"
          echo "version=${raw}" >> "${GITHUB_OUTPUT}"
      - name: Configure code signing
        id: signing
        env:
          CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD_IN: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${CERT_P12_BASE64:-}" || -z "${PROFILE_BASE64:-}" ]]; then
            echo "configured=false" >> "${GITHUB_OUTPUT}"
            echo "::warning::iOS 签名 secret(IOS_DIST_CERT_P12_BASE64 / IOS_PROVISION_PROFILE_BASE64)未配置,只产出未签名 .xcarchive 用于验证,不导出可分发 .ipa"
            exit 0
          fi
          KEYCHAIN="${RUNNER_TEMP}/xcagi-signing.keychain-db"
          KCPW="${KEYCHAIN_PASSWORD_IN:-}"
          [[ -z "${KCPW}" ]] && KCPW="xcagi-ci-${GITHUB_RUN_ID}"
          security create-keychain -p "${KCPW}" "${KEYCHAIN}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN}"
          security unlock-keychain -p "${KCPW}" "${KEYCHAIN}"
          echo "${CERT_P12_BASE64}" | base64 -d > "${RUNNER_TEMP}/cert.p12"
          security import "${RUNNER_TEMP}/cert.p12" -P "${CERT_PASSWORD}" -A -t cert -f pkcs12 -k "${KEYCHAIN}"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KCPW}" "${KEYCHAIN}" >/dev/null
          security list-keychains -d user -s "${KEYCHAIN}" login.keychain-db
          # 安装描述文件并解析其 Name/UUID(供 ExportOptions / manual signing 用)
          echo "${PROFILE_BASE64}" | base64 -d > "${RUNNER_TEMP}/profile.mobileprovision"
          security cms -D -i "${RUNNER_TEMP}/profile.mobileprovision" > "${RUNNER_TEMP}/profile.plist"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "${RUNNER_TEMP}/profile.plist")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "${RUNNER_TEMP}/profile.plist")
          PROFILE_DIR="${HOME}/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "${PROFILE_DIR}"
          cp "${RUNNER_TEMP}/profile.mobileprovision" "${PROFILE_DIR}/${PROFILE_UUID}.mobileprovision"
          {
            echo "configured=true"
            echo "profile_name=${PROFILE_NAME}"
            echo "keychain=${KEYCHAIN}"
          } >> "${GITHUB_OUTPUT}"
          echo "已导入分发证书 + 描述文件: ${PROFILE_NAME} (${PROFILE_UUID})"
      - name: Archive (signed)
        if: steps.signing.outputs.configured == 'true'
        env:
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          PROFILE_NAME: ${{ steps.signing.outputs.profile_name }}
          VERSION: ${{ steps.release_version.outputs.version }}
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project XCAGIMobile.xcodeproj \
            -scheme XCAGIMobile \
            -destination 'generic/platform=iOS' \
            -archivePath "${RUNNER_TEMP}/XCAGIMobile.xcarchive" \
            MARKETING_VERSION="${VERSION}" \
            CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}" \
            DEVELOPMENT_TEAM="${TEAM_ID}" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="${PROFILE_NAME}" \
            -quiet
      - name: Export IPA
        if: steps.signing.outputs.configured == 'true'
        env:
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          PROFILE_NAME: ${{ steps.signing.outputs.profile_name }}
          METHOD: ${{ github.event.inputs.export_method || 'app-store' }}
        run: |
          set -euo pipefail
          PLIST="${RUNNER_TEMP}/ExportOptions.plist"
          {
            echo '<?xml version="1.0" encoding="UTF-8"?>'
            echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">'
            echo '<plist version="1.0"><dict>'
            echo "<key>method</key><string>${METHOD}</string>"
            echo "<key>teamID</key><string>${TEAM_ID}</string>"
            echo '<key>signingStyle</key><string>manual</string>'
            echo '<key>provisioningProfiles</key><dict>'
            echo "<key>com.xiuci.xcagi.mobile.enterprise</key><string>${PROFILE_NAME}</string>"
            echo '</dict>'
            echo '<key>stripSwiftSymbols</key><true/>'
            echo '<key>compileBitcode</key><false/>'
            echo '</dict></plist>'
          } > "${PLIST}"
          xcodebuild -exportArchive \
            -archivePath "${RUNNER_TEMP}/XCAGIMobile.xcarchive" \
            -exportOptionsPlist "${PLIST}" \
            -exportPath "${RUNNER_TEMP}/export" \
            -quiet
          ls -la "${RUNNER_TEMP}/export"
      - name: Archive (unsigned fallback — verification only)
        if: steps.signing.outputs.configured == 'false'
        env:
          VERSION: ${{ steps.release_version.outputs.version }}
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project XCAGIMobile.xcodeproj \
            -scheme XCAGIMobile \
            -destination 'generic/platform=iOS' \
            -archivePath "${RUNNER_TEMP}/XCAGIMobile.xcarchive" \
            MARKETING_VERSION="${VERSION}" \
            CODE_SIGNING_ALLOWED=NO \
            -quiet
      - name: Upload to TestFlight
        if: ${{ steps.signing.outputs.configured == 'true' && github.event.inputs.upload_testflight == 'true' }}
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          ASC_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          if [[ -z "${ASC_KEY_ID:-}" || -z "${ASC_ISSUER_ID:-}" || -z "${ASC_KEY_BASE64:-}" ]]; then
            echo "::error::upload_testflight=true 但 App Store Connect API key secrets 未配置"; exit 1
          fi
          mkdir -p "${HOME}/.appstoreconnect/private_keys"
          echo "${ASC_KEY_BASE64}" | base64 -d > "${HOME}/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          IPA=$(ls "${RUNNER_TEMP}/export"/*.ipa | head -1)
          xcrun altool --upload-app -f "${IPA}" -t ios \
            --apiKey "${ASC_KEY_ID}" --apiIssuer "${ASC_ISSUER_ID}"
      - name: Upload IPA artifact
        if: steps.signing.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: xcagi-enterprise-ios-release-ipa
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: error
      - name: Cleanup keychain
        if: ${{ always() && steps.signing.outputs.configured == 'true' }}
        run: security delete-keychain "${{ steps.signing.outputs.keychain }}" || true

  publish-release:
    needs: archive-export
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: xcagi-enterprise-ios-release-ipa
          path: artifacts
      - name: Attach IPA to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/**/*.ipa
          append_body: true
