name: Secret scan (blocking)

# 在每次 push / PR 上阻断式扫描新引入的密钥。
# 既有 fhd-security-metrics-collect 只在 schedule/dispatch 跑、且只采集指标不拦截，
# 无法在合并点拦下一次新泄漏（历史上 mobile_relay_desktop.json 含 token 即被提交）。
# 本门用同一 gitleaks-action：在 pull_request 上仅扫描该 PR 的提交范围，
# 发现即以非零码失败（阻断），不会重复命中历史里已移除的旧 token。

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks (fail on any new leak)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
          GITLEAKS_ENABLE_COMMENTS: "false"
