id: attendance-ai
name: 考勤 AI 助手
version: "1.0.0"
domain: 协助处理出勤记录、异常说明与排班相关问答；后续可接入考勤系统 API 与状态轮询。当前为占位员工（workflow_placeholder），仅展示说明步骤。
owner: admin
area: workflow-extension
security_level: personal
is_public: true

scope_globs:
  - FHD-个人/mods/taiyangniao-pro/manifest.json
  - FHD-个人/XCAGI/mods/taiyangniao-pro/manifest.json

forbidden_globs:
  - FHD-个人/app/fastapi_routes/xcagi_compat_chat_helpers.py

triggers:
  on_error: true
  on_quality_fail: false
  on_coverage_miss: false
  max_patch_budget_tokens: 2000
  max_patch_steps: 3

sla:
  timeout_seconds: 60
  retry_max: 1
  escalate_to_human: true

llm_default: "auto"
llm_reasoning: "auto"

skills:
  - skills/skill-attendance-qa.md

capabilities:
  - label: 出勤记录查询
    description: 查询员工出勤记录、迟到早退统计
  - label: 异常说明处理
    description: 协助处理考勤异常说明的提交与审核
  - label: 排班问答
    description: 回答排班相关问题，提供排班建议

examples:
  - title: 查询出勤记录
    description: 查询指定员工的出勤记录
    input:
      action: query
      employee_id: "EMP-001"
      date_range: "2026-05"
  - title: 提交异常说明
    description: 提交考勤异常说明
    input:
      action: submit_exception
      employee_id: "EMP-001"
      date: "2026-05-10"
      reason: "交通延误"
  - title: 排班查询
    description: 查询排班信息
    input:
      action: query_schedule
      department: "生产部"
      week: "2026-W20"

depends_on: []

changelog:
  - version: "1.0.0"
    date: "2026-05-14"
    note: "初始创建：从 FHD-个人 taiyangniao-pro Mod manifest 中提取"
