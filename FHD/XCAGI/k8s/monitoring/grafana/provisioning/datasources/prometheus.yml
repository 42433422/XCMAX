# ===========================================
# Grafana 数据源配置
# ===========================================
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      manageAlerts: true
      prometheusType: Prometheus

  - name: XCAGI-Internal
    type: prometheus
    access: proxy
    url: http://host.docker.internal:5000
    isDefault: false
    editable: true
    jsonData:
      httpMethod: GET
