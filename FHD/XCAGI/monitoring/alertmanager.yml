global:
  resolve_timeout: 5m
  smtp_smarthost: 'localhost:25'
  smtp_from: 'alertmanager@xcagi.com'

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default-receiver'
  routes:
    - match:
        severity: critical
      receiver: 'critical-receiver'
    - match:
        severity: warning
      receiver: 'warning-receiver'

receivers:
  - name: 'default-receiver'
    email_configs:
      - to: 'admin@xcagi.com'
        send_resolved: true

  - name: 'critical-receiver'
    email_configs:
      - to: 'oncall@xcagi.com'
        send_resolved: true
        html: |
          <h2>🚨 严重告警</h2>
          <p><strong>告警名称:</strong> {{ .GroupLabels.alertname }}</p>
          <p><strong>告警级别:</strong> {{ .CommonLabels.severity }}</p>
          <p><strong>告警描述:</strong> {{ .CommonAnnotations.description }}</p>
          <p><strong>发生时间:</strong> {{ .StartsAt }}</p>

  - name: 'warning-receiver'
    email_configs:
      - to: 'dev@xcagi.com'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
