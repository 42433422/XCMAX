# ============================================================================
# 模型统一 SSOT — 唯一真相源 (Model Registry Single Source of Truth)
# ----------------------------------------------------------------------------
# 这是「模型 / 厂商 / 模态 / 计费」的唯一真相源。下游全部派生、禁止手改：
#   - FHD/config/models.generated.json                  (FHD 运行时只读)
#   - 成都修茈科技有限公司/MODstore_deploy/modstore_server/config/models.generated.json
#   - 成都修茈科技有限公司/MODstore_deploy/market/src/config/modelsGenerated.ts
# 派生由 `python FHD/scripts/dev/ssot_cli.py sync models --apply` 重生，
# `python FHD/scripts/dev/ssot_cli.py check models` 验证一致（CI 门禁）。
#
# 设计边界（避免「地基比楼宽」）：
#   * 本文件只管「有限的、手维护的真相」：厂商连接信息、默认模型、模态分类规则、
#     计费默认价。各厂商的「动态模型清单」仍由运行时 /models API 发现，不进 SSOT，
#     只拿这里的规则去分类（classification）与定价（pricing）。
#   * image/video/ocr/tts 已建好 modality + pricing 槽位，但不在此预建上游调用客户端。
# ============================================================================
version: 1

# --- 计费模态枚举（顺序即展示顺序）-------------------------------------------
modalities: [llm, vlm, image, video, ocr, tts, embedding, other]

modality_labels:
  llm: 语言大模型 (LLM)
  vlm: 视觉 / 多模态 (VLM)
  image: 图像生成
  video: 视频生成
  ocr: 文字识别 (OCR)
  tts: 语音合成 (TTS)
  embedding: 向量嵌入 (Embedding)
  other: 其他

# 哪些模态支持「试聊 / 对话」（派生 taxonomy.supports_trial_chat）
chat_capable_modalities: [llm, vlm]

# --- 平台厂商解析优先级（MODstore KNOWN_PROVIDERS 的真相源）------------------
# 顺序敏感：llm_api 按此序取「首个有密钥且能拉到模型」的厂商做自动选型。
# 必须等于 catalog_listed=true 的厂商全集（providers[] 的展示顺序另作 UI 用途，互不影响）。
known_provider_order:
  [openai, deepseek, anthropic, google, siliconflow, dashscope, moonshot,
   xiaomi, minimax, doubao, wenxin, hunyuan, zhipu, xunfei, yi, stepfun,
   baichuan, sensetime, groq, together, openrouter]

# --- FHD 网关路由顺序（registry._DEFAULT_ORDER 的真相源）---------------------
gateway:
  default_order: [modstore, openai_compatible, deepseek_legacy, openai_sdk]
  # 用户可见 provider id → FHD registry provider class id（registry._PROVIDER_ID_ALIASES）
  registry_aliases:
    xcauto: openai_compatible
    xcauto-account: openai_compatible
    xcauto-default: openai_compatible
    xiuci: openai_compatible
    xiuci-account: openai_compatible
    openai: openai_compatible
    deepseek: openai_compatible

# --- 计费默认价（按模态兜底；DB AiModelPrice 仍是按模型的活真相）------------
# token 模式：input_per_1k / output_per_1k；其余模式：per_unit + unit。
# 金额单位为「元」，字符串以避免 YAML 浮点精度问题。
pricing:
  service_fee_multiplier: "1.5"        # COSER_SERVICE_FEE_MULTIPLIER
  preauth_floor: "0.05"                # COSER_DEFAULT_PREAUTH_CHARGE
  defaults_by_modality:
    llm:
      mode: token
      input_per_1k: "0.006"            # COSER_DEFAULT_INPUT_PRICE_PER_1K
      output_per_1k: "0.018"           # COSER_DEFAULT_OUTPUT_PRICE_PER_1K
      min_charge: "0.02"               # COSER_DEFAULT_MIN_CHARGE
    vlm:
      mode: token
      input_per_1k: "0.006"
      output_per_1k: "0.018"
      min_charge: "0.02"
    embedding:
      mode: token
      input_per_1k: "0.0005"
      output_per_1k: "0"
      min_charge: "0.001"
    image:
      mode: per_image
      per_unit: "0.30"
      unit: image
      min_charge: "0.30"
    video:
      mode: per_second
      per_unit: "0.50"
      unit: second
      min_charge: "1.00"
    ocr:
      mode: per_page
      per_unit: "0.01"
      unit: page
      min_charge: "0.01"
    tts:
      mode: per_unit
      per_unit: "0.002"
      unit: kchar                      # 每千字符
      min_charge: "0.01"
  # 按具体模型覆盖默认价（留空槽位；DB AiModelPrice 是线上活真相，此处仅做引导种子）。
  model_overrides: []

# --- 模态分类规则（llm_model_taxonomy.classify_model 的真相源）---------------
# 算法顺序敏感，消费者须按：exclude_other → video → image → vlm(全局) →
# provider 专属(google/anthropic) → 聚合网关专属 → 默认 llm。
classification:
  default: llm
  # 明确「非对话主场景」→ other（嵌入/审核/老补全/检索/语音转写等）
  exclude_other_keywords:
    [embedding, text-embedding, moderation, davinci, babbage, text-search,
     ada-002, ada-001, whisper, tts, transcribe, "speech-", rerank, "rank_"]
  # openai 厂商下 model 以 ada 开头 → other
  openai_ada_prefix_other: true
  # 视频（全局命名，优先于生图，避免 wan2.*-i2v 被误判生图）
  video_keywords:
    [sora, "veo-", "veo_", veo2, veo3, video-generation, videogen,
     text-to-video, text2video, image-to-video, cogvideo, cogvideox, kling,
     seedance, hailuo, runway, luma, minimax-video, video-01, "-i2v", "-t2v",
     "i2v-", "t2v-", wan-i2v, hunyuan-video]
  # 图像（全局命名）
  image_keywords:
    [dall-e, dall_e, dalle, gpt-image, gpt_image, imagen, image-generation,
     text-to-image, text2image, image-to-image, image-preview,
     stable-diffusion, sdxl, sd3, "flux.", "flux-", "flux/", "flux.1",
     seedream, jimeng, cogview, kolors, wanx, wan2, playground-v2, recraft,
     ideogram, midjourney]
  # 多模态 / 视觉（全局）
  vlm_keywords:
    [vision, "vl-", vlm, deepseek-vl, qwen-vl, llava, omni, gpt-4o, "gpt-4.1",
     gpt-4-turbo]
  # provider 专属规则
  provider_rules:
    google:
      image_keywords: [imagen]
      video_keywords: [veo]
      # gemini 前缀且非 embed → vlm
      vlm_prefixes: [gemini-1.5, gemini-2]
    anthropic:
      vlm_keywords: [claude-3, claude-sonnet, claude-opus]
  # 聚合网关 / OpenAI 兼容厂商专属规则
  aggregator_providers:
    [siliconflow, together, groq, openrouter, dashscope, moonshot, xiaomi,
     minimax, doubao, wenxin, hunyuan, zhipu, xunfei, yi, stepfun, baichuan,
     sensetime]
  aggregator_image_keywords:
    [stable-diffusion, sdxl, "flux.", "flux/", flux-1, "flux.1", text-to-image,
     image-to-image, kolors, playground-v2, dall-e, wanx, text2image, wan2,
     seedream]
  aggregator_video_keywords:
    [text-to-video, image-to-video, video-generation, cogvideox, wan-i2v,
     kling, i2v, t2v, video-01, hailuo, seedance]
  aggregator_other_keywords: [embed, "bge-", "/rerank", reranker]
  aggregator_vlm_keywords:
    [vl, vision, qwen-vl, llava, "glm-4.5v", "glm-4.6", omni]
  # minimax 下 speech/voice/music → other
  minimax_media_other_keywords: [speech, voice, music]

# --- 厂商真相（合并 FHD llm_adapter + MODstore llm_key_resolver + 前端 6 处副本）
# 字段说明：
#   dispatch        : 统一网关如何调用 (openai_compatible | anthropic | google | proprietary)
#   models_api      : 列模型的 API 风格 (openai | anthropic | google | none)
#   gateway_provider: FHD registry 由哪个 provider class 承接
#   env_keys        : 平台密钥 env（按序取首个非空）
#   base_url_env_keys: base_url 覆盖 env（按序取首个非空）
#   aliases         : 归一到本 id 的别名
#   byok_custom_base_url: BYOK 是否允许自定义 base_url
#   catalog_listed  : 是否在 BYOK 模型目录里枚举（自有网关 xcauto 不枚举）
providers:
