    gateway_provider: openai_compatible
    env_keys: [XCAUTO_API_KEY, XCAUTO_PAT, XIUCI_API_KEY, OPENAI_API_KEY]
    base_url_env_keys: [XCAUTO_BASE_URL, OPENAI_BASE_URL]
    aliases: [xcauto-account, xcauto-default, xiuci, xiuci-account]
    default_model: xcauto-account
    byok_custom_base_url: false
    catalog_listed: false
    icon_slug: openai
