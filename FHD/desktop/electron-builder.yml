appId: com.xcagi.desktop
productName: XCAGI
copyright: Copyright © 2026 XCAGI
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
beforePack: build/before-pack.cjs
# 正式产物仅写入 release/xcagi-v{version}/{personal|enterprise}/（build-installer.ps1 -ProductSku 必填）
directories:
  output: ../release/_electron-staging
files:
  - dist/**
  - package.json
  - resources/icon.ico
  - resources/icon.png
extraResources:
  - from: ../dist/xcagi-backend
    to: backend
    filter:
      - "**/*"
  # 前端 vue-dist 已由 PyInstaller 内嵌进 backend/_internal/templates/vue-dist，
  # 且运行时由后端 HTTP 提供(main.ts desktopInitialUrl→FastAPI mount)，
  # 这里不再单独再打一份 frontend(原先重复 ~56MB)。main.ts:337 的 cache-hash
  # 兜底会优雅降级到后端内嵌副本。切勿恢复成单独 frontend extraResource。
  - from: resources/product-sku.json
    to: product-sku.json
publish:
  provider: generic
  url: https://update.xcagi.com/releases/stable/
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
  icon: resources/icon.ico
  signAndEditExecutable: true
nsis:
  artifactName: XCAGI-Setup-${version}-${arch}.${ext}
  shortcutName: XCAGI
  uninstallDisplayName: XCAGI 桌面版
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  displayLanguageSelector: false
  installerLanguages:
    - zh_CN
  language: "2052"
  unicode: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  menuCategory: XCAGI
  runAfterFinish: true
  deleteAppDataOnUninstall: false
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico
  installerHeader: resources/installer-header.bmp
  installerSidebar: resources/installer-sidebar.bmp
  include: build/installer.nsh
  license: ../LICENSE
  warningsAsErrors: false
mac:
  target:
    - dmg
    - pkg
    - zip
  category: public.app-category.business
  icon: resources/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  identity: null
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: XCAGI 需要使用麦克风进行语音输入和语音转写。
  notarize: false
dmg:
  sign: false
afterSign: build/notarize.cjs
