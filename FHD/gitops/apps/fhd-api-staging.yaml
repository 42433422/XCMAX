# xcagi-fhd-api — staging (auto-sync). Image tag bumped by scripts/gitops/bump_image.sh.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fhd-api-staging
  namespace: argocd
  annotations:
    # After argo-rollouts (-2) + monitoring (-1): Rollout/AnalysisTemplate CRDs exist first.
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: xcagi
    environment: staging
spec:
  project: default
  source:
    repoURL: https://github.com/42433422/XCMAX.git
    targetRevision: main
    path: FHD/k8s/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: xcagi-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
