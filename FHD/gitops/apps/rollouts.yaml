# Argo Rollouts controller (progressive delivery, Phase 3). Installed declaratively via
# the official Helm chart so the controller + dashboard + CRDs are GitOps-managed.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-rollouts
  namespace: argocd
  annotations:
    # Install controller + CRDs first so fhd-api-* (wave 0) can create Rollout/AnalysisTemplate CRs.
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: xcagi
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-rollouts
    targetRevision: 2.37.7
    helm:
      releaseName: argo-rollouts
      values: |
        dashboard:
          enabled: true
        controller:
          metrics:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argo-rollouts
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
