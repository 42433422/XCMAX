{{- if and .Values.monitoring.enabled .Values.monitoring.k6.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-7day-contract
  namespace: {{ include "xcagi.namespace" . }}
  labels:
    {{- include "xcagi.labels" . | nindent 4 }}
    app: k6
data:
  # SSOT: FHD/scripts/observability/k6_7d_contract.js (copied into chart files/).
  # Regenerate the copy after editing the SSOT:
  #   cp FHD/scripts/observability/k6_7d_contract.js FHD/helm/xcagi/files/k6_7d_contract.js
  k6_7d_contract.js: |-
{{ .Files.Get "files/k6_7d_contract.js" | indent 4 }}
{{- end }}
