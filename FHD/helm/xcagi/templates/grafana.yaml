{{- if and .Values.monitoring.enabled .Values.monitoring.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: {{ include "xcagi.namespace" . }}
  labels:
    {{- include "xcagi.labels" . | nindent 4 }}
    app: grafana
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
      {{- if .Values.monitoring.loki.enabled }}
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki:{{ .Values.monitoring.loki.port }}
      {{- end }}
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'xcagi'
        folder: 'xcagi'
        type: file
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: {{ include "xcagi.namespace" . }}
  labels:
    {{- include "xcagi.labels" . | nindent 4 }}
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        {{- include "xcagi.selectorLabels" . | nindent 8 }}
        app: grafana
    spec:
      containers:
        - name: grafana
          image: {{ include "xcagi.image" (dict "repository" .Values.monitoring.grafana.image.repository "tag" .Values.monitoring.grafana.image.tag) }}
          imagePullPolicy: {{ .Values.monitoring.grafana.image.pullPolicy }}
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: {{ .Values.monitoring.grafana.adminPassword | quote }}
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-prov
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
          resources:
            {{- toYaml .Values.monitoring.grafana.resources | nindent 12 }}
      volumes:
        - name: datasources
          configMap:
            name: grafana-provisioning
            items:
              - key: datasources.yaml
                path: datasources.yaml
        - name: dashboards-prov
          configMap:
            name: grafana-provisioning
            items:
              - key: dashboards.yaml
                path: dashboards.yaml
        # Dashboard JSONs are loaded out-of-band as ConfigMap "grafana-dashboards"
        # (deploy_k8s_staging.sh builds it from k8s/monitoring/grafana/dashboards
        # via `kubectl create configmap --from-file`). Optional here so the chart
        # installs cleanly even before that ConfigMap exists.
        - name: dashboards
          configMap:
            name: grafana-dashboards
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: {{ include "xcagi.namespace" . }}
  labels:
    {{- include "xcagi.labels" . | nindent 4 }}
    app: grafana
spec:
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: {{ .Values.monitoring.grafana.nodePort }}
  selector:
    app: grafana
{{- end }}
