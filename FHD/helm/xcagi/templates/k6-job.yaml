{{- if and .Values.monitoring.enabled .Values.monitoring.k6.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: k6-7day
  namespace: {{ include "xcagi.namespace" . }}
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: k6
          image: {{ .Values.monitoring.k6.image }}
          args: [run, /scripts/k6_7d_contract.js]
          env:
            - name: K6_DURATION
              value: {{ .Values.monitoring.k6.duration | quote }}
          volumeMounts:
            - name: k6-script
              mountPath: /scripts
      volumes:
        - name: k6-script
          configMap:
            name: k6-7day-contract
{{- end }}
