{{- if and .Values.monitoring.enabled .Values.monitoring.loki.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loki-data
  namespace: {{ include "xcagi.namespace" . }}
  labels:
    {{- include "xcagi.labels" . | nindent 4 }}
    app: loki
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: {{ .Values.storageClassName }}
  resources:
    requests:
      storage: {{ .Values.monitoring.loki.pvcSize }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-conf
  namespace: {{ include "xcagi.namespace" . }}
  labels:
    {{- include "xcagi.labels" . | nindent 4 }}
    app: loki
data:
  loki.yml: |
    auth_enabled: false
    server:
      http_listen_port: {{ .Values.monitoring.loki.port }}
    ingester:
      lifecycler:
        address: 127.0.0.1
      chunk_idle_period: 5m
    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    storage_config:
      tsdb_shipper:
        active_index_directory: /data/loki/index
        cache_location: /data/loki/index_cache
      filesystem:
        directory: /data/loki/chunks
    compactor:
      working_directory: /data/loki/compactor
      compaction_interval: 10m
      retention_enabled: true
      delete_request_store: filesystem
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: {{ include "xcagi.namespace" . }}
  labels:
    {{- include "xcagi.labels" . | nindent 4 }}
    app: loki
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        {{- include "xcagi.selectorLabels" . | nindent 8 }}
        app: loki
    spec:
      containers:
        - name: loki
          image: {{ include "xcagi.image" (dict "repository" .Values.monitoring.loki.image.repository "tag" .Values.monitoring.loki.image.tag) }}
          imagePullPolicy: {{ .Values.monitoring.loki.image.pullPolicy }}
          args:
            - '-config.file=/etc/loki/loki.yml'
          ports:
            - containerPort: {{ .Values.monitoring.loki.port }}
          volumeMounts:
            - name: loki-config
              mountPath: /etc/loki
            - name: loki-storage
              mountPath: /data
          resources:
            {{- toYaml .Values.monitoring.loki.resources | nindent 12 }}
      volumes:
        - name: loki-config
          configMap:
            name: loki-conf
        - name: loki-storage
          persistentVolumeClaim:
            claimName: loki-data
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: {{ include "xcagi.namespace" . }}
  labels:
    {{- include "xcagi.labels" . | nindent 4 }}
    app: loki
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.monitoring.loki.port }}
      targetPort: {{ .Values.monitoring.loki.port }}
  selector:
    app: loki
{{- end }}
