{{- if and .Values.monitoring.enabled .Values.monitoring.promtail.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: {{ include "xcagi.namespace" . }}
  labels:
    {{- include "xcagi.labels" . | nindent 4 }}
    app: promtail
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "xcagi.namespace" . }}-promtail-read
  labels:
    {{- include "xcagi.labels" . | nindent 4 }}
    app: promtail
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/proxy, services, endpoints, pods]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "xcagi.namespace" . }}-promtail-read
  labels:
    {{- include "xcagi.labels" . | nindent 4 }}
    app: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "xcagi.namespace" . }}-promtail-read
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: {{ include "xcagi.namespace" . }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-conf
  namespace: {{ include "xcagi.namespace" . }}
  labels:
    {{- include "xcagi.labels" . | nindent 4 }}
    app: promtail
data:
  promtail.yml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
    positions:
      filename: /run/promtail/positions.yaml
    clients:
      - url: http://loki:{{ .Values.monitoring.loki.port }}/loki/api/v1/push
    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace]
            action: keep
            regex: ({{ include "xcagi.namespace" . }}|monitoring)
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - action: replace
            replacement: /var/log/pods/*$1/*.log
            separator: /
            source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
            target_label: __path__
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: {{ include "xcagi.namespace" . }}
  labels:
    {{- include "xcagi.labels" . | nindent 4 }}
    app: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        {{- include "xcagi.selectorLabels" . | nindent 8 }}
        app: promtail
    spec:
      serviceAccountName: promtail
      containers:
        - name: promtail
          image: {{ include "xcagi.image" (dict "repository" .Values.monitoring.promtail.image.repository "tag" .Values.monitoring.promtail.image.tag) }}
          imagePullPolicy: {{ .Values.monitoring.promtail.image.pullPolicy }}
          args:
            - -config.file=/etc/promtail/promtail.yml
          volumeMounts:
            - name: promtail-config
              mountPath: /etc/promtail
            - name: pods-logs
              mountPath: /var/log/pods
              readOnly: true
            - name: positions
              mountPath: /run/promtail
          resources:
            {{- toYaml .Values.monitoring.promtail.resources | nindent 12 }}
      volumes:
        - name: promtail-config
          configMap:
            name: promtail-conf
        - name: pods-logs
          hostPath:
            path: /var/log/pods
        - name: positions
          emptyDir: {}
{{- end }}
