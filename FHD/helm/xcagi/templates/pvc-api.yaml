{{- if and .Values.api.enabled .Values.api.persistence.enabled (not .Values.api.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: xcagi-data
  namespace: {{ include "xcagi.namespace" . }}
  labels:
    {{- include "xcagi.labels" . | nindent 4 }}
    app: xcagi
spec:
  accessModes:
    - ReadWriteOnce
  {{- $sc := .Values.api.persistence.storageClass | default .Values.storageClassName }}
  {{- if $sc }}
  storageClassName: {{ $sc }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.api.persistence.size }}
{{- end }}
