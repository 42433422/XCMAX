global:
  namespace: xcagi-staging

# Let the chart create the target namespace (mirrors deploy_k8s_staging.sh 00-namespace.yaml).
# Set to false if installing with `helm install --namespace ... --create-namespace`.
createNamespace: true

api:
  replicas: 1
  image:
    repository: xcagi-fhd-api
    tag: staging
    pullPolicy: Never

monitoring:
  enabled: true
  k6:
    enabled: true
    duration: 168h

storageClassName: local-path
