global:
  namespace: xcagi-staging

# Create the target namespace as part of the release (mirrors
# deploy_k8s_staging.sh 00-namespace.yaml). Disable when installing with
# `helm install --namespace <ns> --create-namespace` to avoid ownership clashes.
createNamespace: true

# Override the chart name used in the app.kubernetes.io/name label.
nameOverride: ""

# StorageClass used by every PersistentVolumeClaim in this chart.
storageClassName: local-path

# Image pull secrets for private registries (applied to api + redis pods).
# e.g. [{name: xcagi-registry}]. Leave empty for public / node-local images.
imagePullSecrets: []

# Sensitive config kept in a Secret (NOT the ConfigMap). The API reads these via
# envFrom secretRef. Admin creds (api.admin.*) are always sourced here.
secrets:
  # Render a chart-managed Secret from api.admin.* + secrets.extra below.
  create: true
  # Name of a pre-created Secret to use instead (overrides `create`). Must carry
  # ADMIN_USERNAME / ADMIN_PASSWORD and any keys the app expects (e.g. DATABASE_URL).
  existingSecret: ""
  # Extra key→value pairs added to the chart Secret. Put credentialed values here
  # (DB URLs with passwords, third-party API keys) instead of in api.config.
  extra: {}

# ---------------------------------------------------------------------------
# FHD API — the deployed application.
# Mirrors deploy_k8s_staging.sh `03-fhd-api.yaml` (Deployment "xcagi" + Service
# "xcagi-service"). Container listens on 5000; Service exposes it on NodePort.
# ---------------------------------------------------------------------------
api:
  enabled: true
  image:
    # The kubectl path builds the image locally and uses imagePullPolicy: Never.
    # When pushing to a registry, set repository to e.g. xcagi/fhd-api and a real tag.
    repository: xcagi-fhd-api
    tag: staging
    pullPolicy: Never
  replicas: 2
  containerPort: 5000
  service:
    type: NodePort
    port: 80
    nodePort: 30080
  # Persistent volume for /app/data (SQLite db, uploads). Disabled by default
  # (staging uses ephemeral storage). Enable for prod-on-SQLite; not needed when
  # DATABASE_URL points at external Postgres.
  persistence:
    enabled: false
    size: 5Gi
    storageClass: ""        # "" → falls back to top-level storageClassName
    existingClaim: ""        # use a pre-created PVC instead of rendering one
    mountPath: /app/data
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  probes:
    startup:
      path: /health/liveness
      periodSeconds: 10
      failureThreshold: 36
      timeoutSeconds: 5
    liveness:
      path: /health/liveness
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 6
    readiness:
      path: /health/readiness
      periodSeconds: 15
      timeoutSeconds: 10
      failureThreshold: 8
  # Extra envFrom sources (e.g. existing Secrets). The chart-managed ConfigMap
  # below is always mounted first; entries here are appended.
  envFrom: []
  # Application configuration rendered into ConfigMap "xcagi-config" and mounted
  # via envFrom. Mirrors deploy_k8s_staging.sh `02-configmap.yaml`.
  config:
    redis_url: "redis://redis-service:6379"
    REDIS_URL: "redis://redis-service:6379/0"
    CACHE_REDIS_URL: "redis://redis-service:6379"
    ENABLE_RASA: "0"
    DATABASE_URL: "sqlite:////app/data/staging.db"
    FHD_SKIP_ALEMBIC: "1"
    flask_env: "production"
    FHD_ENV: "production"
    log_level: "INFO"
    XCAGI_NEURO_BUS_DEDUP: "1"
    XCAGI_NEURO_BUS_CIRCUIT: "1"
    XCAGI_NEURO_BUS_RATE_LIMIT: "1"
    XCAGI_NEURO_BUS_TRACE: "1"
    XCAGI_NEURO_BUS_TRACE_SAMPLE_RATE: "0.1"
    XCAGI_NEURO_BUS_LIFELINE: "1"
    XCAGI_NEURO_BUS_DLQ_AUTO: "1"
    XCAGI_NEURO_BUS_SLA_LOG: "1"
    # Shipment write path goes event-primary on staging (canary before flipping the
    # global XCAGI_EVENT_PRIMARY default). Fail-safe: degrades to direct writes if the
    # bus is down. Mirrored from deploy_k8s_staging.sh `02-configmap.yaml`.
    XCAGI_EVENT_PRIMARY_SHIPMENT: "1"
    XCAGI_GLOBAL_RATE_LIMIT: "1"
    XCAGI_GLOBAL_RATE_LIMIT_MAX: "300"
    XCAGI_GLOBAL_RATE_LIMIT_WINDOW: "60"
    XCAGI_GUNICORN_WORKERS: "2"
  # Admin bootstrap credentials. CHANGEME for production — prefer a Secret
  # referenced via api.envFrom instead of committing real values here.
  admin:
    username: "admin"
    password: "staging-admin"

# ---------------------------------------------------------------------------
# Redis — cache / NeuroBus backend.
# Mirrors deploy_k8s_staging.sh `01-redis.yaml`.
# ---------------------------------------------------------------------------
redis:
  enabled: true
  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent
  port: 6379
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ---------------------------------------------------------------------------
# Observability stack.
# ---------------------------------------------------------------------------
monitoring:
  enabled: true

  prometheus:
    enabled: true
    image:
      repository: prom/prometheus
      tag: v2.53.0
      pullPolicy: IfNotPresent
    retention: 8d
    pvcSize: 15Gi
    nodePort: 30090
    scrapeInterval: 15s
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 2Gi

  grafana:
    enabled: true
    image:
      repository: grafana/grafana
      tag: 10.2.0
      pullPolicy: IfNotPresent
    nodePort: 30300
    # CHANGEME for production — prefer GF_SECURITY_ADMIN_PASSWORD from a Secret.
    adminPassword: admin123
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi

  loki:
    enabled: true
    image:
      repository: grafana/loki
      tag: 3.0.0
      pullPolicy: IfNotPresent
    pvcSize: 10Gi
    port: 3100
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

  promtail:
    enabled: true
    image:
      repository: grafana/promtail
      tag: 3.0.0
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

  k6:
    enabled: false
    image:
      repository: grafana/k6
      tag: 0.50.0
      pullPolicy: IfNotPresent
    duration: 168h
    baseUrl: "http://xcagi-service:80"
    user: "admin"
    # CHANGEME for production.
    password: "admin123"
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
