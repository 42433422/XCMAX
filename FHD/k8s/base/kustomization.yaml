# GitOps base (image-agnostic). Aggregates the sibling manifests in ../ so overlays can
# reference a single base (resources: ../../base) without the kustomize ancestor-cycle that
# `resources: ../..` triggers. The container image is the literal sentinel
# __DEPLOY_BACKEND_IMAGE__; pin it per-env in FHD/k8s/overlays/<env> via the images:
# transformer (scripts/gitops/bump_image.sh).
#
# Referencing files in the parent dir needs `--load-restrictor LoadRestrictionsNone`
# (ArgoCD: set in argocd-cm by scripts/gitops/bootstrap_argocd.sh; locally pass the flag).
# Manifests intentionally stay at FHD/k8s/*.yaml — deploy.yml sed + docs reference them there.
# This is the single base (the old FHD/k8s/kustomization.yaml was removed to avoid two bases).
# Manual full-stack apply (non-GitOps, image still the sentinel):
#   kubectl apply -k FHD/k8s/base --load-restrictor LoadRestrictionsNone
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../deployment.yaml
  - ../service.yaml
  - ../configmap.yaml
  - ../ingress.yaml
  - ../hpa.yaml
  - ../pdb.yaml
  - ../networkpolicy.yaml
