apiVersion: v1
kind: ConfigMap
metadata:
  name: xcagi-config
data:
  redis_url: "redis://redis-service:6379"
  flask_env: "production"
  log_level: "INFO"
  FHD_ENV: "production"
  # NeuroBus 生产可靠性全开（与 README 7 大机制 / GET /api/neurobus/health 一致）
  XCAGI_NEURO_BUS_DEDUP: "1"
  XCAGI_NEURO_BUS_CIRCUIT: "1"
  XCAGI_NEURO_BUS_RATE_LIMIT: "1"
  XCAGI_NEURO_BUS_TRACE: "1"
  XCAGI_NEURO_BUS_TRACE_SAMPLE_RATE: "0.1"
  XCAGI_NEURO_BUS_LIFELINE: "1"
  XCAGI_NEURO_BUS_DLQ_AUTO: "1"
  XCAGI_NEURO_BUS_SLA_LOG: "1"
  XCAGI_NEURO_BUS_RETRY: "1"
  # SLA 采集
  XCAGI_NEURO_BUS_SLA_COLLECT: "1"
  # NN 路由策略：影子模式（记录 NN 决策但不实际路由，回退规则路由）
  # 切换灰度：改为 "1" + XCAGI_ROUTING_POLICY_CANARY_RATIO="0.1"
  # 全量接管：改为 "1" + XCAGI_ROUTING_POLICY_CANARY_RATIO="1.0"
  XCAGI_ROUTING_POLICY_ENABLED: "shadow"
  XCAGI_ROUTING_POLICY_CANARY_RATIO: "0.0"
  # Redis transport（staging 用 streams 灰度）
  XCAGI_NEURO_BUS_REDIS_TRANSPORT: "streams"
  # OTel exporter
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.observability:4317"
  OTEL_SERVICE_NAME: "xcagi-neurobus"
  # HTTP 限流
  XCAGI_GLOBAL_RATE_LIMIT: "1"
  XCAGI_GLOBAL_RATE_LIMIT_MAX: "300"
  XCAGI_GLOBAL_RATE_LIMIT_WINDOW: "60"
  XCAGI_AUTH_RATE_LIMIT: "1"
  XCAGI_AUTH_RATE_LIMIT_MAX: "10"
  XCAGI_AUTH_RATE_LIMIT_WINDOW: "60"
  CACHE_REDIS_URL: "redis://redis-service:6379"
  # Tunables (production defaults). The Rollout (FHD/k8s/rollouts) sources these via envFrom so
  # overlays can override them with a ConfigMap patch (CRD-safe; strategic-merge on a Rollout
  # container list isn't). deployment.yaml still sets them explicitly to the same values.
  XCAGI_GUNICORN_WORKERS: "4"
  XCAGI_QUERY_CACHE_BACKEND: "redis"
  XCAGI_CHAT_STREAM_MAX_PER_POD: "50"
