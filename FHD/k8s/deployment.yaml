apiVersion: apps/v1
kind: Deployment
metadata:
  name: xcagi
  labels:
    app: xcagi
    version: v10.0.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: xcagi
  template:
    metadata:
      labels:
        app: xcagi
        version: v10.0.0
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: xcagi
        # Replaced by CI (fhd-deploy.yml sed) — ghcr.io/<org>/<repo>/xcagi-fhd-api:sha-<git> or @sha256:...
        image: __DEPLOY_BACKEND_IMAGE__
        ports:
        - containerPort: 5000
          name: http
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        env:
        - name: XCAGI_ENV
          value: "production"
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: xcagi-config
              key: redis_url
        - name: DEEPSEEK_API_KEY
          valueFrom:
            secretKeyRef:
              name: xcagi-secrets
              key: deepseek_api_key
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
        livenessProbe:
          httpGet:
            path: /health/liveness
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/readiness
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
