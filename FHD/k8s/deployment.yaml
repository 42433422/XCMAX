apiVersion: apps/v1
kind: Deployment
metadata:
  name: xcagi
  labels:
    app: xcagi
    version: v10.0.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: xcagi
  template:
    metadata:
      labels:
        app: xcagi
        version: v10.0.0
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: xcagi
        # Replaced by CI (fhd-deploy.yml sed) — ghcr.io/<org>/<repo>/xcagi-fhd-api:sha-<git> or @sha256:...
        image: __DEPLOY_BACKEND_IMAGE__
        ports:
        - containerPort: 5000
          name: http
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        # Full reliability/env baseline (FHD_ENV + NeuroBus DEDUP/CIRCUIT/RATE_LIMIT/
        # TRACE/LIFELINE/DLQ_AUTO/SLA_LOG + HTTP/auth rate limits) sourced from the
        # ConfigMap so every apply path (GitOps / kubectl apply / Argo Rollouts)
        # enables it — not only the imperative `kubectl set env` in fhd-deploy.yml.
        envFrom:
        - configMapRef:
            name: xcagi-config
        env:
        - name: XCAGI_ENV
          value: "production"
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: xcagi-config
              key: redis_url
        - name: DEEPSEEK_API_KEY
          valueFrom:
            secretKeyRef:
              name: xcagi-secrets
              key: deepseek_api_key
        - name: XCAGI_GUNICORN_WORKERS
          value: "4"
        - name: XCAGI_QUERY_CACHE_BACKEND
          value: "redis"
        - name: XCAGI_CHAT_STREAM_MAX_PER_POD
          value: "50"
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        livenessProbe:
          httpGet:
            path: /health/liveness
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/readiness
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
