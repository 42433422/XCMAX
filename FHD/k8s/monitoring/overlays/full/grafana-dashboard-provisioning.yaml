apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provisioning
  namespace: monitoring
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: xcagi
        orgId: 1
        folder: XCAGI
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
