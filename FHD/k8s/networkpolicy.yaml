apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: xcagi-network-policy
  labels:
    app: xcagi
  annotations:
    # 默认拒绝所有入站/出站流量，仅以下规则显式放行。
    # 收紧原则：namespaceSelector + podSelector 组合，禁止空 namespaceSelector:{}。
    # 部署后需验证业务连通性，若 Redis/PostgreSQL 标签不同请按需调整 selector。
spec:
  podSelector:
    matchLabels:
      app: xcagi
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # 仅允许同命名空间内 nginx-ingress 控制器访问 5000 端口
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: xcagi
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 5000
  egress:
    # Redis：仅允许访问带 app=redis 标签的 Pod
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: xcagi
          podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    # PostgreSQL：仅允许访问带 app=postgres 标签的 Pod
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: xcagi
          podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    # HTTPS 出站：调用外部 API（OpenAI/支付宝/微信等）必需
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: xcagi
      ports:
        - protocol: TCP
          port: 443
    # DNS 解析：kube-system 内 kube-dns
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
