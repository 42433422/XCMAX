apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Per-PR preview (CI replaces PR_PREVIEW_NAMESPACE + image tag). Uses base Deployment
# (no Rollouts CRD) for fast ephemeral namespaces.
resources:
  - ../../base

namespace: xcagi-pr-REPLACE

labels:
  - pairs:
      environment: preview
    includeSelectors: false

patches:
  - path: replicas-patch.yaml
  - path: resources-patch.yaml
  - path: config-patch.yaml

images:
  - name: __DEPLOY_BACKEND_IMAGE__
    newName: ghcr.io/42433422/xcmax/xcagi-fhd-api
    newTag: pr-REPLACE
