apiVersion: apps/v1
kind: Deployment
metadata:
  name: xcagi
spec:
  template:
    spec:
      containers:
        - name: xcagi
          env:
            - name: XCAGI_GUNICORN_WORKERS
              value: "2"
            - name: XCAGI_QUERY_CACHE_BACKEND
              value: "redis"
            - name: DATABASE_READ_URL
              valueFrom:
                configMapKeyRef:
                  name: xcagi-config
                  key: database_read_url
                  optional: true
            - name: XCAGI_CHAT_STREAM_MAX_PER_POD
              value: "30"
