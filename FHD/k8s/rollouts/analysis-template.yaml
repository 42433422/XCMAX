# SLO gate for the canary — reuses the Prometheus recording rules in
# FHD/k8s/monitoring/prometheus/recording_rules.yml (no new metrics). A measurement that
# breaches the threshold (beyond failureLimit) fails the AnalysisRun → Rollout aborts + rolls back.
#
# Queries are service-aggregate (recording rules aren't split by canary hash); since basic-canary
# routes a replica-proportional slice of live traffic to the new pods, a bad canary still drives
# the aggregate error ratio / p95 up and trips the gate. For per-canary precision later, add a
# `rollouts-pod-template-hash` label to the metrics and pass {{args.canary-hash}} into the query.
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: xcagi-slo-gate
spec:
  args:
    - name: prometheus-address
      value: "http://prometheus.monitoring.svc.cluster.local:9090"
    - name: error-ratio-threshold   # SLOBudgetBurningFast critical = 5% 5xx (recording_rules.yml)
      value: "0.05"
    - name: p95-threshold-seconds   # generous API p95 canary gate (SLO-API-02 login target is 0.5s)
      value: "1.5"
  metrics:
    - name: api-error-ratio
      interval: 30s
      count: 3
      failureLimit: 1
      # `or vector(0)` → zero-traffic windows read 0 (pass) instead of empty (Inconclusive/stall).
      successCondition: result[0] < {{args.error-ratio-threshold}}
      provider:
        prometheus:
          address: "{{args.prometheus-address}}"
          query: |
            xcagi:api_error_ratio:rate5m or vector(0)
    - name: api-latency-p95
      interval: 30s
      count: 3
      failureLimit: 1
      successCondition: result[0] < {{args.p95-threshold-seconds}}
      provider:
        prometheus:
          address: "{{args.prometheus-address}}"
          query: |
            xcagi:api_latency_p95:5m or vector(0)
