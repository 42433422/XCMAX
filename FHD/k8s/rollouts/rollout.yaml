# Argo Rollouts canary for xcagi-fhd-api — replaces the Deployment on the GitOps track.
# Pod spec mirrors FHD/k8s/deployment.yaml 1:1 (keep them in sync). Basic canary (no service
# mesh): setWeight controls the canary REPLICA share; the shared xcagi-service splits traffic
# roughly by replica count. SLO analysis gates each step; a failed AnalysisRun aborts + rolls back.
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: xcagi
  labels:
    app: xcagi
    version: v10.0.0
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: xcagi
  strategy:
    canary:
      maxSurge: "25%"
      maxUnavailable: 0
      # 20% → SLO gate → 50% → SLO gate → 100%. analysis failure ⇒ auto-abort (rollback to stable).
      steps:
        - setWeight: 20
        - pause: { duration: 60s }
        - analysis:
            templates:
              - templateName: xcagi-slo-gate
        - setWeight: 50
        - pause: { duration: 60s }
        - analysis:
            templates:
              - templateName: xcagi-slo-gate
        - setWeight: 100
  template:
    metadata:
      labels:
        app: xcagi
        version: v10.0.0
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: xcagi
        # Replaced by the kustomize images: transformer in overlays (matches __DEPLOY_BACKEND_IMAGE__).
        image: __DEPLOY_BACKEND_IMAGE__
        ports:
        - containerPort: 5000
          name: http
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        # envFrom carries FHD_ENV + NeuroBus + rate limits + the tunables
        # (XCAGI_GUNICORN_WORKERS / QUERY_CACHE / CHAT_STREAM). Overlays override per-env by
        # patching the xcagi-config ConfigMap (CRD-safe), not the Rollout container list.
        envFrom:
        - configMapRef:
            name: xcagi-config
        env:
        - name: XCAGI_ENV
          value: "production"
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: xcagi-config
              key: redis_url
        - name: DEEPSEEK_API_KEY
          valueFrom:
            secretKeyRef:
              name: xcagi-secrets
              key: deepseek_api_key
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        livenessProbe:
          httpGet:
            path: /health/liveness
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/readiness
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
