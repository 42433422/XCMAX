# XcodeGen 工程定义 —— 修茈企业 iOS App(对标 mobile-android / mobile-harmony)。
#
# 本机无 Xcode 时无法生成 .xcodeproj;在装有 Xcode 的 Mac 上执行:
#   brew install xcodegen      # 一次性
#   cd FHD/mobile-ios && xcodegen generate
#   open XCAGIMobile.xcodeproj
# 然后选 XCAGIMobile scheme 直接 Cmd+R 运行(模拟器/真机)。
#
# 无第三方依赖:仅用 SwiftUI / Foundation / Network / Security / LocalAuthentication。

name: XCAGIMobile

options:
  bundleIdPrefix: com.xiuci.xcagi.mobile
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""           # 真机构建时填你的 Apple Team ID
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  XCAGIMobile:
    type: application
    platform: iOS
    sources:
      - path: XCAGIMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xiuci.xcagi.mobile.enterprise
        PRODUCT_NAME: XCAGIMobile
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: XCAGIMobile/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"   # 1 = iPhone
        SUPPORTS_MACCATALYST: NO
