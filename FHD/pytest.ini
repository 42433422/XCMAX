[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short -p no:xdist
markers =
    integration: 集成测试
    e2e: 端到端测试
    release_gate: release train hard gate subset
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::DeprecationWarning

[coverage:run]
# 窄包统计见 pyproject.toml [tool.coverage.run]；勿在此设 source=app（会触发全量 import + ORM 重复注册）
omit =
    */tests/*
    */migrations/*
    */__pycache__/*
    */venv/*
    */virtualenv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    pass
    @abstractmethod
    if DEBUG:

[coverage:html]
directory = htmlcov
show_contexts = True
