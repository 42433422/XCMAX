{{- if .Values.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: xcagi-pdb
  labels:
    {{- include "xcagi.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "xcagi.selectorLabels" . | nindent 6 }}
{{- end }}
