apiVersion: v1
kind: Service
metadata:
  name: xcagi-service
  labels:
    {{- include "xcagi.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "xcagi.selectorLabels" . | nindent 4 }}
