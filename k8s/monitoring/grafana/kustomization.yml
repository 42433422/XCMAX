apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

resources:
  - grafana-deployment.yml

configMapGenerator:
  - name: grafana-dashboards-provisioning
    files:
      - provisioning/dashboards/dashboards.yml=provisioning/dashboards/dashboards.yml
    options:
      disableNameSuffixHash: true
  - name: grafana-dashboards
    files:
      - dashboards/xcagi-api-overview.json=dashboards/xcagi-api-overview.json
      - dashboards/xcagi-mod-store.json=dashboards/xcagi-mod-store.json
      - dashboards/xcagi-neurobus.json=dashboards/xcagi-neurobus.json
      - dashboards/xcagi-infrastructure.json=dashboards/xcagi-infrastructure.json
    options:
      disableNameSuffixHash: true
