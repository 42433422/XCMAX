[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "retort-engine"
version = "0.4.0"
description = "Retort blackhole external evolution engine"
requires-python = ">=3.10"

[project.scripts]
retort = "retort_engine.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["retort_engine*"]

[tool.setuptools.package-data]
retort_engine = ["frontend/*"]
