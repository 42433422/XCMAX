# 组件级 CI：MODstore Python 后端（modstore_server + modman + tests）
#
# 责任边界：仅负责 MODstore_deploy 下 Python 工程。
# 下游：deploy.yml（Deploy backend）通过 workflow_run 监听本工作流。
# 路径过滤排除 market/ 与 java_payment_service/，它们由各自 CI 覆盖。

name: CI - Backend Python

on:
  pull_request:
    paths:
      - 'MODstore_deploy/modstore_server/**'
      - 'MODstore_deploy/modman/**'
      - 'MODstore_deploy/tests/**'
      - 'MODstore_deploy/pyproject.toml'
      - 'MODstore_deploy/alembic/**'
      - 'MODstore_deploy/alembic.ini'
      - '.github/workflows/ci-backend-python.yml'
  push:
    branches: [main]
    paths:
      - 'MODstore_deploy/modstore_server/**'
      - 'MODstore_deploy/modman/**'
      - 'MODstore_deploy/tests/**'
      - 'MODstore_deploy/pyproject.toml'
      - 'MODstore_deploy/alembic/**'
      - 'MODstore_deploy/alembic.ini'
      - '.github/workflows/ci-backend-python.yml'
  workflow_dispatch:

concurrency:
  group: ci-backend-python-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-python-ci:
    name: MODstore (Python — lint + tests + coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: MODstore_deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[web,knowledge,dev]"

      - name: Lint (black + isort)
        run: |
          black --check modstore_server modman tests
          isort --check-only modstore_server modman tests

      - name: Test with coverage (global floor — ratchet)
        env:
          MODSTORE_JWT_SECRET: ci-test-secret-at-least-32-characters-long
          MODSTORE_DATABASE_URL: "sqlite+pysqlite:///:memory:"
          # 诚实 floor=40(原为虚低的 8)。取 pyproject 自承"全量 tree 约 40%+"作保守值;
          # 本地无法实测(xcagi_common 要求 Python>=3.10)。棘轮:能挡回归、不可下调,
          # 实测后只能上调。必须与 MODstore_deploy/.github/workflows/ci-backend-python.yml
          # (经 scripts/dev/publish_ci_workflows_to_root.py 发布到根并实际运行的那份)一致。
          MODSTORE_PY_COVERAGE_FLOOR: '40'
        run: |
          pytest tests/ -q \
            --cov=modstore_server \
            --cov=modman \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=${MODSTORE_PY_COVERAGE_FLOOR}

      # coverage report --fail-under=80 (per-module); webhook_dispatcher uses WEBHOOK_DISPATCHER_COVERAGE_FLOOR.
      - name: Critical modules coverage report (80% floor)
        env:
          WEBHOOK_DISPATCHER_COVERAGE_FLOOR: '60'
        run: |
          python <<'PY'
          import os
          import subprocess

          modules_80 = [
              "modstore_server/payment_orders.py",
              "modstore_server/payment_contract.py",
              "modstore_server/application/payment_gateway.py",
              "modstore_server/eventing/contracts.py",
              "modstore_server/webhook_api.py",
          ]
          for m in modules_80:
              subprocess.run(
                  ["coverage", "report", "--fail-under=80", f"--include={m}"],
                  check=True,
              )
          floor = os.environ.get("WEBHOOK_DISPATCHER_COVERAGE_FLOOR", "60")
          subprocess.run(
              [
                  "coverage",
                  "report",
                  f"--fail-under={floor}",
                  "--include=modstore_server/webhook_dispatcher.py",
              ],
              check=True,
          )
          PY

      - name: Upload Python coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: modstore-coverage-xml
          path: MODstore_deploy/coverage.xml
          if-no-files-found: ignore
          retention-days: 14
