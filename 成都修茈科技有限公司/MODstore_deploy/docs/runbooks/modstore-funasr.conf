# systemd drop-in：宿主机 modstore (:9999) 连接 Docker FunASR (--certfile 0)
# 安装：
#   sudo cp docs/runbooks/modstore-funasr.conf /etc/systemd/system/modstore.service.d/funasr.conf
#   sudo systemctl daemon-reload && sudo systemctl restart modstore
#
# FunASR 使用 ws 时必须 FUNASR_USE_SSL=0；使用 --certfile 0 部署时同理。
[Service]
Environment=FUNASR_HOST=127.0.0.1
Environment=FUNASR_PORT=10095
Environment=FUNASR_USE_SSL=0
