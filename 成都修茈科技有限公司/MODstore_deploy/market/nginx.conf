limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=auth_per_ip:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=payment_per_ip:10m rate=10r/s;

server {
  listen 80;
  server_name _;

  include /etc/nginx/snippets/custom-error-pages.inc.conf;
  include /etc/nginx/snippets/security-headers.inc.conf;

  client_max_body_size 100m;

  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_comp_level 5;
  gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

  location = /nginx-health {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  location /market/assets/ {
    root /usr/share/nginx/html;
    try_files $uri =404;
    include /etc/nginx/snippets/cache-static-365d-immutable.inc.conf;
  }

  location = /market/index.html {
    root /usr/share/nginx/html;
    add_header Cache-Control "no-cache";
  }

  location = /market/download-release.json {
    root /usr/share/nginx/html;
    default_type application/json;
    add_header Cache-Control "no-cache";
  }

  location /api/realtime/ {
    limit_req zone=api_per_ip burst=20 nodelay;
    proxy_pass http://api:8765;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    include /etc/nginx/snippets/proxy-forward-base.inc.conf;
    proxy_set_header X-Request-Id $request_id;
    proxy_intercept_errors off;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 1d;
  }

  location /api/asr/ {
    limit_req zone=api_per_ip burst=20 nodelay;
    proxy_pass http://api:8765;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    include /etc/nginx/snippets/proxy-forward-base.inc.conf;
    proxy_set_header X-Request-Id $request_id;
    proxy_intercept_errors off;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 1d;
  }

  location /hf-hub/ {
    alias /data/hf-hub/;
    autoindex off;
    add_header Cache-Control "public, max-age=86400";
  }

  location ^~ /market/hf-hub/ {
    alias /data/hf-hub/;
    autoindex off;
    add_header Cache-Control "public, max-age=86400";
  }

  location ^~ /market/asr-ort/ {
    root /usr/share/nginx/html;
    try_files $uri =404;
    include /etc/nginx/snippets/cache-static-365d-immutable.inc.conf;
  }

  location /api/auth/ {
    limit_req zone=auth_per_ip burst=10 nodelay;
    proxy_pass http://api:8765/api/auth/;
    include /etc/nginx/snippets/proxy-forward-base.inc.conf;
    proxy_set_header X-Request-Id $request_id;
    proxy_intercept_errors off;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  location /api/payment/ {
    limit_req zone=payment_per_ip burst=20 nodelay;
    proxy_pass http://api:8765/api/payment/;
    include /etc/nginx/snippets/proxy-forward-base.inc.conf;
    proxy_set_header X-Request-Id $request_id;
    proxy_intercept_errors off;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 60s;
  }

  location /api/wallet/ {
    limit_req zone=payment_per_ip burst=20 nodelay;
    proxy_pass http://api:8765/api/wallet/;
    include /etc/nginx/snippets/proxy-forward-base.inc.conf;
    proxy_set_header X-Request-Id $request_id;
    proxy_intercept_errors off;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 60s;
  }

  # TTS chunked 流：禁用缓冲以便客户端尽早收到首包音频
  location /api/workbench/tts/edge/stream {
    limit_req zone=api_per_ip burst=40 nodelay;
    proxy_pass http://api:8765/api/workbench/tts/edge/stream;
    include /etc/nginx/snippets/proxy-forward-base.inc.conf;
    proxy_set_header X-Request-Id $request_id;
    proxy_buffering off;
    proxy_intercept_errors off;
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
  }

  # 含 LLM 流式、工作台编排等长连接；过短会导致浏览器收 504（nginx 先断开 upstream）
  location /api/ {
    limit_req zone=api_per_ip burst=40 nodelay;
    proxy_pass http://api:8765/api/;
    include /etc/nginx/snippets/proxy-forward-base.inc.conf;
    proxy_set_header X-Request-Id $request_id;
    proxy_buffering off;
    proxy_intercept_errors off;
    proxy_connect_timeout 10s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;
  }

  location /v1/ {
    limit_req zone=api_per_ip burst=40 nodelay;
    proxy_pass http://api:8765/v1/;
    include /etc/nginx/snippets/proxy-forward-base.inc.conf;
    proxy_set_header X-Request-Id $request_id;
    proxy_buffering off;
    proxy_intercept_errors off;
    proxy_connect_timeout 10s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;
  }

  location /market/ {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /market/index.html;
  }

  location = / {
    return 302 /market/;
  }
}
