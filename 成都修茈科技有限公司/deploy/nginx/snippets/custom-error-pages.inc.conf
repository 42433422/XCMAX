# Include inside `server { ... }`. Deploy HTML from repo `deploy/nginx/errors/` to `/etc/nginx/errors/` on the host,
# or rely on `MODstore_deploy/market/Dockerfile` which copies `nginx-errors/` to `/etc/nginx/errors/`.

server_tokens off;
error_page 404 /errors/404.html;
error_page 500 502 503 504 /errors/50x.html;

location ^~ /errors/ {
    alias /etc/nginx/errors/;
    internal;
}
