# MODstore 静态资源（include 在 server { } 内，位于 location /market/ 之前）
# 路径须与生产 dist 一致：/root/成都修茈科技有限公司/MODstore_deploy/market/dist

# Vite 偶发解析为 /market/assets/assets/xxx → 301 到正确 chunk（禁止 404 回退 HTML）
location ^~ /market/assets/assets/ {
    rewrite ^/market/assets/assets/(.*)$ /market/assets/$1 permanent;
}

# 静态 chunk：禁止 try_files + alias（否则缺失文件会落入 SPA 返回 text/html）
location ^~ /market/assets/ {
    alias /root/成都修茈科技有限公司/MODstore_deploy/market/dist/assets/;
    default_type application/javascript;
    types {
        application/javascript js;
        text/css css;
    }
    add_header Cache-Control "public, max-age=86400, must-revalidate" always;
    add_header X-Content-Type-Options "nosniff" always;
}

# 旧缓存页含 <script src="./main.js"> 且路径为 /market/main.js：直接返回 JS，勿 301+HTML
location = /market/main.js {
    alias /root/成都修茈科技有限公司/main.js;
    default_type application/javascript;
    add_header Cache-Control "no-cache, must-revalidate" always;
}

location = /market/styles.css {
    alias /root/成都修茈科技有限公司/styles.css;
    default_type text/css;
    add_header Cache-Control "no-cache, must-revalidate" always;
}

location = /market {
    return 301 /market/;
}

location /market/ {
    alias /root/成都修茈科技有限公司/MODstore_deploy/market/dist/;
    try_files $uri $uri/ /market/index.html;

    location = /market/index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    }
}
