# Include inside `server { ... }`.
# Note: Nginx clears inherited add_header when a matching location adds its own headers—sites with many
# location-level add_header blocks should audit before enabling (see deploy/nginx/SECURITY-AUDIT-HANDOFF.md).

add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-Frame-Options "SAMEORIGIN" always;
