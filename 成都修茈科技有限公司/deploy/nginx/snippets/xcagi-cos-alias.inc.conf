# COS / 本机安装包下载（与 /market/ 无关；勿改 market/dist）
## XCAGI_COS_ALIAS_BEGIN
location /xcagi-v8.0.0/ {
    alias /var/www/update/releases/stable/;
    add_header Cache-Control "public, max-age=31536000, immutable";
}
## XCAGI_COS_ALIAS_END

## XCAGI_RELEASES_BEGIN
location /releases/stable/ {
    alias /var/www/update/releases/stable/;
    add_header Cache-Control "public, max-age=31536000, immutable";
}
## XCAGI_RELEASES_END
