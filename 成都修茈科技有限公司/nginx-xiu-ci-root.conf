# MODstore API upstream 负载均衡
# 两实例分别由 modstore@9999.service / modstore@9998.service 启动。
# 单实例时可注释掉第二个 server 行；scheduler 进程(:9990)不加入此组。
upstream modstore_api {
    least_conn;
    server 127.0.0.1:9999 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:9998 max_fails=3 fail_timeout=30s;
    keepalive 64;
}

# 官网静态根（developer.html 等 *.html 须由 成都修茈科技有限公司/ 提供，勿用 market/dist 作整站 root）
# 否则 /developer.html 等缺失页会回退到 Vue SPA index.html，表现为「点击无跳转」。

server {
    listen 80;
    server_name www.xiu-ci.com xiu-ci.com;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

    root /root/成都修茈科技有限公司;
    index index.html;

    location = /market {
        return 301 /market/;
    }

    # 市场 SPA（Vite base=/market/）
    location /market/ {
        alias /root/成都修茈科技有限公司/MODstore_deploy/market/dist/;
        index index.html;
        try_files $uri $uri/ /market/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location ^~ /market/assets/ {
        alias /root/成都修茈科技有限公司/MODstore_deploy/market/dist/assets/;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /market/index.html {
        alias /root/成都修茈科技有限公司/MODstore_deploy/market/dist/index.html;
        add_header Cache-Control "no-cache";
    }

    location = /market/download-release.json {
        alias /root/成都修茈科技有限公司/MODstore_deploy/market/dist/download-release.json;
        default_type application/json;
        add_header Cache-Control "no-cache";
    }

    location ^~ /corp-butler/ {
        alias /root/成都修茈科技有限公司/corp-butler/;
        add_header Cache-Control "no-cache";
    }

    # API 请求代理到后端（upstream 负载均衡）
    location /api/ {
        proxy_pass http://modstore_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Public MOD Catalog + /v1/mod-sync（upstream 与 /api/ 一致，同进程）
    location /v1/ {
        proxy_pass http://modstore_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
        client_max_body_size 100m;
    }

    # 后端文档（通过 upstream 代理，任一实例均可返回 OpenAPI 文档）
    location /docs {
        proxy_pass http://modstore_api/docs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
    }

    # 健康检查（被动探活：max_fails/fail_timeout 已在 upstream 中配置）
    location = /api/health {
        proxy_pass http://modstore_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # 官网静态（*.html / styles.css / main.js 等）
    location / {
        try_files $uri $uri/ =404;
    }

    # 错误页面
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
