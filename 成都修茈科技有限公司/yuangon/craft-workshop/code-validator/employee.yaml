id: code-validator
name: 代码校验员工
version: "10.0.0"
owner: admin
area: craft-workshop
domain: >-
  对员工包体进行轻量校验，包括 manifest 合规性、Python 编译检查、包体一致性、独立可执行验证

scope_globs:
  - "workbench/sessions/*"
  - "workbench/validation/*"
  - "yuangon/craft-workshop/code-validator/**"

forbidden_globs:
  - "*.py"
  - "*.vue"
  - "*.ts"

depends_on:
  - sandbox-tester

actions:
  handlers:
    - llm_md
    - echo

triggers:
  on_error: true
  on_quality_fail: true

skills:
  - skill-code-validation

changelog:
  - version: "10.0.0"
    date: "2026-06-07"
    note: "yuangon 骨架由 bootstrap_yuangon.py 从 manifest 反向生成（v10 线内迭代）"
