id: code-validator
name: 代码校验员工
version: 1.0.0
domain: 对员工包体进行轻量校验，包括 manifest 合规性、Python 编译检查、包体一致性、独立可执行验证
owner: admin
area: craft-workshop
scope_globs:
- workbench/sessions/*
- workbench/validation/*
forbidden_globs:
- '*.py'
- '*.vue'
- '*.ts'
triggers:
  on_error: true
  on_quality_fail: true
  on_coverage_miss: false
  max_patch_budget_tokens: 3000
  max_patch_steps: 4
sla:
  timeout_seconds: 120
  retry_max: 2
  escalate_to_human: true
llm_default: auto
llm_reasoning: auto
actions:
  handlers:
  - llm_md
  - echo
capabilities:
  - code.validation

skills:
- skills/skill-code-validation.md
depends_on:
- sandbox-tester
examples:
  - title: "代码校验员工岗位验收"
    description: "以最小、无副作用输入验证岗位输出包含真实证据、风险与下一步。"
    input:
      task: "执行一次代码校验员工职责范围内的只读检查，并返回证据、风险和下一步。"
      dry_run: true

changelog:
- version: 1.0.0
  date: '2026-05-18'
  note: 初始创建
all_hands:
  standby: true
  runbook: 制作车间流水线岗位：无上游员工包/workflow/产物路径时仅汇报职责边界与待机条件；收到 intent-analyst 或 pack-registrar
    输入后再描述可执行步骤。
