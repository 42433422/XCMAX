id: employee-planner
name: 规划设计员工
version: 1.0.0
domain: 根据结构化需求规划员工包架构，拆分员工职责、脚本工作流与 Skill 组；输出一站式员工蓝图
owner: admin
area: craft-workshop
scope_globs:
- workbench/sessions/*
- workbench/plans/*
forbidden_globs:
- '*.py'
- '*.vue'
- '*.ts'
triggers:
  on_error: true
  on_quality_fail: true
  on_coverage_miss: false
  max_patch_budget_tokens: 3000
  max_patch_steps: 4
sla:
  timeout_seconds: 120
  retry_max: 2
  escalate_to_human: true
llm_default: auto
llm_reasoning: auto
skills:
- skills/skill-employee-planning.md
actions:
  handlers:
  - llm_md
  - echo
depends_on:
- intent-analyst
changelog:
- version: 1.0.0
  date: '2026-05-18'
  note: 初始创建
all_hands:
  standby: true
  runbook: 制作车间流水线岗位：无上游员工包/workflow/产物路径时仅汇报职责边界与待机条件；收到 intent-analyst 或 pack-registrar
    输入后再描述可执行步骤。
