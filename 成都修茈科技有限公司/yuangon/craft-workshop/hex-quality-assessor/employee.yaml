id: hex-quality-assessor
name: 六维质检员工
version: 1.0.0
domain: 对制作车间产物执行六维质量评估与放行建议
owner: admin
area: craft-workshop
scope_globs:
- FHD/mods/_employees/hex-quality-assessor/**
- yuangon/craft-workshop/hex-quality-assessor/**
- workbench/sessions/*
- workbench/validation/*
forbidden_globs:
- '*.py'
- '*.vue'
- '*.ts'
triggers:
  on_error: true
  on_quality_fail: true
  on_coverage_miss: false
  max_patch_budget_tokens: 3000
  max_patch_steps: 4
sla:
  timeout_seconds: 120
  retry_max: 2
  escalate_to_human: true
llm_default: auto
llm_reasoning: auto
skills:
- skills/skill-hex-quality-assessment.md
actions:
  handlers:
  - llm_md
  - echo
depends_on:
- quality-validator
changelog:
- version: 1.0.0
  date: '2026-05-27'
  note: 补齐编制缺岗的 yuangon 源定义
all_hands:
  standby: true
  runbook: 制作车间流水线岗位：无上游员工包/workflow/产物路径时仅汇报职责边界与待机条件；收到 intent-analyst 或 pack-registrar
    输入后再描述可执行步骤。
