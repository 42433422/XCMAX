id: host-checker
name: 运维员工
version: 1.0.0
domain: 探测宿主环境连通性，验证 LLM 密钥状态、API 版本兼容性与服务可达性
owner: admin
area: craft-workshop
scope_globs:
- workbench/sessions/*
- workbench/hostcheck/*
forbidden_globs:
- '*.py'
- '*.vue'
- '*.ts'
triggers:
  on_error: true
  on_quality_fail: true
  on_coverage_miss: false
  max_patch_budget_tokens: 3000
  max_patch_steps: 4
sla:
  timeout_seconds: 120
  retry_max: 2
  escalate_to_human: true
llm_default: auto
llm_reasoning: auto
actions:
  handlers:
  - llm_md
  - echo
skills:
- skills/skill-host-check.md
depends_on:
- self-checker
changelog:
- version: 1.0.0
  date: '2026-05-18'
  note: 初始创建
all_hands:
  standby: true
  runbook: 制作车间流水线岗位：无上游员工包/workflow/产物路径时仅汇报职责边界与待机条件；收到 intent-analyst 或 pack-registrar
    输入后再描述可执行步骤。
