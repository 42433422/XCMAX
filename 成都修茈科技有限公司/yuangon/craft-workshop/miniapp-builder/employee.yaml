id: miniapp-builder
name: 小程序员工
version: "10.0.0"
owner: admin
area: craft-workshop
domain: >-
  为员工包生成配套脚本工作流（小程序），将自然语言需求转化为可执行的脚本逻辑

scope_globs:
  - "workbench/sessions/*"
  - "workbench/scripts/*"
  - "yuangon/craft-workshop/miniapp-builder/**"

forbidden_globs:
  - "*.py"
  - "*.vue"
  - "*.ts"

depends_on:
  - quality-validator

actions:
  handlers:
    - llm_md
    - echo

triggers:
  on_error: true
  on_quality_fail: true

skills:
  - skill-miniapp-build

changelog:
  - version: "10.0.0"
    date: "2026-06-07"
    note: "yuangon 骨架由 bootstrap_yuangon.py 从 manifest 反向生成（v10 线内迭代）"
