id: pack-registrar
name: 打包登记员工
version: 1.0.0
domain: 将员工包登记到 Catalog 目录，执行五维审核，生成 .xcemp 发布包
owner: admin
area: craft-workshop
scope_globs:
- workbench/sessions/*
- catalog/*
forbidden_globs:
- '*.py'
- '*.vue'
- '*.ts'
triggers:
  on_error: true
  on_quality_fail: true
  on_coverage_miss: false
  max_patch_budget_tokens: 3000
  max_patch_steps: 4
sla:
  timeout_seconds: 120
  retry_max: 2
  escalate_to_human: true
llm_default: auto
llm_reasoning: auto
actions:
  handlers:
  - llm_md
  - echo
capabilities:
  - pack.registration

skills:
- skills/skill-pack-registration.md
depends_on:
- workflow-automator
examples:
  - title: "打包登记员工岗位验收"
    description: "以最小、无副作用输入验证岗位输出包含真实证据、风险与下一步。"
    input:
      task: "执行一次打包登记员工职责范围内的只读检查，并返回证据、风险和下一步。"
      dry_run: true

changelog:
- version: 1.0.0
  date: '2026-05-18'
  note: 初始创建
all_hands:
  standby: true
  runbook: 制作车间流水线岗位：无上游员工包/workflow/产物路径时仅汇报职责边界与待机条件；收到 intent-analyst 或 pack-registrar
    输入后再描述可执行步骤。
