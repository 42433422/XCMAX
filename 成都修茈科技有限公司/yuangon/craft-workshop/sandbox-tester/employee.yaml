id: sandbox-tester
name: 测试员工
version: "10.0.0"
owner: admin
area: craft-workshop
domain: >-
  对员工工作流执行沙箱测试，包括结构校验与 Mock 执行验证

scope_globs:
  - "workbench/sessions/*"
  - "workbench/sandbox/*"
  - "yuangon/craft-workshop/sandbox-tester/**"

forbidden_globs:
  - "*.py"
  - "*.vue"
  - "*.ts"

depends_on:
  - pack-registrar

actions:
  handlers:
    - llm_md
    - echo

triggers:
  on_error: true
  on_quality_fail: true

skills:
  - skill-sandbox-testing

changelog:
  - version: "10.0.0"
    date: "2026-06-07"
    note: "yuangon 骨架由 bootstrap_yuangon.py 从 manifest 反向生成（v10 线内迭代）"
