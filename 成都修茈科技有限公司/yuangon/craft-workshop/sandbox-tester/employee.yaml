id: sandbox-tester
name: 测试员工
version: 1.0.0
domain: 对员工工作流执行沙箱测试，包括结构校验与 Mock 执行验证
owner: admin
area: craft-workshop
scope_globs:
- workbench/sessions/*
- workbench/sandbox/*
forbidden_globs:
- '*.py'
- '*.vue'
- '*.ts'
triggers:
  on_error: true
  on_quality_fail: true
  on_coverage_miss: false
  max_patch_budget_tokens: 3000
  max_patch_steps: 4
sla:
  timeout_seconds: 120
  retry_max: 2
  escalate_to_human: true
llm_default: auto
llm_reasoning: auto
actions:
  handlers:
  - llm_md
  - echo
capabilities:
  - sandbox.testing

skills:
- skills/skill-sandbox-testing.md
depends_on:
- pack-registrar
examples:
  - title: "测试员工岗位验收"
    description: "以最小、无副作用输入验证岗位输出包含真实证据、风险与下一步。"
    input:
      task: "执行一次测试员工职责范围内的只读检查，并返回证据、风险和下一步。"
      dry_run: true

changelog:
- version: 1.0.0
  date: '2026-05-18'
  note: 初始创建
all_hands:
  standby: true
  runbook: 制作车间流水线岗位：无上游员工包/workflow/产物路径时仅汇报职责边界与待机条件；收到 intent-analyst 或 pack-registrar
    输入后再描述可执行步骤。
