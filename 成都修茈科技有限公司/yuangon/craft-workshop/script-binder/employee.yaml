id: script-binder
name: 配置绑定员工
version: 1.0.0
domain: 将生成的脚本工作流嵌入员工包，更新 manifest 能力声明与目录结构
owner: admin
area: craft-workshop
scope_globs:
- workbench/sessions/*
- yuangon/**
forbidden_globs:
- '*.py'
- '*.vue'
- '*.ts'
triggers:
  on_error: true
  on_quality_fail: true
  on_coverage_miss: false
  max_patch_budget_tokens: 3000
  max_patch_steps: 4
sla:
  timeout_seconds: 120
  retry_max: 2
  escalate_to_human: true
llm_default: auto
llm_reasoning: auto
actions:
  handlers:
  - llm_md
  - echo
capabilities:
  - script.binding

skills:
- skills/skill-script-binding.md
depends_on:
- miniapp-builder
examples:
  - title: "配置绑定员工岗位验收"
    description: "以最小、无副作用输入验证岗位输出包含真实证据、风险与下一步。"
    input:
      task: "执行一次配置绑定员工职责范围内的只读检查，并返回证据、风险和下一步。"
      dry_run: true

changelog:
- version: 1.0.0
  date: '2026-05-18'
  note: 初始创建
all_hands:
  standby: true
  runbook: 制作车间流水线岗位：无上游员工包/workflow/产物路径时仅汇报职责边界与待机条件；收到 intent-analyst 或 pack-registrar
    输入后再描述可执行步骤。
