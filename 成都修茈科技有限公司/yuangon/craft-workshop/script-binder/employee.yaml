id: script-binder
name: 配置绑定员工
version: "10.0.0"
owner: admin
area: craft-workshop
domain: >-
  将生成的脚本工作流嵌入员工包，更新 manifest 能力声明与目录结构

scope_globs:
  - "workbench/sessions/*"
  - "yuangon/**"
  - "yuangon/craft-workshop/script-binder/**"

forbidden_globs:
  - "*.py"
  - "*.vue"
  - "*.ts"

depends_on:
  - miniapp-builder

actions:
  handlers:
    - llm_md
    - echo

triggers:
  on_error: true
  on_quality_fail: true

skills:
  - skill-script-binding

changelog:
  - version: "10.0.0"
    date: "2026-06-07"
    note: "yuangon 骨架由 bootstrap_yuangon.py 从 manifest 反向生成（v10 线内迭代）"
