id: self-checker
name: 自检员工
version: "10.0.0"
owner: admin
area: craft-workshop
domain: >-
  执行员工包独立可执行自检，验证 .xcemp 包在隔离环境下可正常加载与运行

scope_globs:
  - "workbench/sessions/*"
  - "workbench/selfcheck/*"
  - "yuangon/craft-workshop/self-checker/**"

forbidden_globs:
  - "*.py"
  - "*.vue"
  - "*.ts"

depends_on:
  - code-validator

actions:
  handlers:
    - llm_md
    - echo

triggers:
  on_error: true
  on_quality_fail: true

skills:
  - skill-self-check

changelog:
  - version: "10.0.0"
    date: "2026-06-07"
    note: "yuangon 骨架由 bootstrap_yuangon.py 从 manifest 反向生成（v10 线内迭代）"
