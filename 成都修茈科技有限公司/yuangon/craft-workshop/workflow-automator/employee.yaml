id: workflow-automator
name: 流程自动化员工
version: "10.0.0"
owner: admin
area: craft-workshop
domain: >-
  为员工包创建自动化工作流（Skill 组），通过自然语言生成画布节点与连线

scope_globs:
  - "workbench/sessions/*"
  - "workbench/workflows/*"
  - "yuangon/craft-workshop/workflow-automator/**"

forbidden_globs:
  - "*.py"
  - "*.vue"
  - "*.ts"

depends_on:
  - script-binder

actions:
  handlers:
    - llm_md
    - echo

triggers:
  on_error: true
  on_quality_fail: true

skills:
  - skill-workflow-automation

changelog:
  - version: "10.0.0"
    date: "2026-06-07"
    note: "yuangon 骨架由 bootstrap_yuangon.py 从 manifest 反向生成（v10 线内迭代）"
