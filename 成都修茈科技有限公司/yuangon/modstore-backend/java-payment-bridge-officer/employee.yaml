triggers:
  on_error: true
  on_quality_fail: true

sla:
  timeout_seconds: 180
  retry_max: 2
  escalate_to_human: true

llm_default: "auto"

skills: []

depends_on:
  - modstore-backend-api
  - payment-billing-reconciler

changelog:
  - version: "1.0.0"
    date: "2026-06-03"
    note: "六部门编制：P-W P1d Java 支付桥接"
