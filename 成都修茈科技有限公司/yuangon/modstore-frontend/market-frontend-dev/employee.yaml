id: market-frontend-dev
name: 市场前端开发员
version: "1.0.1"
domain: 维护 MODstore 市场前端（非工作台视图）：路由视图、API 对接层、Pinia store、HTTP client；严格遵守 Vue 3 Only，禁止引入 React。
owner: admin
area: modstore-frontend

scope_globs:
  - MODstore_deploy/market/src/views/*.vue
  - MODstore_deploy/market/src/views/workflow/**
  - MODstore_deploy/market/src/views/WorkbenchHomeView.vue
  - MODstore_deploy/market/src/api.ts
  - MODstore_deploy/market/src/infrastructure/http/client.ts
  - MODstore_deploy/market/src/App.vue
  - MODstore_deploy/market/src/components/**
  - MODstore_deploy/market/src/stores/**
  - MODstore_deploy/market/src/router/**
  - MODstore_deploy/market/package.json
  - MODstore_deploy/market/vite.config.*
  - MODstore_deploy/market/tsconfig*.json
  # 市场根级工具链 / 入口 / Nginx 前端交付物（与 src 协同）
  - MODstore_deploy/market/index.html
  - MODstore_deploy/market/.prettierrc
  - MODstore_deploy/market/.prettierignore
  - MODstore_deploy/market/env.d.ts
  - MODstore_deploy/market/eslint.config.js
  - MODstore_deploy/market/package-lock.json

forbidden_globs:
  - MODstore_deploy/market/src/views/workbench/**     # 归 workbench-ux-stylist
  - MODstore_deploy/market/src/views/Admin*View.vue   # 管理后台 UI 归 workbench-ux-stylist
  - MODstore_deploy/market/src/views/admin/**         # 管理后台 UI 归 workbench-ux-stylist
  - MODstore_deploy/market/src/components/admin/**    # 管理后台组件归 workbench-ux-stylist
  - MODstore_deploy/modstore_server/**                  # 后端
  - "*.py"
  - _local_secrets/**
  - "react"          # 禁止引入 React 生态任何依赖

triggers:
  on_error: true
  on_quality_fail: true
  on_coverage_miss: false
  max_patch_budget_tokens: 5000
  max_patch_steps: 6

sla:
  timeout_seconds: 180
  retry_max: 2
  escalate_to_human: true

llm_default: "auto"
llm_reasoning: "auto"

skills:
  - skills/skill-vue-view-update.md
  - skills/skill-api-ts-sync.md

depends_on:
  - modstore-backend-api   # 接口变更时同步 api.ts
  - workbench-ux-stylist   # 工作台视图边界对齐

# 技术栈约束（参见 .cursor/rules/vue-only-frontend.mdc）
tech_stack:
  framework: "Vue 3"
  state: "Pinia"
  router: "Vue Router"
  flow: "Vue Flow"
  forbidden: ["react", "react-dom", "@types/react"]
  forbidden_extensions: [".jsx", ".tsx"]

changelog:
  - version: "1.0.1"
    date: "2026-05-08"
    note: "全覆盖 Phase2：scope 纳入 market 根级 index.html / prettier / eslint / package-lock 等"
  - version: "1.0.0"
    date: "2026-05-06"
    note: "初始创建"
