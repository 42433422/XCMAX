id: ecosystem-partner-onboard-officer
name: 生态伙伴接入员
version: 1.0.0
domain: O-B B1 生态伙伴 onboarding · 租户隔离 · 联合 SSO 与伙伴档案建档。
owner: admin
area: partner-ecosystem
five_line_id: ops_partner
subzone: partner-onboard
also_serves: []
scope_globs:
- MODstore_deploy/modstore_server/**/partner*
- MODstore_deploy/modstore_server/**/tenant**
- FHD/app/**/external_crm*
forbidden_globs:
- _local_secrets/**
- '*.env*'
triggers:
  on_error: true
sla:
  timeout_seconds: 180
  retry_max: 2
  escalate_to_human: true
llm_default: auto
capabilities:
  - partner.onboard.validate
  - catalog.integration.plan

skills:
  - skills/skill-ecosystem-partner-onboard-officer.md
actions:
  handlers: ["agent"]
  agent:
    workspace:
      read_only: false
      requires_project_root: true

depends_on:
- modstore-backend-api
examples:
  - title: "生态伙伴接入员岗位验收"
    description: "以最小、无副作用输入验证岗位输出包含真实证据、风险与下一步。"
    input:
      task: "执行一次生态伙伴接入员职责范围内的只读检查，并返回证据、风险和下一步。"
      dry_run: true

changelog:
- version: 1.0.0
  date: '2026-06-03'
  note: O-B B1 生态伙伴接入专岗
business_context:
  five_line: O-B
  subzone: partner-onboard
  kpis:
  - 伙伴建档 SLA
  - 租户隔离校验通过率
  summary: O-B B1 生态伙伴 onboarding · 租户隔离 · 联合 SSO 与伙伴档案建档。
