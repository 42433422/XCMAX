id: ecosystem-revenue-share-reconciler
name: 生态分润对账员
version: 1.0.0
domain: O-B B5 渠道分润 · 联合 GMV 对账 · 与 payment-billing-reconciler 分工（本岗偏伙伴分润）。
owner: admin
area: partner-ecosystem
five_line_id: ops_partner
subzone: revenue-share
also_serves:
- ops_acquisition
scope_globs:
- MODstore_deploy/modstore_server/**/reconciliation*
- MODstore_deploy/java_payment_service/**/Order*
- FHD/app/**/payment*
forbidden_globs:
- _local_secrets/**
- '*.env*'
triggers:
  on_error: true
  schedule:
    cron: 0 2 * * *
    timezone: Asia/Shanghai
sla:
  timeout_seconds: 180
  retry_max: 2
  escalate_to_human: true
llm_default: auto
capabilities:
  - revenue.share.reconcile
  - settlement.exception.report

skills:
  - skills/skill-ecosystem-revenue-share-reconciler.md
actions:
  handlers: ["llm_md", "echo"]

depends_on:
- payment-billing-reconciler
- java-payment-bridge-officer
examples:
  - title: "生态分润对账员岗位验收"
    description: "以最小、无副作用输入验证岗位输出包含真实证据、风险与下一步。"
    input:
      task: "执行一次生态分润对账员职责范围内的只读检查，并返回证据、风险和下一步。"
      dry_run: true

changelog:
- version: 1.0.0
  date: '2026-06-03'
  note: O-B B5 生态分润对账专岗
business_context:
  five_line: O-B
  subzone: revenue-share
  kpis:
  - 分账对账差异率
  - 结算批次闭环率
  summary: O-B B5 渠道分润 · 联合 GMV 对账 · 与 payment-billing-reconciler 分工（本岗偏伙伴分润）。
