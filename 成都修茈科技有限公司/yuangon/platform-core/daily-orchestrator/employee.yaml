id: daily-orchestrator
name: 每日编排员
version: "1.0.0"
domain: 每日定时：在独立分支上做最小修复（测试失败、日志告警），提交后进入「待邮件审批」队列；不触达用户数据目录与 ORM 模型定义。
owner: admin
area: platform-core

scope_globs:
  - MODstore_deploy/market/src/**
  - MODstore_deploy/modstore_server/**
  - MODstore_deploy/tests/**
  - MODstore_deploy/pyproject.toml

forbidden_globs:
  - MODstore_deploy/modstore_server/models.py      # 归 dbops-engineer，命中 schema 类失败时 escalate
  - MODstore_deploy/modstore_server/migrations/**  # 归 dbops-engineer
  - MODstore_deploy/alembic/**                     # 归 dbops-engineer
  - "**/*.db"
  - MODstore_deploy/modstore_server/catalog_data/**
  - MODstore_deploy/modstore_server/library/**
  - MODstore_deploy/var/**
  - _local_secrets/**

triggers:
  on_error: true
  on_quality_fail: true
  on_coverage_miss: false
  schedule:
    cron: "30 3 * * *"        # 每日 03:30 跑测试 + 自动修复
    timezone: "Asia/Shanghai"
  max_patch_budget_tokens: 6000
  max_patch_steps: 8

sla:
  timeout_seconds: 600
  retry_max: 0
  escalate_to_human: true

llm_default: "auto"
llm_reasoning: "auto"

skills:
  - skills/skill-daily-orchestrator.md

actions:
  handlers: ["agent"]
  agent:
    workspace:
      read_only: false
      requires_project_root: true

depends_on:
  # 先跑质量信号再编排修复（在岗协作图 ≥2 节点）
  - test-qa-runner
  # schema 类失败 escalate 到 DBA
  - dbops-engineer

changelog:
  - version: "1.0.0"
    date: "2026-05-07"
    note: "每日编排 + 邮件审批部署链"
