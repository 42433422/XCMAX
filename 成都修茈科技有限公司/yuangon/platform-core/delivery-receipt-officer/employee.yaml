id: delivery-receipt-officer
name: 交付签收员
version: "1.0.0"
domain: O8 里程碑签收与交付确认：对接 OPS_CLOSURE、签收工单、test-qa-runner 门禁与 receipt 工作流。
owner: admin
area: platform-core
five_line_id: ops_acquisition
subzone: delivery-feedback
also_serves: []

scope_globs:
  - FHD/app/**/ops_closure/**
  - FHD/mods/xcagi-workflow-employee-receipt-confirm/**
  - MODstore_deploy/modstore_server/**/delivery**

forbidden_globs:
  - _local_secrets/**

triggers:
  on_error: true
  subscribes:
    - "ops.delivery.milestone_ready"

sla:
  timeout_seconds: 180
  retry_max: 2
  escalate_to_human: true

llm_default: "auto"

capabilities:
  - delivery.receipt.verify
  - acceptance.evidence.audit

skills:
  - skills/skill-delivery-receipt-officer.md

actions:
  handlers: ["llm_md", "echo"]

depends_on:
  - test-qa-runner
  - change-request-auditor

examples:
  - title: "交付签收员岗位验收"
    description: "以最小、无副作用输入验证岗位输出包含真实证据、风险与下一步。"
    input:
      task: "执行一次交付签收员职责范围内的只读检查，并返回证据、风险和下一步。"
      dry_run: true

changelog:
  - version: "1.0.0"
    date: "2026-06-03"
    note: "六部门编制：O-A O8 交付签收专岗"
