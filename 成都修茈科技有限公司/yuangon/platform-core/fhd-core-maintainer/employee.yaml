id: fhd-core-maintainer
name: FHD 核心应用维护员
version: "1.0.0"
domain: 维护 FHD 宿主核心 app/ 与 tests/：应用服务、路由、NeuroBus 集成；产出经 CR Git 管线提交 PR，由 FHD test.yml 与 ci-auto-merge 门控。
owner: admin
area: platform-core

scope_globs:
  - FHD/app/**
  - FHD/tests/**
  - FHD/pyproject.toml
  - FHD/alembic/**
  - FHD/docs/api/openapi.json
  - FHD/config/**
  - packages/xcagi_common/**
  - FHD/mods/_employees/fhd-core-maintainer/**
  - yuangon/platform-core/fhd-core-maintainer/**

forbidden_globs:
  - MODstore_deploy/**
  - 成都修茈科技有限公司/**
  - vibe-coding/**
  - _local_secrets/**
  - "*.vue"

triggers:
  on_error: true
  on_quality_fail: true
  on_coverage_miss: true
  subscribes:
    - "telemetry.backlog.created"
    - "employee.task.failed:test-qa-runner"
  max_patch_budget_tokens: 6000
  max_patch_steps: 6

sla:
  timeout_seconds: 300
  retry_max: 2
  escalate_to_human: true

llm_default: "auto"
llm_reasoning: "auto"

capabilities:
  - fhd.app.patch

skills:
  - skills/skill-fhd-app-patch.md

actions:
  handlers: ["agent"]
  agent:
    workspace:
      read_only: false
      requires_project_root: true

depends_on:
  - test-qa-runner

examples:
  - title: "FHD 核心应用维护员岗位验收"
    description: "以最小、无副作用输入验证岗位输出包含真实证据、风险与下一步。"
    input:
      task: "执行一次FHD 核心应用维护员职责范围内的只读检查，并返回证据、风险和下一步。"
      dry_run: true

changelog:
  - version: "1.0.0"
    date: "2026-05-31"
    note: "制作线 P2：FHD app/ 自动编码→PR 闭环"
