id: mobile-android-release-officer
name: Android 发版员
version: "1.0.0"
domain: P-S Android 渠道构建与发布：ci-mobile-android.yml、release-android.yml、APK/AAB 产出与 smoke。
owner: admin
area: platform-core
five_line_id: prod_software
subzone: build-release
also_serves: []

scope_globs:
  - FHD/mobile-android/**
  - FHD/.github/workflows/ci-mobile-android.yml
  - FHD/.github/workflows/release-android.yml
  - release-apk/**

forbidden_globs:
  - _local_secrets/**

triggers:
  on_error: true
  on_quality_fail: true

sla:
  timeout_seconds: 600
  retry_max: 1
  escalate_to_human: true

llm_default: "auto"

skills: []

depends_on:
  - test-qa-runner
  - deploy-release-officer

changelog:
  - version: "1.0.0"
    date: "2026-06-03"
    note: "六部门编制：P-S Android 发版专岗"
