id: mobile-ios-release-officer
name: iOS 发版员
version: "1.0.0"
domain: P-S iOS 渠道发布（规划中）：TestFlight / App Store 工程、notarize 协同与 release 门禁。
owner: admin
area: platform-core
five_line_id: prod_software
subzone: build-release
also_serves: []

scope_globs:
  - FHD/mobile-ios/**
  - FHD/.github/workflows/release-desktop.yml
  - FHD/XCAGI/resources/**

forbidden_globs:
