# NOTE: scope FHD/mobile-ios/** 规划中，release-ios.yml 待建
id: mobile-ios-release-officer
name: iOS 发版员
version: "10.0.0"
owner: admin
area: platform-core
domain: >-
  P-S iOS 渠道发布（规划中）：TestFlight / App Store 工程、notarize 协同与 release 门禁。

scope_globs:
  - "FHD/mobile-ios/**"
  - FHD/.github/workflows/release-desktop.yml
  - "FHD/XCAGI/resources/**"
  - "yuangon/platform-core/mobile-ios-release-officer/**"

forbidden_globs:
  - "_local_secrets/**"

depends_on:
  - deploy-release-officer
  - mobile-android-release-officer

actions:
  handlers:
    - llm_md
    - echo

triggers:
  on_error: true
  on_quality_fail: true

skills:
  - task.analyze
  - llm.markdown
  - workflow.assist

changelog:
  - version: "10.0.0"
    date: "2026-06-07"
    note: "yuangon 骨架由 bootstrap_yuangon.py 从 manifest 反向生成（v10 线内迭代）"
