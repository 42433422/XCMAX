triggers:
  on_error: true

sla:
  timeout_seconds: 900
  retry_max: 1
  escalate_to_human: true

llm_default: "auto"

skills: []

depends_on:
  - deploy-release-officer
  - mobile-android-release-officer

changelog:
  - version: "1.0.0"
    date: "2026-06-03"
    note: "六部门编制：P-S iOS 发版专岗（planned 渠道）"
