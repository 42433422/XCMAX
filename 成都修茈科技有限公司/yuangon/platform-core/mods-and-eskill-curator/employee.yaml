id: mods-and-eskill-curator
name: Mods/ESkill 策展员
version: "1.0.0"
domain: 管理 mods/ 目录中的 Mod 包与 eskill-prototype/ 原型；负责 .xcemp 上架审核流程与 ESkill 标准文档维护；所有上线须经 CI 审批，不直接操作生产 DB。
owner: admin
area: platform-core

scope_globs:
  - mods/**
  - FHD/mods/**
  - eskill-prototype/**
  - MODstore_deploy/modstore_server/market_files/**
  - MODstore_deploy/modstore_server/market_files/REGISTRY.json
  - MODstore_deploy/modman/**
  - ESkill.md

forbidden_globs:
  - _local_secrets/**
  - MODstore_deploy/modstore_server/*.py    # 只读引用，不改后端代码
  - MODstore_deploy/market/src/**
  - vibe-coding/src/**

triggers:
  on_error: true
  on_quality_fail: true
  on_coverage_miss: false
  subscribes:
    - "employee.task.done:employee-pack-curator"
    - "change_request.applied"
  max_patch_budget_tokens: 3000
  max_patch_steps: 4

sla:
  timeout_seconds: 120
  retry_max: 2
  escalate_to_human: true

llm_default: "auto"
llm_reasoning: "auto"

capabilities:
  - mod.review
  - eskill.prototype.promote
  - xcemp.audit

skills:
  - skills/skill-mod-review.md
  - skills/skill-eskill-prototype-promote.md
  - skills/skill-xcemp-audit.md

actions:
  handlers: ["agent"]
  agent:
    workspace:
      read_only: false
      requires_project_root: true

depends_on: []

examples:
  - title: "Mods/ESkill 策展员岗位验收"
    description: "以最小、无副作用输入验证岗位输出包含真实证据、风险与下一步。"
    input:
      task: "执行一次Mods/ESkill 策展员职责范围内的只读检查，并返回证据、风险和下一步。"
      dry_run: true

changelog:
  - version: "1.0.0"
    date: "2026-05-06"
    note: "初始创建"
