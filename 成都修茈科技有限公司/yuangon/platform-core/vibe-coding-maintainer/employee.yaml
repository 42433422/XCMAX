id: vibe-coding-maintainer
name: Vibe-Coding 维护员
version: "10.0.0"
owner: admin
area: platform-core
domain: >-
  全权维护 vibe-coding 平台核心库（代码工厂、工作流工厂、自然语言解析、运行时校验器、Agent 层、安全模块）、配套测试、文档、示例代码；为 employee-pack-curator 提供稳定的 vibe_eskill_adapter 接口。

scope_globs:
  - "vibe-coding/src/vibe_coding/**"
  - "vibe-coding/tests/**"
  - "vibe-coding/scripts/**"
  - vibe-coding/pyproject.toml
  - vibe-coding/setup.py
  - "vibe-coding/requirements*.txt"
  - "vibe-coding/docs/**"
  - "vibe-coding/examples/**"
  - vibe-coding/CHANGELOG.md
  - vibe-coding/README.md
  - vibe-coding/README_GITHUB.md
  - vibe-coding/.gitignore
  - vibe-coding/.dockerignore
  - "vibe-coding/test_vibe_*.py"
  - "yuangon/platform-core/vibe-coding-maintainer/**"

forbidden_globs:
  - "MODstore_deploy/modstore_server/**"
  - "MODstore_deploy/market/src/**"
  - "_local_secrets/**"
  - "*.vue"

depends_on:
  []

actions:
  handlers:
    - vibe_edit
    - direct_python
    - agent
    - llm_md
    - echo

triggers:
  on_error: true
  on_quality_fail: true

skills:
  - skill-vibe-core-test
  - skill-nl-parsing-update
  - skill-doc-sync-vibe
  - skill-agent-layer-test
  - skill-security-harden
  - skill-workflow-engine-update
  - skill-cursor-sdk-delegate

changelog:
  - version: "10.0.0"
    date: "2026-06-07"
    note: "yuangon 骨架由 bootstrap_yuangon.py 从 manifest 反向生成（v10 线内迭代）"
