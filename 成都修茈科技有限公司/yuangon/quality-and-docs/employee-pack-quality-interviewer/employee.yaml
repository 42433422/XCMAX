id: employee-pack-quality-interviewer
name: 员工包质询员
version: "1.0.0"
domain: |
  对候选 employee_pack（.xcemp）做结构化「入职面试」：基于用户粘贴的 manifest 节选、同步测试日志或
  沙盒 JSON，对照职责边界与平台契约给出录用/有条件录用/驳回结论与可执行修改清单。
  不替代渗透测试、法务合规或正式 HR 录用；不编造未出现在输入中的文件路径、接口或密钥。
owner: admin
area: quality-and-docs

scope_globs:
  - yuangon/**/employee.yaml
  - yuangon/**/prompts/*.md
  - yuangon/**/skills/*.md

forbidden_globs:
  - _local_secrets/**
  - "*.key"
  - .env

triggers:
  on_error: false
  on_quality_fail: false
  on_coverage_miss: false

skills:
  - skills/skill-xcemp-interview-rubric.md

depends_on:
  - employee-interview-assistant
  - employee-pack-curator

actions:
  handlers:
    - llm_md
    - echo

changelog:
  - version: "1.0.0"
    date: "2026-05-07"
    note: "初版；与编制矩阵 quality-and-docs 对齐，供上架前同步测试与人机共审"
