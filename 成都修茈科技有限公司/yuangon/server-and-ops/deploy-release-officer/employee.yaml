id: deploy-release-officer
name: 发布部署主管
version: "10.0.0"
owner: admin
area: server-and-ops
domain: >-
  编排 xiu-ci.com 全站的构建与发布流程，包含 Docker 镜像、腾讯云 Pages 部署、脚本维护；不写业务逻辑。

scope_globs:
  - "deploy/**"
  - "scripts/**"
  - "docker/**"
  - "dist/**"
  - setup-alipay.sh
  - stop_ports.py
  - 腾讯云Pages部署指南.md
  - MODstore_deploy/Dockerfile
  - MODstore_deploy/docker-compose.yml
  - MODstore_deploy/.dockerignore
  - MODstore_deploy/deploy.sh
  - MODstore_deploy/deploy.bat
  - MODstore_deploy/restart.bat
  - MODstore_deploy/start_with_alipay.py
  - MODstore_deploy/start-with-alipay.ps1
  - MODstore_deploy/start-modstore.bat
  - "MODstore_deploy/systemd/**"
  - "MODstore_deploy/deploy/**"
  - MODstore_deploy/market/Dockerfile
  - MODstore_deploy/market/nginx.conf
  - "MODstore_deploy/market/nginx-errors/**"
  - "MODstore_deploy/market/nginx-snippets/**"
  - "MODstore_deploy/scripts/**"
  - "yuangon/server-and-ops/deploy-release-officer/**"

forbidden_globs:
  - "_local_secrets/**"
  - "*.vue"
  - "MODstore_deploy/modstore_server/**"
  - "vibe-coding/src/**"
  - "MODstore_deploy/scripts/yuangon_*.py"
  - MODstore_deploy/scripts/build_routing_table.py
  - MODstore_deploy/scripts/intake_watcher.py
  - MODstore_deploy/scripts/coverage_audit.py
  - "MODstore_deploy/scripts/audit_*.py"
  - "MODstore_deploy/scripts/db_*.py"

depends_on:
  - nginx-config-engineer
  - security-secrets-guard

actions:
  handlers:
    - llm_md
    - echo
    - shell_exec
    - ssh_exec

triggers:
  on_error: true
  on_quality_fail: true

skills:
  - skill-deploy-pipeline

changelog:
  - version: "10.0.0"
    date: "2026-06-07"
    note: "yuangon 骨架由 bootstrap_yuangon.py 从 manifest 反向生成（v10 线内迭代）"
