id: llm-ops-engineer
name: LLM 运维工程师
version: "1.0.0"
domain: 负责 LLM API key 健康检查与轮换建议、token 用量计量与成本追踪、模型选型与路由策略、provider 故障切换建议、便宜/免费 LLM 调研；维护 app/infrastructure/llm/ 与 mod_employee_llm.py；只读 .env 不直接改 key（key 轮换经 admin 审批，与 security-secrets-guard 协作）。
owner: admin
area: server-and-ops

scope_globs:
  - app/infrastructure/llm/**
  - app/mod_sdk/mod_employee_llm.py
  - app/application/employee_runtime/agent_runner.py
  - app/legacy/llm_config*
  - MODstore_deploy/modstore_server/llm_key_resolver.py
  - MODstore_deploy/modstore_server/llm_billing.py
  - MODstore_deploy/modstore_server/llm_*.py
  - MODstore_deploy/docs/runbooks/llm-ops-*.md
  - yuangon/server-and-ops/llm-ops-engineer/**

forbidden_globs:
  - "*.vue"
  - "*.ts"
  - market/src/**
  - _local_secrets/**
  - .env
  - "**/*.db"
  - MODstore_deploy/modstore_server/catalog_data/**
  - MODstore_deploy/modstore_server/library/**

triggers:
  on_error: true
  on_quality_fail: false
  on_coverage_miss: false
  subscribes:
    # key 失效或欠费告警由 security-secrets-guard 转入
    - "employee.task.escalate:security-secrets-guard"
    # 编排员命中 LLM 调用类失败时升级到本岗
    - "employee.task.escalate:daily-orchestrator"
  max_patch_budget_tokens: 6000
  max_patch_steps: 6

sla:
  timeout_seconds: 300
  retry_max: 1
  escalate_to_human: true

llm_default: "auto"
llm_reasoning: "auto"

capabilities:
  - llm.key.healthcheck
  - llm.token.usage.metering
  - llm.model.cost.comparison
  - llm.provider.failover.advice
  - llm.model.routing.strategy

skills:
  - skills/skill-llm-key-healthcheck.md
  - skills/skill-token-usage-metering.md
  - skills/skill-model-cost-comparison.md
  - skills/skill-provider-failover-advice.md
  - skills/skill-model-routing-strategy.md

actions:
  handlers: ["llm_md", "echo", "agent", "specialized"]
  agent:
    workspace:
      read_only: false
      requires_project_root: true
  specialized:
    tools:
      - read_llm_env_config
      - list_configured_providers
      - test_llm_key_health
      - query_provider_usage
      - compare_model_prices
      - query_local_token_usage
      - query_cursor_usage
      - query_codex_usage
      - query_trae_usage

depends_on:
  - security-secrets-guard
  - dbops-engineer

examples:
  - title: "LLM 运维工程师岗位验收"
    description: "以最小、无副作用输入验证岗位输出包含真实证据、风险与下一步。"
    input:
      task: "执行一次 LLM 运维工程师职责范围内的只读检查，并返回证据、风险和下一步。"
      dry_run: true

changelog:
  - version: "1.0.0"
    date: "2026-06-28"
    note: "从 FHD/mods/_employees/llm-ops-engineer 录入 yuangon 编制，填补 LLM 资源管理真空。"
