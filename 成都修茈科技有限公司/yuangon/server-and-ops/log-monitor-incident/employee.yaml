id: log-monitor-incident
name: 日志监控与事故响应员
version: "10.0.0"
owner: admin
area: server-and-ops
domain: >-
  归并和分析 xiu-ci.com 所有运行日志、测试报告与覆盖率数据；生成告警摘要并推动事故处置；不修改源码。

scope_globs:
  - "coverage/**"
  - "playwright-report/**"
  - "test-results/**"
  - ".cursor_*_log.txt"
  - .cursor/contracts/error-code-map.yaml
  - "MODstore_deploy/.pytest_cache/**"
  - MODstore_deploy/.coverage
  - "vibe-coding/.pytest_cache/**"
  - MODstore_deploy/docs/observability.md
  - MODstore_deploy/docs/OPS_MONITORING.md
  - MODstore_deploy/docs/runbooks/incident-response.md
  - MODstore_deploy/docs/sre-operating-model.md
  - MODstore_deploy/docs/runbooks/disaster-recovery.md
  - MODstore_deploy/docs/runbooks/chaos-game-day.md
  - "MODstore_deploy/chaos/**"
  - "MODstore_deploy/monitoring/**"
  - "MODstore_deploy/orchestration/**"
  - "MODstore_deploy/perf/**"
  - "MODstore_deploy/docs/runbooks/exercises/**"
  - "yuangon/server-and-ops/log-monitor-incident/**"

forbidden_globs:
  - "MODstore_deploy/modstore_server/**/*.py"
  - "*.vue"
  - "*.ts"
  - "nginx-*.conf"
  - "_local_secrets/**"

depends_on:
  - test-qa-runner

actions:
  handlers:
    - llm_md
    - echo
    - shell_exec

triggers:
  on_error: true
  on_quality_fail: false

skills:
  - skill-log-triage
  - skill-doc-ownership

changelog:
  - version: "10.0.0"
    date: "2026-06-07"
    note: "yuangon 骨架由 bootstrap_yuangon.py 从 manifest 反向生成（v10 线内迭代）"
