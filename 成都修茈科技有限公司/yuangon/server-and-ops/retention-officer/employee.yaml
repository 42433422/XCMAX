id: retention-officer
name: 档案清理员
version: "1.0.2"
domain: 周期性清理 workbench_script_runs、上传分片、旋转日志、知识缓存等过期文件，并把每次清理结果写回员工执行流水，作为「定时档案清理」岗位在员工大会上发言。
owner: admin
area: server-and-ops

scope_globs:
  - MODstore_deploy/modstore_server/workbench_script_runs/**
  - MODstore_deploy/modstore_server/market_files/.tmp_chunks/**
  - MODstore_deploy/modstore_server/webhook_events/**
  - .cursor_*_log.txt
  - .cursor_paths_check*.txt
  - .cursor_*.txt
  - coverage/**
  - playwright-report/**
  - test-results/**
  # 历史/临时目录归档（仅清理与归档说明，不修改源代码）
  - __tmp_xcemp/**
  - __tmp_emp_*.json
  - _nginx_extract/**
  - new/**
  - alipay_package/**           # 解压副本（与 security-secrets-guard 共域：仅清理过期解压件，不动 _local_secrets）
  - taiyangniao-pro/**          # 历史子项目，冻结归档；如需复活由 admin 转给独立维护员
  - dist/**
  - site/**
  # 仓库根历史媒体 / 临时文件
  - "*.mp4"
  - "test_image.jpg"
  - "MODstore_deploy.zip"
  - "xiu-ci.com_nginx.zip"
  - .cursor_inspect_purge.py
  # MODstore_deploy 内的快照与构建产物
  - MODstore_deploy/market_vue_baseline/**
  - MODstore_deploy/market_vue_baseline*.tar.gz
  - MODstore_deploy/market-dist-*.zip
  - MODstore_deploy/hero-video.mp4
  - MODstore_deploy/modstore.egg-info/**
  - MODstore_deploy/market/dist/**
  # vibe-coding 测试数据快照
  - vibe-coding/test_vibe_*_data/**
  - vibe-coding/test_vibe_data/**
  - vibe-coding/test_vibe_data*/**
  # 显式忽略的缓存（仅清理，不写）
  - "**/__pycache__/**"
  - "**/.pytest_cache/**"
  - "**/.mypy_cache/**"
  - "**/.ruff_cache/**"
  - MODstore_deploy/docs/runbooks/file-retention.md
  - MODstore_deploy/docs/runbooks/legacy-archive.md

forbidden_globs:
  - MODstore_deploy/modstore_server/**/*.py
  - vibe-coding/src/**/*.py
  # 收窄：禁止改生产市场/Vibe 源码；放行归档目录 taiyangniao-pro 等下的 .vue/.ts 清理
  - MODstore_deploy/market/src/**/*.vue
  - MODstore_deploy/market/src/**/*.ts
  - vibe-coding/src/**/*.vue
  - vibe-coding/src/**/*.ts
  - _local_secrets/**
  - .env*
  - "**/secrets/**"

triggers:
  on_error: false
  on_quality_fail: false
  on_coverage_miss: false
  schedule:
    cron: "15 3 * * *"        # 每日 03:15 清扫
    timezone: "Asia/Shanghai"
  max_patch_budget_tokens: 1500
  max_patch_steps: 3

sla:
  timeout_seconds: 120
  retry_max: 1
  escalate_to_human: true

llm_default: "auto"
llm_reasoning: "auto"

capabilities:
  - disk.retention

skills:
  - skills/skill-disk-retention.md

actions:
  handlers: ["llm_md", "echo", "shell_exec"]
  shell_exec:
    command_id: read-pytest-lastfailed

depends_on:
  - log-monitor-incident

examples:
  - title: "档案清理员岗位验收"
    description: "以最小、无副作用输入验证岗位输出包含真实证据、风险与下一步。"
    input:
      task: "执行一次档案清理员职责范围内的只读检查，并返回证据、风险和下一步。"
      dry_run: true

changelog:
  - version: "1.0.2"
    date: "2026-05-08"
    note: "全覆盖 Phase2：forbidden 移除全局 *.vue/*.ts，收窄到 market/src 与 vibe-coding/src，放行 taiyangniao-pro 归档"
  - version: "1.0.1"
    date: "2026-05-08"
    note: "全覆盖 Phase2：收窄 forbidden py；补 test_vibe_data*/**；放行 .cursor_inspect_purge.py 与 taiyangniao-pro 清理"
  - version: "1.0.0"
    date: "2026-05-08"
    note: "初始创建：负责 workbench/上传分片/日志等磁盘档案的 TTL 清理与执行流水。"
