id: security-secrets-guard
name: 安全密钥守卫
version: "1.0.1"
domain: 保护 xiu-ci.com 所有密钥、证书与敏感配置；进行依赖 CVE 扫描、CSP/Headers 审计；发现问题时告警，不自动修改生产配置。
owner: admin
area: server-and-ops

scope_globs:
  - _local_secrets/**
  - .cursor_admin_token.txt
  - alipay_package/**
  - requirements.txt          # CVE 扫描只读
  - MODstore_deploy/modstore_server/requirements*.txt
  # MODstore_deploy 凭据 / 允许清单 / 环境变量
  - MODstore_deploy/keys/**
  - MODstore_deploy/keys_staging/**
  - MODstore_deploy/.env
  - MODstore_deploy/.env.example
  - MODstore_deploy/.env.local
  - MODstore_deploy/.env.local.bak-*
  - MODstore_deploy/.env.production
  - MODstore_deploy/.env.production.example
  - MODstore_deploy/.env*
  - MODstore_deploy/market/.env*
  - MODstore_deploy/market/.deploy-ssh.local*
  - MODstore_deploy/env.database.local.example
  - MODstore_deploy/runtime_allowlist.json
  - MODstore_deploy/deploy-target.local.ps1.example

forbidden_globs:
  - "*.vue"
  - "*.ts"
  - MODstore_deploy/modstore_server/*.py   # 只读扫描，不改代码
  - vibe-coding/**

triggers:
  on_error: true
  on_quality_fail: true
  on_coverage_miss: true
  max_patch_budget_tokens: 2000
  max_patch_steps: 3

sla:
  timeout_seconds: 120
  retry_max: 2
  escalate_to_human: true     # 安全事件必须人工确认

llm_default: "auto"
llm_reasoning: "auto"

capabilities:
  - secret.audit

skills:
  - skills/skill-secret-audit.md

actions:
  handlers: ["llm_md", "echo", "shell_exec"]
  shell_exec:
    command_id: pip-audit-run

depends_on: []

examples:
  - title: "安全密钥守卫岗位验收"
    description: "以最小、无副作用输入验证岗位输出包含真实证据、风险与下一步。"
    input:
      task: "执行一次安全密钥守卫职责范围内的只读检查，并返回证据、风险和下一步。"
      dry_run: true

changelog:
  - version: "1.0.1"
    date: "2026-05-08"
    note: "全覆盖 Phase2：scope 纳入 .env.local 轮转备份文件"
  - version: "1.0.0"
    date: "2026-05-06"
    note: "初始创建"
