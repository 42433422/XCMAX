id: flask-entry-keeper
name: Flask 入口维护员
version: "1.0.0"
domain: 维护根目录 Flask 应用 app.py 的路由、表单处理、excel-to-ai 动态页与依赖 requirements.txt；对接静态站，不涉及 MODstore 或 Nginx 配置。
owner: admin
area: site-and-marketing

scope_globs:
  - ./app.py
  - ./requirements.txt
  - ./public/**
  - ./uploads/**
  - ./site/**
  - ./excel-to-ai.html

forbidden_globs:
  - nginx-*.conf
  - MODstore_deploy/**
  - vibe-coding/**
  - _local_secrets/**
  - docker/**
  - deploy/**

triggers:
  on_error: true
  on_quality_fail: true
  on_coverage_miss: false
  max_patch_budget_tokens: 4000
  max_patch_steps: 5

sla:
  timeout_seconds: 120
  retry_max: 2
  escalate_to_human: true

llm_default: "auto"
llm_reasoning: "auto"

capabilities:
  - flask.route.health

skills:
  - skills/skill-flask-route-health.md

actions:
  handlers: ["agent"]
  agent:
    workspace:
      read_only: false
      requires_project_root: true

depends_on:
  - nginx-config-engineer   # Nginx 反代规则影响路由可达性

examples:
  - title: "Flask 入口维护员岗位验收"
    description: "以最小、无副作用输入验证岗位输出包含真实证据、风险与下一步。"
    input:
      task: "执行一次Flask 入口维护员职责范围内的只读检查，并返回证据、风险和下一步。"
      dry_run: true

changelog:
  - version: "1.0.0"
    date: "2026-05-06"
    note: "初始创建"
