id: marketing-site-builder
name: 营销站点构建员
version: "1.0.0"
domain: 维护 marketing-site/ Nunjucks 模板与构建脚本（build.mjs、package.json）；与根静态站 site-content-editor 分工：本岗只管独立营销站子项目，不碰 MODstore 与市场 Vue 源码。
owner: admin
area: site-and-marketing
five_line_id: prod_web
subzone: static-site
also_serves: [ops_acquisition]

scope_globs:
  - marketing-site/**
  - marketing-assets/xc-brand-film/build.sh
  - marketing-assets/xc-brand-film/scripts/**
  - marketing-assets/xc-brand-film/assets/**

forbidden_globs:
  - _local_secrets/**
  - MODstore_deploy/**
  - site/**

triggers:
  on_error: true
  on_quality_fail: true
  on_coverage_miss: false
  max_patch_budget_tokens: 4000
  max_patch_steps: 5

sla:
  timeout_seconds: 120
  retry_max: 2
  escalate_to_human: true

llm_default: "auto"
llm_reasoning: "auto"

capabilities:
  - marketing.site.build

skills:
  - skills/skill-marketing-site-build.md

actions:
  handlers: ["agent"]
  agent:
    workspace:
      read_only: false
      requires_project_root: true

depends_on:
  - site-content-editor
  - seo-sitemap-curator

examples:
  - title: "营销站点构建员岗位验收"
    description: "以最小、无副作用输入验证岗位输出包含真实证据、风险与下一步。"
    input:
      task: "执行一次营销站点构建员职责范围内的只读检查，并返回证据、风险和下一步。"
      dry_run: true

changelog:
  - version: "1.0.0"
    date: "2026-05-08"
    note: "初始创建：Yuangon 全覆盖 Phase2"
