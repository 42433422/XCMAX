id: marketing-site-builder
name: 营销站点构建员
version: "1.0.0"
domain: 维护 marketing-site/ Nunjucks 模板与构建脚本（build.mjs、package.json）；与根静态站 site-content-editor 分工：本岗只管独立营销站子项目，不碰 MODstore 与市场 Vue 源码。
owner: admin
area: site-and-marketing
five_line_id: prod_web
subzone: static-site
also_serves: [ops_acquisition]

scope_globs:
  - marketing-site/**

forbidden_globs:
  - _local_secrets/**
  - MODstore_deploy/**
  - site/**

triggers:
  on_error: true
  on_quality_fail: true
  on_coverage_miss: false
  max_patch_budget_tokens: 4000
  max_patch_steps: 5

sla:
  timeout_seconds: 120
  retry_max: 2
  escalate_to_human: true

llm_default: "auto"
llm_reasoning: "auto"

skills:
  - skills/skill-marketing-site-build.md

depends_on:
  - site-content-editor
  - seo-sitemap-curator

changelog:
  - version: "1.0.0"
    date: "2026-05-08"
    note: "初始创建：Yuangon 全覆盖 Phase2"
