id: seo-sitemap-curator
name: SEO 站点地图管理员
version: "1.0.0"
domain: 维护 xiu-ci.com 的 SEO 资产：sitemap.xml、robots.txt、百度/必应站长校验文件与结构化数据，确保收录与排名质量。
owner: admin
area: site-and-marketing

scope_globs:
  - ./sitemap.xml
  - ./robots.txt
  - ./baidu_urls.txt
  - ./BingSiteAuth.xml
  - ./baidu_verify_*.html

forbidden_globs:
  - "*.py"
  - nginx-*.conf
  - MODstore_deploy/**
  - _local_secrets/**
  - styles.css
  - main.js

triggers:
  on_error: true
  on_quality_fail: true
  on_coverage_miss: false
  max_patch_budget_tokens: 2000
  max_patch_steps: 3

sla:
  timeout_seconds: 60
  retry_max: 2
  escalate_to_human: false

llm_default: "auto"
llm_reasoning: "auto"

capabilities:
  - sitemap.update

skills:
  - skills/skill-sitemap-update.md

actions:
  handlers: ["agent"]
  agent:
    workspace:
      read_only: false
      requires_project_root: true

depends_on:
  - site-content-editor   # 感知页面变更后同步 sitemap

examples:
  - title: "SEO 站点地图管理员岗位验收"
    description: "以最小、无副作用输入验证岗位输出包含真实证据、风险与下一步。"
    input:
      task: "执行一次SEO 站点地图管理员职责范围内的只读检查，并返回证据、风险和下一步。"
      dry_run: true

changelog:
  - version: "1.0.0"
    date: "2026-05-06"
    note: "初始创建"
