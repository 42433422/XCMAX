id: site-content-editor
name: 静态站内容编辑员
version: "1.0.0"
domain: 维护 xiu-ci.com 营销静态页面的内容、文案、图片引用与数据 JSON；不涉及服务器配置或后端逻辑。
owner: admin
area: site-and-marketing

scope_globs:
  - index.html
  - about.html
  - cases.html
  - services.html
  - solutions.html
  - news.html
  - contact.html
  - honors.html
  - case-edu.html
  - case-manufacture.html
  - case-park.html
  - excel-to-ai.html
  - styles.css
  - main.js
  - news.json
  - activities.json
  - assets/**
  # 根 Vite 工具链（与 MODstore_deploy/market 是两套，不要混用）
  - src/**
  - package.json
  - package-lock.json
  - vite.config.ts
  - tsconfig.json
  - tsconfig.node.json
  - tsconfig.strict.json
  - tsconfig.strict-baseline.json
  - eslint.config.js
  - .prettierrc
  - .prettierignore
  - env.d.ts

forbidden_globs:
  - app.py
  - requirements.txt
  - nginx-*.conf
  - MODstore_deploy/**
  - vibe-coding/**
  - _local_secrets/**
  - deploy/**
  - docker/**
  - sitemap.xml             # 归 seo-sitemap-curator
  - robots.txt              # 归 seo-sitemap-curator

triggers:
  on_error: true
  on_quality_fail: true
  on_coverage_miss: false
  max_patch_budget_tokens: 3000
  max_patch_steps: 4

sla:
  timeout_seconds: 90
  retry_max: 2
  escalate_to_human: true

llm_default: "auto"
llm_reasoning: "auto"

skills:
  - skills/skill-static-page-update.md

depends_on:
  - seo-sitemap-curator   # 内容变更后通知 SEO 员工更新 sitemap

changelog:
  - version: "1.0.0"
    date: "2026-05-06"
    note: "初始创建"
